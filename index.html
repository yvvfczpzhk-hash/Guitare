   body:'Deux mesures de pompe sur La mineur (cordes La et Sol), deux sur Do (cordes La et Ré). Le défi : que la basse ne trébuche pas au changement. Écoute, puis boucle.',
   tips:['Si le pouce hésite au changement, ralentis à 60. Le pouce d’abord, toujours.']}
 ]},

{day:65, est:20, title:'Le pincé : basse + mélodie ensemble',
 tags:['Fingerpicking','Main droite','Technique'],
 intro:'Deuxième étage de la fusée : pendant que le pouce pompe, un doigt vient pincer une corde aiguë EN MÊME TEMPS que certaines basses. C’est là que le cerveau proteste — et apprend.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Deux voix, un instant',
   body:[
    'Le **pincé** : pouce et doigt jouent ensemble, pile sur le temps. La basse continue sa vie, l’aigu ponctue. L’oreille entend deux instruments.',
    'On commence simple : un pincé sur les temps 1 et 3 seulement. Index sur la corde de Sol, majeur sur le Si.'
   ],
   tips:['Ne cherche pas à « penser » les deux mains : pense uniquement au pouce, et laisse le doigt tomber avec lui.']},
  {kind:'tab', tab:{tempo:68, bpb:4, events:[
    {notes:[{s:1,f:3},{s:5,f:0}], beats:1},{notes:[{s:2,f:2}], beats:1},
    {notes:[{s:1,f:3},{s:5,f:0}], beats:1},{notes:[{s:2,f:2}], beats:1},
    {notes:[{s:1,f:3},{s:4,f:1}], beats:1},{notes:[{s:2,f:2}], beats:1},
    {notes:[{s:1,f:3},{s:4,f:1}], beats:1},{notes:[{s:2,f:2}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Pincé sur Do',
   body:'Écoute : la pompe continue, et sur chaque temps 1 et 3, une note aiguë tombe avec la basse (le Mi aigu, puis le Do de la corde de Si). Reproduis lentement : boum+ting, boum, boum+ting, boum.',
   tips:['Le pincé doit être PARFAITEMENT simultané : une seule attaque, deux notes. Si ça s’égrène, ralentis.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Le test des accords',
   body:[
    'Transporte le pincé sur La mineur, puis sur Fa (le barré, ou Fmaj7 si tu préfères aujourd’hui) : pompe + pincé sur 1 et 3, quatre mesures chacun.',
    'C’est déjà, techniquement, du Travis picking. Demain on remplit les trous — et la magie complète opère.'
   ],
   tips:['La qualité du jour se mesure à UNE chose : le pouce a-t-il tenu son tempo pendant que le doigt travaillait ?']}
 ]},

{day:66, est:20, title:'Le pattern Travis complet',
 tags:['Fingerpicking','Main droite','Singer-songwriter'],
 intro:'On ajoute les notes « entre » les basses, et le motif complet apparaît : cette dentelle roulante qu’on entend chez Merle Travis, Chet Atkins, et tout le folk moderne. Grand jour.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Remplir les contretemps',
   body:[
    'Le pattern complet : basses sur **chaque temps** (le pouce, comme toujours), et notes aiguës sur certains **contretemps** (les « et »). Le tissage des deux crée le roulement.',
    'Formule du jour, sur un temps « 1 et 2 et 3 et 4 et » : pincé, aigu, basse, aigu, pincé, aigu, basse, (rien).'
   ],
   tips:['N’essaie JAMAIS de lire ce pattern en jouant : écoute la cible en boucle, puis imite par tranches de 2 temps.']},
  {kind:'tab', tab:{tempo:64, bpb:4, events:[
    {notes:[{s:1,f:3},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:0.5},{notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:1,f:3},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le motif sur Do, au ralenti',
   body:[
    'Écoute plusieurs fois : boum+ting, ti, boum, ti, boum+ting, ti, boum. Puis construis par couches : (1) pouce seul, (2) + les pincés, (3) + les contretemps.',
    'Vitesse cible aujourd’hui : 64. La fluidité viendra de la répétition, pas de l’effort.'
   ],
   tips:['La méthode par couches est LA méthode : chaque couche doit être stable avant d’ajouter la suivante.']},
  {kind:'text', eyebrow:'Pour ancrer', num:'03',
   title:'Deux minutes non-stop',
   body:[
    'Le pattern sur Do, en boucle, deux minutes chrono (lance le minuteur de cette carte !). Pas de pause, même après une erreur : on raccroche le wagon et on continue.',
    'La continuité malgré l’erreur est une compétence de scène — et le Travis est le meilleur endroit pour la forger.'
   ],
   tips:['À la fin des deux minutes, tes mains sauront quelque chose que ta tête ne sait pas expliquer. C’est exactement ça, un automatisme.']}
 ]},

{day:67, est:20, title:'Le Travis en voyage : la grille complète',
 tags:['Fingerpicking','Singer-songwriter','Groove'],
 intro:'Un pattern qui ne marche que sur un accord est un gadget. Aujourd’hui, le Travis traverse une grille entière — avec les basses qui changent de cordes selon l’accord. Le vrai test.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La carte des basses',
   body:[
    'Chaque accord a SES deux basses : **Do** → cordes La + Ré. **La mineur** → La + Sol. **Fa** (ou Fmaj7) → Ré + Sol... et **Sol** → Mi grave + Ré.',
    'Le pattern des doigts ne change pas d’un iota : seul le pouce adapte son territoire. C’est lui le navigateur.'
   ],
   tips:['Avant de jouer, récite la carte : « Do : La-Ré. Am : La-Sol. Fa : Ré-Sol. Sol : Mi-Ré. » Trente secondes qui sauvent la séance.']},
  {kind:'tab', tab:{tempo:64, bpb:4, events:[
    {notes:[{s:1,f:0},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:3,f:2}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:1,f:0},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:3,f:2}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le motif sur La mineur',
   body:'Le même tissage qu’hier, transposé sur Am : basses La + Sol, aigus adaptés. Écoute, compare avec la version Do : même squelette, autre chair.',
   tips:['Remarque : tes doigts aigus visent presque les mêmes cordes. 80 % du travail d’adaptation revient au pouce.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'La grille Do – Am – Fa – Sol',
   body:[
    'Le pattern complet sur la grille, deux mesures par accord, en boucle. Tempo libre mais CONSTANT — mieux vaut lent et fleuve que rapide et cahoteux.',
    'Quand ça tourne : ferme les yeux une mesure sur deux. Le Travis se joue au toucher, et tes mains sont prêtes.'
   ],
   tips:['C’est l’accompagnement le plus autosuffisant qui existe : basse, harmonie et rythme dans une seule main droite.']}
 ]},

{day:68, est:20, title:'Broder le Travis : le style Sheeran',
 tags:['Fingerpicking','Singer-songwriter','Phrasé'],
 intro:'Dernier étage : glisser des hammer-ons et des pull-offs DANS le pattern. C’est cette broderie qui transforme un exercice en musique — et le cœur du style fingerstyle moderne.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La main gauche entre dans la danse',
   body:[
    'Jusqu’ici la main gauche tenait l’accord, point. On lui donne un rôle : marteler ou tirer une note **pendant** que le pattern roule, sans coup de main droite supplémentaire.',
    'Le grand classique sur Do : la corde de Ré passe de vide à la case 2 en hammer-on — la basse « chante » un instant.'
   ],
   tips:['La broderie ne doit JAMAIS déstabiliser le pouce. Si la pompe vacille, retire la broderie, stabilise, réessaie.']},
  {kind:'tab', tab:{tempo:64, bpb:4, events:[
    {notes:[{s:1,f:3},{s:5,f:0}], beats:0.5},{notes:[{s:2,f:0}], beats:0.5},
    {notes:[{s:2,f:2,t:'h'}], beats:0.5},{notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:1,f:3},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le hammer dans la pompe',
   body:'Écoute : au deuxième temps, la corde de Ré sonne à vide PUIS est martelée en case 2 — deux notes, un seul coup de pouce. C’est la signature du fingerstyle folk. Reproduis par couches.',
   tips:['Le hammer doit tomber pile sur le « et » : il fait partie du rythme, pas de la décoration.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Ta version, ta signature',
   body:[
    'Reprends la grille d’hier et place UNE broderie par accord, où TU veux : hammer sur Do, pull-off sur Am (case 2 → 0 de la corde de Sol), à ton goût.',
    'Puis fredonne par-dessus. Pattern + broderie + voix : c’est exactement, techniquement, ce que fait Ed Sheeran seul en scène.'
   ],
   tips:['Enregistre 30 secondes. Tu viens de franchir un cap que beaucoup de guitaristes n’atteignent jamais.']}
 ]},

/* ===== S11 — GAMME MAJEURE PARTOUT & MODES (jours 71-75) ===== */
{day:71, est:20, title:'Trois notes par corde : l’autoroute',
 tags:['Gamme','Technique','Manche'],
 intro:'Il existe une façon d’organiser la gamme majeure qui rend tout plus rapide et plus logique : trois notes sur chaque corde. C’est le système des solistes modernes — et il simplifie tout.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La régularité qui libère',
   body:[
    'Au lieu de mélanger 2 et 3 notes par corde, on joue **toujours trois notes par corde**. La main droite adore : le motif d’aller-retour devient parfaitement régulier.',
    'Autre cadeau : chaque corde ne connaît que trois dessins possibles (serré, moyen, étiré). Six cordes, trois dessins — la gamme entière devient prévisible.'
   ],
   tips:['Doigté type : index, majeur, auriculaire (ou index, annulaire, auriculaire pour les étirements).']},
  {kind:'scale', root:'G', scale:'major', fret:[2,7], eyebrow:'La cible', num:'02', tempo:80,
   title:'Sol majeur, version large (cases 2-7)',
   body:[
    'La zone élargie de Sol majeur : sur chaque corde, prends les **trois premières notes** que tu croises en partant du grave — c’est ton patron « trois par corde ».',
    'Écoute, puis monte lentement : Sol-La-Si sur le Mi grave, Do-Ré-Mi sur le La, et ainsi de suite.'
   ],
   tips:['Ce léger étirement est nouveau : ouvre depuis le poignet, jamais en tirant sur les doigts. Zéro douleur, c’est la règle.']},
  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'La montée mécanique',
   body:[
    'Monte la gamme trois par corde avec un aller-retour STRICT au médiator : bas-haut-bas sur une corde, haut-bas-haut sur la suivante — laisse la mécanique s’installer.',
    'Cette régularité est la fondation de toute vitesse future. La semaine 15 (technique pure) la fera décoller.'
   ],
   tips:['Métronome à 80, une note par clic. La lenteur consciente d’aujourd’hui, c’est la vitesse propre de demain.']}
 ]},

{day:72, est:20, title:'Relier les patrons : la gamme sans frontières',
 tags:['Gamme','Manche','Technique'],
 intro:'Un patron isolé est une île. Aujourd’hui on construit le pont : le deuxième patron trois-par-corde, et surtout le glissé de l’index qui les relie en une seule autoroute.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le glissé de l’index',
   body:[
    'Pour passer d’un patron au suivant : au moment de changer de corde, l’index **glisse** de deux cases vers l’aigu, et toute la main suit. Le reste du doigté ne change pas.',
    'Avec deux patrons et ce glissé, tu couvres déjà six cases de large — de quoi voyager dans 90 % des solos.'
   ],
   tips:['Le glissé se fait TOUJOURS avec l’index : c’est lui l’éclaireur, les autres doigts sont les passagers.']},
  {kind:'scale', root:'G', scale:'major', fret:[4,9], eyebrow:'La cible', num:'02', tempo:80,
   title:'Le patron suivant (cases 4-9)',
   body:'La même gamme de Sol, décalée d’un cran : trois notes par corde dans la zone 4-9. Écoute, joue, remarque les dessins qui reviennent — tu les connais déjà.',
   tips:['Repère les Sol (en laiton) : ils sont tes phares dans les deux patrons.']},
  {kind:'tab', tab:{tempo:74, bpb:4, events:[
    {notes:[{s:0,f:3}], beats:0.5},{notes:[{s:0,f:5}], beats:0.5},{notes:[{s:0,f:7}], beats:0.5},
    {notes:[{s:1,f:5}], beats:0.5},{notes:[{s:1,f:7}], beats:0.5},{notes:[{s:1,f:9,t:'/'}], beats:0.5},
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:2,f:9,t:'~'}], beats:0.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'La traversée avec glissé',
   body:'Une montée qui commence dans le premier patron et glisse dans le second (le « / » sur la corde de La). Écoute le passage : aucune couture, juste une route qui continue.',
   tips:['Travaille UNIQUEMENT la zone du glissé pendant deux minutes : c’est la charnière, le reste suit tout seul.']}
 ]},

{day:73, est:20, title:'Le mixolydien : le majeur qui a voyagé',
 tags:['Gamme','Théorie','Impro'],
 intro:'Prends la gamme majeure, baisse UNE note, et tu obtiens le son du folk-rock, du blues chantant et des jams autour du feu : le mode mixolydien. Ta première vraie couleur modale.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Une note baisse, l’horizon change',
   body:[
    'Le **mixolydien** = la gamme majeure avec la **septième baissée** d’un demi-ton. Cette seule note enlève le côté « sage » du majeur et ajoute une pointe de blues.',
    'Son terrain naturel : les accords de **7e de dominante** (jour 44 !). Sur un La7 qui traîne, le La mixolydien est chez lui.'
   ],
   tips:['Formule d’oreille : « majeur, mais cool ». Si la chanson sonne route ouverte et soleil couchant, c’est souvent du mixo.']},
  {kind:'scale', root:'A', scale:'mixo', fret:[4,8], eyebrow:'La cible', num:'02', tempo:84,
   title:'La mixolydien (cases 4-8)',
   body:'Écoute la gamme : presque majeure… avec ce Sol naturel (au lieu du Sol#) qui décontracte tout. Joue-la en te posant sur les La, et remarque où vit la note « voyageuse ».',
   tips:['Active « Noms » : le Sol est ta note signature — celle qui fait mixo.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Le test A/B',
   body:[
    'Fais sonner un La7 (laisse-le résonner), puis joue une phrase en La **majeur**, puis la même en La **mixolydien**. La version majeure frotte (le Sol# se cogne au Sol de l’accord) ; la mixo coule.',
    'C’est LA leçon des modes : on ne choisit pas une gamme dans l’absolu, on la choisit **pour l’accord** qui sonne.'
   ],
   tips:['Une seule note à surveiller : tu passes de « je connais mes gammes » à « je choisis mes couleurs ».']}
 ]},

{day:74, est:20, title:'Le dorien : le mineur qui espère',
 tags:['Gamme','Théorie','Impro'],
 intro:'Deuxième couleur modale, la plus aimée des improvisateurs : le dorien. Un mineur, oui — mais avec une lueur dedans. Santana, le funk et la moitié de la soul vivent ici.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le mineur à la sixte lumineuse',
   body:[
    'Le **dorien** = la gamme mineure naturelle avec la **sixte remontée** d’un demi-ton. En La : le Fa devient **Fa#**. Une note, et la mélancolie devient élégance.',
    'Son terrain : les grilles **m7** qui tournent (Am7, ou le fameux vamp Am → D). Dès qu’un mineur groove au lieu de pleurer, pense dorien.'
   ],
   tips:['Repère mental : natMinor = pluie ; dorien = pluie avec un rayon de soleil.']},
  {kind:'scale', root:'A', scale:'dorian', fret:[4,8], eyebrow:'La cible', num:'02', tempo:84,
   title:'La dorien (cases 4-8)',
   body:'Écoute, puis joue : c’est ta boîte de La mineur enrichie, avec le Fa# en invité d’honneur (corde de Ré case 4, corde de Mi aigu case 2 hors zone — cherche-les !). Pose-toi sur les La, effleure les Fa#.',
   tips:['Compare immédiatement avec la penta mineure : les notes communes sont tes appuis, les nouvelles sont tes épices.']},
  {kind:'tab', tab:{tempo:76, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},
    {notes:[{s:4,f:5}], beats:0.5},{notes:[{s:4,f:7}], beats:0.5},
    {notes:[{s:2,f:4}], beats:0.5},{notes:[{s:3,f:5,t:'~'}], beats:1.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'La phrase dorienne',
   body:'Un lick qui passe PAR le Fa# (corde de Ré, case 4) avant de se poser sur le La. Écoute cette lueur au milieu du mineur — c’est exactement ça, le dorien. Joue, puis invente ta variante.',
   tips:['Demain : on met les trois couleurs côte à côte. Prépare tes oreilles.']}
 ]},

{day:75, est:20, title:'Choisir sa couleur : le laboratoire des modes',
 tags:['Gamme','Impro','Théorie'],
 intro:'Majeur, mixolydien, dorien : trois couleurs sur la même fondamentale. Aujourd’hui, pas de nouveauté — un laboratoire d’écoute comparative. C’est là que la théorie devient de l’instinct.',
 blocks:[
  {kind:'scale', root:'A', scale:'major', fret:[4,8], eyebrow:'Couleur 1', num:'01', tempo:86,
   title:'La majeur : le soleil franc',
   body:'Écoute et joue la référence : La majeur, cases 4-8. Lumineux, affirmé, sans arrière-pensée. Mémorise la sensation.',
   tips:['Trois écoutes valent mieux qu’une : ferme les yeux à la troisième.']},
  {kind:'scale', root:'A', scale:'mixo', fret:[4,8], eyebrow:'Couleur 2', num:'02', tempo:86,
   title:'La mixolydien : le soleil couchant',
   body:'La même zone, une note plus bas (le Sol) : détendu, routard, légèrement bluesy. Joue les deux gammes dos à dos et nomme la différence à voix haute.',
   tips:['Verbaliser ce qu’on entend multiplie la mémorisation auditive — c’est documenté, et ça marche.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Le jeu de l’aveugle',
   body:[
    'Le test final : joue au hasard l’une des trois gammes (majeur / mixo / dorien depuis la bibliothèque de l’onglet Outils) et identifie-la À L’OREILLE en deux notes clés maximum.',
    'Puis improvise 4 mesures dans chaque couleur sur un simple La tenu. Même fondamentale, trois histoires : tu ne joues plus des notes, tu choisis des ambiances.'
   ],
   tips:['C’est exactement le niveau d’oreille que Florent travaille avec toi en cours : les deux apprentissages se renforcent.']}
 ]},

/* ===== S12 — HARMONIE : COMPOSER & TRANSPOSER (jours 78-82) ===== */
{day:78, est:20, title:'Les degrés : la grammaire des accords',
 tags:['Harmonie','Théorie','Composition'],
 intro:'Pourquoi Do, Sol, La mineur et Fa vont-ils si bien ensemble ? Parce qu’ils sortent de la même gamme. Aujourd’hui : harmoniser la gamme majeure — la clé de voûte de TOUTE la musique que tu joues.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Sept notes, sept accords',
   body:[
    'Empile des tierces sur chaque note de la gamme de Do et tu obtiens **sept accords** : Do, Rém, Mim, Fa, Sol, Lam, (Si dim). On les numérote en chiffres romains : **I, ii, iii, IV, V, vi, vii°**.',
    'Règle d’or gravée dans le marbre : **I, IV, V sont majeurs ; ii, iii, vi sont mineurs**. Dans TOUTES les tonalités majeures, sans exception.'
   ],
   tips:['Les chiffres romains sont le langage des musiciens : « un-cinq-six-quatre » se joue dans n’importe quelle tonalité.']},
  {kind:'chords', chords:['C','Dm','Em','F','G','Am'], tempo:64, perBeats:2, eyebrow:'La cible', num:'02',
   title:'La famille de Do, au complet',
   body:'Écoute les six accords utiles de Do majeur montés dans l’ordre : I, ii, iii, IV, V, vi. C’est une échelle d’accords — chaque marche a sa couleur, mais toutes appartiennent à la même maison.',
   tips:['Deux temps par accord : le but est d’ENTENDRE la famille, pas de gratter vite.']},
  {kind:'text', eyebrow:'Pour ancrer', num:'03',
   title:'Le traducteur instantané',
   body:[
    'Traduis ces grilles célèbres en degrés : Do-Sol-Lam-Fa = **I-V-vi-IV**. Lam-Fa-Do-Sol = **vi-IV-I-V**. Sol-Ré-Mim-Do (ta chanson du jour 20) = … I-V-vi-IV aussi, en Sol !',
    'Révélation : tu joues la MÊME progression depuis des semaines, dans deux tonalités. Les degrés viennent de te donner des lunettes à rayons X.'
   ],
   tips:['Désormais, pense chaque grille en degrés d’abord, en accords ensuite. C’est le passage du par-cœur à la compréhension.']}
 ]},

{day:79, est:20, title:'Les quatre progressions qui font mille chansons',
 tags:['Harmonie','Composition','Théorie'],
 intro:'Une poignée de progressions fait tourner l’essentiel de la pop mondiale. Les connaître en degrés, c’est pouvoir accompagner presque n’importe quelle chanson à l’oreille. Inventaire.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le grand quatuor',
   body:[
    '**I–V–vi–IV** (l’hymne pop), **vi–IV–I–V** (la mélancolie lumineuse), **I–IV–V** (le rock’n’roll et le blues), **I–vi–IV–V** (les slows des années 50 — et d’aujourd’hui).',
    'Quatre squelettes, des dizaines de milliers de chansons. La différence entre elles ? La mélodie, le rythme, le son — mais l’os est le même.'
   ],
   tips:['Écoute la radio ce soir avec ces lunettes : tu vas reconnaître ces quatre-là partout. Effet garanti.']},
  {kind:'chords', chords:['Am','F','C','G'], tempo:68, perBeats:4, eyebrow:'La cible', num:'02',
   title:'vi–IV–I–V : l’envers de la médaille',
   body:'La même famille que I-V-vi-IV, mais démarrée sur le vi : tout de suite plus introspectif. Écoute, joue, et sens comme l’ORDRE des accords change l’émotion sans changer les accords.',
   tips:['Commencer une grille sur le vi, c’est commencer une histoire par « pourtant… ».']},
  {kind:'chords', chords:['C','Am','F','G'], tempo:68, perBeats:4, eyebrow:'Exercice', num:'03',
   title:'I–vi–IV–V : la machine à slow',
   body:'La progression doo-wop : Do, Lam, Fa, Sol. Joue-la en arpèges lents — tu entends instantanément cinquante ans de ballades. Puis compare les trois grilles du jour : mêmes briques, trois édifices.',
   tips:['Défi bonus : rejoue les trois grilles en degrés, à voix haute, sans regarder les noms d’accords.']}
 ]},

{day:80, est:20, title:'Transposer : le capo intelligent',
 tags:['Harmonie','Voix','Singer-songwriter'],
 intro:'Un ténor comme toi le sait : la bonne tonalité fait la différence entre chanter et souffrir. Aujourd’hui : transposer n’importe quelle grille pour TA voix — de tête, et avec le capo.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Deux méthodes, un but',
   body:[
    '**Méthode 1 — de tête** : traduis la grille en degrés, puis rejoue les degrés dans la nouvelle tonalité. I-V-vi-IV en Ré ? Ré, La, Sim, Sol. Fait.',
    '**Méthode 2 — le capo** : garde tes doigtés, déplace le sillet. Capo 2 + doigtés de Do = tonalité de Ré. Chaque case = un demi-ton de plus.'
   ],
   tips:['Le capo n’est pas de la triche : c’est un choix de timbre ET de tonalité. Les plus grands en vivent.']},
  {kind:'chords', chords:['G','D','Em','C'], tempo:66, perBeats:4, eyebrow:'La cible', num:'02',
   title:'I–V–vi–IV en Sol…',
   body:'La progression reine, en Sol : Sol, Ré, Mim, Do. Joue-la et FREDONNE par-dessus, n’importe quelle mélodie. Note si ta voix est à l’aise, trop basse, trop haute.',
   tips:['C’est un vrai diagnostic de chanteur : la grille est ton banc d’essai vocal.']},
  {kind:'chords', chords:['A','E','Fm','D'], tempo:66, perBeats:4, eyebrow:'Exercice', num:'03',
   title:'…et la même, un ton plus haut',
   body:[
    'I–V–vi–IV en **La** : La, Mi, Fa# mineur (ton barré Fm glissé en case 2 !), Ré. Fredonne la même mélodie : sens-tu ta voix mieux placée, ou moins ?',
    'C’est exactement le travail : tester des tonalités jusqu’à trouver CELLE où ta voix de ténor brille sans forcer. La grille sert la voix, jamais l’inverse.'
   ],
   tips:['Astuce de scène : note sur tes grilles « capo X » une fois la bonne tonalité trouvée. Ton futur toi te remerciera.']}
 ]},

{day:81, est:20, title:'Tension et résolution : l’art de la cadence',
 tags:['Harmonie','Théorie','Composition'],
 intro:'Une chanson, c’est une gestion du désir : créer l’attente, la faire durer, la combler. Les cadences sont ces phrases de fin — et savoir les manier, c’est tenir l’auditeur par la main.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Trois façons de finir une phrase',
   body:[
    '**V → I** (cadence parfaite) : le point final, la porte qui se ferme. **IV → I** (cadence plagale) : le « amen », plus doux, plus rond. **V → vi** (cadence rompue) : la fausse sortie — l’oreille attendait la maison, on lui offre un détour.',
    'Une même grille peut finir des trois façons : c’est TOI qui décides du point, de la virgule ou des points de suspension.'
   ],
   tips:['La cadence rompue est l’arme secrète des ponts et des derniers refrains : elle relance quand tout semblait fini.']},
  {kind:'chords', chords:['F','G','C','C'], tempo:64, perBeats:4, eyebrow:'La cible', num:'02',
   title:'IV – V – I : la phrase qui se ferme',
   body:'Écoute la plus solide des fins : Fa, Sol, Do (et le Do qui s’installe). Sensation de porte fermée à double tour. Joue-la trois fois en laissant vraiment sonner l’arrivée.',
   tips:['Ralentis légèrement sur le V (Sol) : suspendre la tension une demi-seconde décuple la résolution. Vieux truc de musicien.']},
  {kind:'chords', chords:['F','G','Am','Am'], tempo:64, perBeats:4, eyebrow:'Exercice', num:'03',
   title:'La fausse sortie : IV – V – vi',
   body:'Même départ, autre arrivée : Fa, Sol… La mineur. L’oreille attendait Do, elle reçoit une ombre. Joue les deux versions dos à dos : c’est la différence entre « fin » et « à suivre… ».',
   tips:['Dans ta prochaine compo : couplets qui finissent en vi, dernier refrain qui finit en I. Structure d’orfèvre, effort minimal.']}
 ]},

{day:82, est:20, title:'Écrire huit mesures à toi',
 tags:['Composition','Harmonie','Singer-songwriter'],
 intro:'Tout converge ici : degrés, cadences, couleurs. Aujourd’hui tu n’apprends pas — tu composes. Huit mesures, une méthode guidée, zéro angoisse de la page blanche.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'La recette en quatre choix',
   body:[
    '**Choix 1** — la tonalité (celle du jour 80, où ta voix brille). **Choix 2** — quatre degrés pour le couplet (pioche dans le quatuor du jour 79 ou invente : commence par I ou vi). **Choix 3** — quatre degrés pour la suite, qui finissent par une cadence (V→I pour fermer, V→vi pour suspendre). **Choix 4** — une couleur (un maj7 ? un sus4 ? UN seul suffit).',
    'Composer, ce n’est pas inventer du néant : c’est choisir dans un champ de possibles. Tu connais le champ, maintenant.'
   ],
   tips:['Contrainte libératrice : décide en moins d’une minute par choix. On raffine après, on ne raffine pas du vide.']},
  {kind:'chords', chords:['Am','GB','C','Fmaj7','Dm7','G','C','C'], tempo:62, perBeats:4, eyebrow:'Exemple', num:'02',
   title:'Huit mesures témoins',
   body:[
    'Un exemple composé avec la recette : vi – V(/si) – I – IVmaj7, puis ii7 – V – I – I. Une descente de basse, une couleur, une cadence parfaite. Écoute comme les huit mesures « racontent ».',
    'Ne la copie pas : constate juste que la recette produit de la musique, puis fais la tienne.'
   ],
   tips:['Remarque le ii–V–I final : la cadence la plus élégante de la musique occidentale, cadeau bonus du jour.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'À toi : compose et enregistre',
   body:[
    'Applique les quatre choix, joue tes huit mesures en boucle jusqu’à ce qu’elles tournent, puis **enregistre-les** au téléphone avec un titre provisoire. Même moche, même simple : c’est TA première pièce harmonique consciente.',
    'Garde l’enregistrement précieusement : la semaine 16 (répertoire) et la semaine 17 (interprétation) lui donneront chair et voix.'
   ],
   tips:['La différence entre un guitariste et un musicien tient dans ce geste : garder une trace de ce qu’on crée.']}
 ]}
);

/* ===== S13 — ARPÈGES & CIBLAGE (jours 85-89) ===== */
{day:85, est:20, title:'Les arpèges : l’accord déplié',
 tags:['Impro','Arpèges','Phrasé'],
 intro:'Jusqu’ici tu improvises avec des gammes — des notes qui « vont bien ». Les arpèges sont plus précis : les notes DE l’accord, jouées une à une. C’est le passage du flou artistique au dessin net.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Jouer l’accord, note à note',
   body:[
    'Un **arpège** = les notes de l’accord (fondamentale, tierce, quinte) jouées séparément, comme une gamme de trois notes. Sur Am : La, Do, Mi — et rien d’autre.',
    'Pourquoi c’est puissant : une note d’arpège sonne **toujours** juste sur son accord, à n’importe quel moment. Zéro risque, maximum d’ancrage.'
   ],
   tips:['Gamme = le quartier. Arpège = l’adresse exacte. Les deux servent, mais l’adresse impressionne.']},
  {kind:'tab', tab:{tempo:76, bpb:4, events:[
    {notes:[{s:0,f:5}], beats:0.5},{notes:[{s:1,f:3}], beats:0.5},
    {notes:[{s:1,f:7}], beats:0.5},{notes:[{s:2,f:5}], beats:0.5},
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:3,f:5}], beats:0.5},
    {notes:[{s:4,f:5}], beats:0.5},{notes:[{s:5,f:5,t:'~'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'L’arpège de La mineur, dans ta boîte',
   body:[
    'Écoute : uniquement des La, Do et Mi, piochés DANS ta position 1 de pentatonique (cases 5-8). Même territoire, notes triées.',
    'Joue-le en nommant chaque note : « La… Do… Mi… ». Ton quiz du manche et tes triades convergent exactement ici.'
   ],
   tips:['Remarque : l’arpège est la pentatonique MOINS deux notes. Tu élagues, tu n’apprends pas.']},
  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Gamme le jour, arpège la nuit',
   body:[
    'Alterne : une montée de pentatonique complète, puis une montée d’arpège de Am seul, dans la même zone. Sens la différence de netteté.',
    'Puis improvise 4 mesures en n’utilisant QUE l’arpège. C’est plus dur — et c’est le but : la contrainte t’apprend où vivent les notes fortes.'
   ],
   tips:['Demain, on vise la note reine de l’arpège : la tierce.']}
 ]},

{day:86, est:20, title:'Viser la tierce : la note qui raconte',
 tags:['Impro','Arpèges','Phrasé'],
 intro:'S’il ne fallait viser qu’une note par accord, ce serait la tierce : celle qui dit majeur ou mineur, joie ou ombre. Les grands solistes la visent d’instinct. Toi, tu vas la viser exprès.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La note émotionnelle',
   body:[
    'La fondamentale dit « quel accord » ; la **tierce** dit « quelle émotion ». La jouer pile au changement d’accord, c’est faire entendre l’harmonie… sans accompagnement.',
    'Sur Am, la tierce est **Do**. Sur F, c’est **La**. Sur C, c’est **Mi**. Sur G, c’est **Si**. Quatre cibles pour ta grille fétiche.'
   ],
   tips:['Un solo qui vise les tierces « colle » à la grille comme une voix colle aux accords. C’est LA différence audible.']},
  {kind:'tab', tab:{tempo:70, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:1},{notes:[{s:3,f:7}], beats:1},
    {notes:[{s:4,f:5}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},{notes:[{s:3,f:5}], beats:1},
    {notes:[{s:2,f:7}], beats:1},{notes:[{s:3,f:5,t:'~'}], beats:3}
  ]}, eyebrow:'La cible', num:'02',
   title:'Deux mesures qui atterrissent sur les tierces',
   body:'Écoute cette phrase pensée pour Am puis F : elle se pose sur **Do** (case 5, corde de Sol) quand Am sonne, puis sur **La** (case 7, corde de Ré) quand Fa arrive. Chaque atterrissage tombe sur le temps 1.',
   tips:['Joue-la en imaginant les accords, puis (mieux) enregistre-toi jouant Am | F et improvise par-dessus.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'L’exercice « une note par accord »',
   body:[
    'Le drill des écoles de jazz, version guitare : sur la grille Am–F–C–G (mets ta grille d’atelier en boucle mentalement ou enregistre-la), joue UNE SEULE note par mesure — la tierce de l’accord. Rien d’autre.',
    'C’est minimaliste et étrangement beau : quatre notes qui racontent toute la grille. Quand c’est fluide, ajoute une note d’approche avant chaque tierce.'
   ],
   tips:['Tierces de la grille : Do (Am), La (F), Mi (C), Si (G). Trouve chacune dans ta boîte AVANT de lancer le chrono.']}
 ]},

{day:87, est:20, title:'Arpèges m7 : le vocabulaire s’enrichit',
 tags:['Impro','Arpèges','Couleurs'],
 intro:'Tes accords ont des septièmes depuis la semaine 7 ; tes arpèges les méritent aussi. Quatre notes au lieu de trois — et des phrases qui sonnent soudain sophistiquées sans effort.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La quatrième note du dessin',
   body:[
    'L’arpège **m7** ajoute la septième : sur Am7 → La, Do, Mi, **Sol**. Et surprise : ces quatre notes sont TOUTES dans ta pentatonique de La mineur. L’arpège m7 est un chemin caché de ta boîte.',
    'Conséquence : tout ce que tu improvises en penta peut se « réorganiser » en arpège m7 — plus mélodique, plus coulé.'
   ],
   tips:['Penta = 5 notes. Arpège m7 = 4 de ces 5. La note exclue ? Le Ré. Le savoir, c’est déjà entendre différemment.']},
  {kind:'tab', tab:{tempo:74, bpb:4, events:[
    {notes:[{s:0,f:5}], beats:0.5},{notes:[{s:1,f:3}], beats:0.5},
    {notes:[{s:1,f:7}], beats:0.5},{notes:[{s:2,f:5}], beats:0.5},
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:4,f:5}], beats:0.5},
    {notes:[{s:5,f:3}], beats:0.5},{notes:[{s:5,f:5,t:'~'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Am7 déplié sur six cordes',
   body:'Écoute l’arpège complet : La, Do, Mi, Sol qui grimpent à travers toute la boîte, jusqu’au Sol aigu (case 3) et au La final. Joue-le lentement, montée-descente, comme une gamme de quatre notes.',
   tips:['Le Sol aigu en case 3 t’oblige à un petit recul de l’index : c’est voulu — la boîte s’étire, ton jeu aussi.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Le va-et-vient penta ↔ arpège',
   body:[
    'Improvise en alternant les casquettes : deux mesures « pentatonique libre », deux mesures « arpège m7 strict ». Écoute la respiration entre le vague et le précis.',
    'C’est exactement ainsi que phrasent les solistes mûrs : des zones de liberté, des points d’ancrage. Tu possèdes maintenant les deux.'
   ],
   tips:['Astuce d’oreille : termine chaque phrase d’arpège sur la septième (Sol) — cette fin « ouverte » appelle la suite. Délicieux.']}
 ]},

{day:88, est:20, title:'Raconter les accords : le solo qui suit la grille',
 tags:['Impro','Arpèges','Phrasé'],
 intro:'Le grand basculement : jusqu’ici, une gamme survolait toute la grille. Aujourd’hui, ton solo CHANGE avec chaque accord — il ne survole plus, il épouse. C’est le jeu « à travers les changements ».',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Un accord, un territoire',
   body:[
    'La méthode : pour chaque accord de la grille, connais son **mini-arpège** dans la zone où tu joues. Quand l’accord change, ton centre de gravité change — de deux ou trois cases à peine.',
    'L’auditeur, lui, entend un solo qui « sait où il va ». C’est indéfinissable et immédiatement audible.'
   ],
   tips:['Pas besoin de tout jouer : graviter autour du bon arpège suffit. La gamme reste ta colle entre les ancres.']},
  {kind:'tab', tab:{tempo:68, bpb:4, events:[
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:3,f:5}], beats:0.5},{notes:[{s:2,f:7}], beats:1},
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:3,f:5}], beats:0.25},{notes:[{s:3,f:7}], beats:0.25},{notes:[{s:2,f:8}], beats:1},
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:4,f:5}], beats:0.5},{notes:[{s:3,f:5,t:'~'}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Trois mesures qui suivent Am → F → C',
   body:'Écoute : la phrase gravite autour de La-Do-Mi (mesure Am), glisse vers La-Do-**Fa** (le Fa case 8 de la corde de La… non — écoute le Fa apparaître !), puis se pose sur Mi-Sol-Do (mesure C). Trois centres, une seule ligne.',
   tips:['Rejoue-la en disant le nom de l’accord imaginaire à chaque mesure : « Am… Fa… Do ». La carte mentale se construit en parlant.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'La grille au ralenti extrême',
   body:[
    'Exercice de conservatoire : la grille Am–F–C–G à 50 bpm mental, UNE mesure par accord, et tu improvises en changeant d’arpège à chaque mesure. La lenteur rend le changement conscient.',
    'Rater est normal les dix premières fois. C’est l’exercice le plus difficile du parcours — et le plus transformateur. Sois patient avec toi.'
   ],
   tips:['Si c’est trop dur : réduis à DEUX accords (Am–F) en boucle. Maîtrise le duo, puis élargis. La difficulté se découpe.']}
 ]},

{day:89, est:20, title:'Le solo mélodique : ta signature',
 tags:['Impro','Phrasé','Composition'],
 intro:'Synthèse de la semaine : composer (oui, composer) un solo de huit mesures qui vise les tierces, respire, et se chante. Un solo qu’on retient, pas un solo qui remplit.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Un solo s’écrit comme une mélodie',
   body:[
    'Les solos mémorables ne sont pas improvisés au hasard : ils ont un **motif** (une petite cellule de 3-5 notes), répété, varié, transporté d’accord en accord.',
    'Ta recette : invente un motif de 4 notes qui finit sur une tierce → répète-le sur l’accord suivant en l’ajustant d’une note → monte-le d’une octave au sommet → redescends pour conclure sur la fondamentale.'
   ],
   tips:['Test infaillible : si tu peux CHANTER ton solo, il est bon. Si tu ne peux pas, il est bavard.']},
  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},{notes:[{s:4,f:5}], beats:0.5},{notes:[{s:3,f:5}], beats:0.5},
    {rest:true, beats:1},
    {notes:[{s:3,f:7}], beats:0.5},{notes:[{s:4,f:5}], beats:0.5},{notes:[{s:4,f:6}], beats:0.5},{notes:[{s:3,f:7,t:'~'}], beats:1.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Un motif, sa variation, un silence',
   body:'Écoute la mécanique à nu : cellule de quatre notes… silence (oui, LE silence)… la même cellule décalée qui se pose ailleurs. C’est petit, chantable, et ça sonne déjà comme une intention.',
   tips:['Le silence au milieu n’est pas du vide : c’est le moment où l’auditeur chante la suite dans sa tête. Offre-le-lui.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Compose, joue, enregistre',
   body:[
    'À toi : un motif de 4 notes dans ta boîte, la recette du bloc 1, huit mesures sur Am–F–C–G. Écris-le si ça aide (cases sur un papier), joue-le jusqu’à le posséder, **enregistre-le**.',
    'Range-le avec tes huit mesures du jour 82 : ton dossier « compositions » compte maintenant deux pièces. Il grossira.'
   ],
   tips:['Un solo composé aujourd’hui devient un réflexe improvisé dans un mois. C’est ainsi que se construit un vocabulaire — phrase par phrase.']}

{day:92, est:20, title:'Le boom-chick : batterie incluse',
 tags:['Arrangement','Percussif','Groove'],
 intro:'Semaine « homme-orchestre » : faire sonner une guitare seule comme un groupe complet. Fondation numéro un : le boom-chick — basse ET caisse claire dans la même main droite.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Basse + batterie, un seul poignet',
   body:[
    'Le motif : temps 1, le pouce joue la **basse** de l’accord (boom). Temps 2, la paume **frappe** les cordes (chick — ton chuck du jour 40). Temps 3, une autre basse. Temps 4, chick.',
    'Boom-chick-boom-chick : la moitié de la country, du folk et du hip-hop acoustique tient sur ce squelette.'
   ],
   tips:['Le chick remplace un coup gratté : c’est le MÊME mouvement de bras, mais la paume atterrit au lieu du médiator.']},
  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:1},{notes:[{s:1,f:3,t:'X'}], beats:1},
    {notes:[{s:2,f:2}], beats:1},{notes:[{s:1,f:3,t:'X'}], beats:1},
    {notes:[{s:1,f:3}], beats:1},{notes:[{s:1,f:3,t:'X'}], beats:1},
    {notes:[{s:2,f:2}], beats:1},{notes:[{s:1,f:3,t:'X'}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Boom-chick sur Do',
   body:'Écoute le squelette : basse Do, frappe, basse Mi, frappe (les X symbolisent le claquement de paume — sur ta guitare, c’est un vrai « chick » percussif). Reproduis, métronome à 72, jusqu’à l’hypnose.',
   tips:['Remarque : les basses alternent comme dans le Travis (semaine 10). Rien ne se perd, tout se combine.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'La grille rythmée',
   body:[
    'Boom-chick sur Do – Sol – La mineur – Fa, deux mesures par accord. Puis la variante « boom-chick-A-chick » : ajoute un petit coup gratté vers le haut juste après chaque frappe.',
    'Debout si possible : ce motif se joue avec le corps entier. Le public tape du pied sans savoir pourquoi — toi, tu sais.'

   tips:['Basses de la grille : Do→La(3), Sol→Mi grave(3), Am→La(0), Fa→Ré(3 en Fmaj7 ou Mi grave(1) en barré).']}
 ]},

{day:93, est:20, title:'La mélodie au sommet des accords',
 tags:['Arrangement','Phrasé','Singer-songwriter'],
 intro:'Deuxième instrument du groupe : le chanteur. Sauf qu’ici, c’est ta corde aiguë qui chante — une mélodie posée AU-DESSUS des accords tenus. L’illusion à deux voix commence.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'L’accord en dessous, la voix au-dessus',
   body:[
    'Le principe : tiens l’accord normalement, mais l’auriculaire (et parfois l’annulaire) reste **libre** pour attraper des notes de mélodie sur les cordes de Si et Mi aigu.',
    'La main droite gratte les graves de l’accord et fait ressortir la corde du haut — la mélodie flotte, l’harmonie porte.'
   ],
   tips:['Fais SONNER la note aiguë plus fort que le reste : incline légèrement l’attaque vers elle. La mélodie doit dominer.']},
  {kind:'tab', tab:{tempo:66, bpb:4, events:[
    {notes:[{s:1,f:3},{s:3,f:0},{s:4,f:1},{s:5,f:0}], beats:1},
    {notes:[{s:5,f:1}], beats:0.5},{notes:[{s:5,f:3}], beats:0.5},
    {notes:[{s:1,f:3},{s:3,f:0},{s:4,f:1},{s:5,f:3}], beats:1},
    {notes:[{s:5,f:1}], beats:0.5},{notes:[{s:5,f:0,t:'~'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Do qui chante',
   body:'Écoute : l’accord de Do sonne, et la corde de Mi aigu dessine Fa-Sol… puis l’accord revient avec le Sol au sommet, et la mélodie redescend. Un seul instrument, deux voix limpides.',
   tips:['L’auriculaire attrape les cases 1 et 3 du Mi aigu SANS lâcher le reste du Do. C’est un étirement nouveau : patience et douceur.']},
  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Harmonise une mélodie connue',
   body:[
    'Prends quatre notes que tout le monde connaît (l’incipit de « Frère Jacques » : Do-Ré-Mi-Do) et joue-les sur la corde de Si (cases 1-3-5-1) EN TENANT un accord de Do dessous.',
    'C’est le geste fondateur du chord-melody : n’importe quelle mélodie peut s’asseoir sur des accords. Demain, on la fait bouger.'
   ],
   tips:['Si quatre notes passent, essaie la phrase suivante. Si ça coince, une note à la fois : l’indépendance se gagne au détail.']}
 ]},

{day:94, est:20, title:'Les accords qui bougent : hammer-ons intégrés',
 tags:['Arrangement','Technique','Singer-songwriter'],
 intro:'Troisième musicien : celui qui fait vivre les accords de l’intérieur. Hammer-ons et pull-offs DANS l’accord tenu — la broderie qui a fait le son de toute une génération acoustique.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'L’accord respire',
   body:[
    'Au lieu de plaquer un accord figé, un doigt se lève et retombe **pendant** que ça sonne : sus4 qui se résout, seconde qui frotte puis rentre. L’accord devient un organisme.',
    'Les meilleurs spots : la corde de Si sur Do (hammer case 1), la corde de Sol sur Ré (hammer case 2), la corde de Ré sur Am (pull-off 2→0).'
   ],
   tips:['Le doigt qui martèle frappe FORT et PRÈS de la frette : la note doit sonner sans coup de médiator.']},
  {kind:'tab', tab:{tempo:66, bpb:4, events:[
    {notes:[{s:1,f:3},{s:2,f:2},{s:4,f:0}], beats:0.5},{notes:[{s:4,f:1,t:'h'}], beats:0.5},
    {notes:[{s:3,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:1,f:3},{s:2,f:2},{s:4,f:1}], beats:1},
    {notes:[{s:4,f:0}], beats:0.5},{notes:[{s:4,f:1,t:'h'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le Do qui cligne de l’œil',
   body:'Écoute : l’accord de Do sonne avec sa corde de Si à vide, puis le doigt martèle la case 1 — l’accord « cligne » et se complète. Ce micro-geste, répété en rythme, c’est tout le charme du jeu acoustique moderne.',
   tips:['Travaille le geste isolé (corde de Si : vide → hammer case 1) vingt fois, PUIS remets-le dans l’accord complet.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Une broderie par accord',
   body:[
    'Reprends ta grille Do – Sol – La mineur – Fa et installe UNE respiration par accord : hammer sur Do (Si, case 1), hammer sur Sol (La, case 2… essaie !), pull-off sur Am (Ré, 2→0), hammer sur Fa (Sol, case 2 depuis Fmaj7).',
    'Joue la grille brodée en boucle : elle scintille. C’est la même grille qu’au jour 11 — mesure le chemin parcouru.'
   ],
   tips:['Dose : une broderie par mesure maximum. Le clin d’œil charme ; le tic agace.']}
 ]},

{day:95, est:20, title:'Le riff d’intro : accord et mélodie fusionnés',
 tags:['Arrangement','Composition','Riff'],
 intro:'Quatrième pièce : le riff signature — ces intros où basse, accord et mélodie fusionnent en un motif qu’on reconnaît en deux secondes. Aujourd’hui, tu apprends à en fabriquer.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'L’anatomie d’un riff d’intro',
   body:[
    'Un bon riff d’intro contient trois étages compressés : une **basse** qui pose l’accord, un **fragment d’accord** qui remplit, une **note mélodique** qui accroche l’oreille.',
    'La formule éprouvée : basse sur le temps 1 → deux notes d’accord → la note d’accroche (souvent hors accord : une sus4, une 9e) → résolution. Quatre temps, une identité.'
   ],
   tips:['Pense aux intros que tu reconnais en une seconde : presque toutes suivent cette anatomie. Écoute-les ce soir avec ces lunettes.']},
  {kind:'tab', tab:{tempo:70, bpb:4, events:[
    {notes:[{s:1,f:0}], beats:0.5},{notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5},{notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:5,f:3}], beats:0.5},{notes:[{s:5,f:1,t:'p'}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5},{notes:[{s:3,f:2,t:'~'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Un riff témoin sur La mineur',
   body:'Écoute l’anatomie en action : basse de La, deux notes d’accord qui montent, l’accroche (le Sol aigu, case 3) qui retombe en pull-off, et la résolution qui se pose. Huit notes, une signature.',
   tips:['Apprends-le par cœur : c’est un GABARIT. Chaque note peut être remplacée — la structure, elle, reste.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Fabrique le tien',
   body:[
    'Compose ton riff d’intro pour tes huit mesures du jour 82 : même anatomie (basse → accord → accroche → résolution), TES notes. Deux contraintes : quatre temps, et jouable en boucle sans trou.',
    'Un morceau qui commence par un riff à toi n’est plus un exercice : c’est une chanson qui attend ses paroles.'
   ],
   tips:['Bloqué ? Change UNE note du riff témoin, puis deux, puis trois. La création par mutation est une vraie méthode — la nature l’utilise depuis toujours.']}
 ]},

{day:96, est:20, title:'L’arrangement complet : couplet, refrain, toi',
 tags:['Arrangement','Composition','Synthèse'],
 intro:'Assemblage final de la semaine : un couplet et un refrain arrangés de bout en bout, seul, avec tout l’attirail — boom-chick, broderies, mélodie, dynamiques. Le groupe, c’est toi.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Le plan de l’homme-orchestre',
   body:[
    'La règle d’or d’un arrangement solo : **chaque section a UN rôle rythmique différent**. Si le couplet est boom-chick, le refrain est gratté ouvert. Si le couplet murmure en Travis, le refrain claque en chuck.',
    'Ton plan du jour : intro = ton riff d’hier (×2) → couplet = boom-chick avec une broderie → refrain = gratté doubles-croches, accords pleins → retour au riff.'
   ],
   tips:['Le contraste entre sections EST l’arrangement. Un auditeur doit savoir « où il est » les yeux fermés.']},
  {kind:'chords', chords:['Am','F','C','G'], tempo:70, perBeats:4, eyebrow:'Le terrain', num:'02',
   title:'La grille des deux sections',
   body:'Ta grille de la semaine, qui servira aux deux sections — c’est le TRAITEMENT qui les différenciera, pas les accords. Écoute-la, puis joue-la une fois en boom-chick, une fois grattée pleine puissance.',
   tips:['Même grille, deux mondes : la preuve définitive que le rythme est un instrument.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Le morceau, du début à la fin',
   body:[
    'Enchaîne le plan complet : riff ×2 → couplet (8 mesures) → refrain (8 mesures) → riff final. Sans t’arrêter, même en cas d’accroc — la continuité prime sur la perfection.',
    '**Enregistre la prise entière.** Compare mentalement avec ton jour 20 : à l’époque, « jouer un morceau » était l’exploit. Aujourd’hui, tu l’arranges.'
   ],
   tips:['Garde cet enregistrement : la semaine 17 (interprétation) le reprendra pour le faire respirer encore plus.']}
 ]},

/* ===== S15 — TECHNIQUE : VITESSE & PRÉCISION (jours 99-103) ===== */
{day:99, est:20, title:'La méthode des paliers : la vitesse qui se construit',
 tags:['Technique','Vitesse','Méthode'],
 intro:'Semaine de gymnase. On commence par LA méthode validée par la recherche sur l’expertise : travailler au seuil, monter par petits paliers, redescendre sans ego. La vitesse est une conséquence, jamais un objectif.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Le protocole +4 bpm',
   body:[
    'Le protocole exact : (1) choisis un motif court, (2) trouve le tempo où tu le joues **parfaitement trois fois de suite**, (3) monte de **4 bpm**, (4) trois passages parfaits ? remonte. Une seule erreur ? tu RESTES — ou tu redescends de 4.',
    'La pratique au seuil (ni facile, ni impossible) est le cœur de la « pratique délibérée » décrite par Ericsson : c’est là, et seulement là, que le cerveau recâble.'
   ],
   tips:['Note ton bpm de départ et ton bpm final CHAQUE séance. La courbe qui monte est le meilleur carburant de motivation qui existe.']},
  {kind:'tab', tab:{tempo:80, bpb:4, events:[
    {notes:[{s:0,f:5}], beats:0.5},{notes:[{s:0,f:7}], beats:0.5},
    {notes:[{s:1,f:5}], beats:0.5},{notes:[{s:1,f:7}], beats:0.5},
    {notes:[{s:2,f:5}], beats:0.5},{notes:[{s:2,f:7}], beats:0.5},
    {notes:[{s:1,f:5}], beats:0.5},{notes:[{s:1,f:7}], beats:0.5}
  ]}, eyebrow:'Le motif-test', num:'02',
   title:'Ton motif étalon',
   body:'Un motif de pentatonique en huit notes, exprès simple : c’est ton COBAYE pour la méthode. Écoute-le, puis applique le protocole : trouve ton seuil (probablement entre 70 et 90), et grimpe par paliers de 4.',
   tips:['« Parfait » = chaque note nette, égale en volume, pile sur le clic, aller-retour strict. Sois un juge intraitable : c’est le juge qui fait le progrès.']},
  {kind:'text', eyebrow:'Pour ancrer', num:'03',
   title:'Pourquoi jouer lent rend rapide',
   body:[
    'À vitesse lente, ton cerveau encode le geste EXACT ; à vitesse forcée, il encode l’approximation — et l’approximation, répétée, devient permanente. On ne muscle pas la vitesse : on grave la précision, et la vitesse émerge.',
    'Le métronome de chaque exercice est ton labo : cette semaine, chaque outil de l’app devient un appareil de mesure.'
   ],
   tips:['Mantra de la semaine : « lent est lisse, lisse est rapide ». Les tireurs d’élite le disent — les guitaristes devraient.']}
 ]},

{day:100, est:20, title:'Legato : l’endurance de la main gauche',
 tags:['Technique','Legato','Endurance'],
 intro:'Jour 100 ! On le fête avec le legato : des chaînes de hammer-ons et pull-offs où la main droite ne joue presque plus. La main gauche devient autonome, forte, chantante.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Une attaque, quatre notes',
   body:[
    'Le **legato** : une seule attaque de médiator, puis les doigts de la main gauche fabriquent les notes suivantes (hammer, pull, hammer…). Le son devient fluide, liquide, vocal.',
    'Le secret de l’endurance : la force vient de la **frappe rapide**, pas de la pression continue. Entre deux notes, la main est détendue.'
   ],
   tips:['Si l’avant-bras chauffe, tu presses trop entre les notes. Frappe, relâche, frappe. Jamais de crampe : elle enseigne le mauvais geste.']},
  {kind:'tab', tab:{tempo:66, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:3,f:7,t:'h'}], beats:0.5},
    {notes:[{s:3,f:5,t:'p'}], beats:0.5},{notes:[{s:3,f:7,t:'h'}], beats:0.5},
    {notes:[{s:3,f:5,t:'p'}], beats:0.5},{notes:[{s:3,f:7,t:'h'}], beats:0.5},
    {notes:[{s:3,f:5,t:'p'}], beats:0.5},{notes:[{s:3,f:7,t:'h'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'La chaîne infinie',
   body:'Écoute : UNE attaque, puis hammer-pull-hammer-pull en boucle entre les cases 5 et 7. Le son coule sans interruption. Reproduis : attaque la première note, puis laisse la main gauche vivre seule.',
   tips:['Chaque note de la chaîne doit avoir le MÊME volume que la première. C’est le critère — et c’est dur. Applique la méthode des paliers d’hier.']},
  {kind:'tab', tab:{tempo:64, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:0.25},{notes:[{s:3,f:7,t:'h'}], beats:0.25},{notes:[{s:3,f:8,t:'h'}], beats:0.5},
    {notes:[{s:4,f:5}], beats:0.25},{notes:[{s:4,f:7,t:'h'}], beats:0.25},{notes:[{s:4,f:8,t:'h'}], beats:0.5},
    {notes:[{s:5,f:5}], beats:0.25},{notes:[{s:5,f:7,t:'h'}], beats:0.25},{notes:[{s:5,f:8,t:'~'}], beats:1.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'Le double hammer qui grimpe',
   body:'Trois notes par corde en legato (une attaque, deux hammers), qui traversent trois cordes vers l’aigu. C’est le geste des solistes fluides — et un excellent test d’égalité des doigts.',
   tips:['L’auriculaire est le maillon faible de tous les guitaristes : donne-lui deux répétitions de plus qu’aux autres. Toujours.']}
 ]},

{day:101, est:20, title:'Traverser les cordes : le saut précis',
 tags:['Technique','Médiator','Précision'],
 intro:'Les fausses notes ne viennent presque jamais des cases : elles viennent des CHANGEMENTS de corde. Aujourd’hui, on entraîne exactement ça — le saut de corde, jusqu’au sans-faute.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le médiator vole bas',
   body:[
    'Le principe d’économie : après chaque note, le médiator s’arrête **au ras** de la corde suivante — jamais de grand geste. Moins il voyage, moins il rate.',
    'Pour les sauts (passer une corde sans la jouer), le poignet pivote légèrement : c’est une rotation, pas un déplacement du bras.'
   ],
   tips:['Regarde ta main droite pendant cet exercice (exceptionnellement) : le mouvement doit être quasi invisible.']},
  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:7}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},
    {notes:[{s:1,f:7}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:4,f:7}], beats:0.5},
    {notes:[{s:2,f:7}], beats:0.5},{notes:[{s:4,f:7}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le saut d’une corde',
   body:'Écoute : corde de La ↔ corde de Sol (en sautant le Ré), puis Ré ↔ Si (en sautant le Sol). Le piège : effleurer la corde sautée. Le but : silence total entre les notes voulues.',
   tips:['Méthode des paliers, encore : trouve le tempo du sans-faute, monte de 4. La précision se cultive comme la vitesse.']},
  {kind:'tab', tab:{tempo:70, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:0.5},{notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:1,f:3}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:0.5},{notes:[{s:5,f:0}], beats:0.5}
  ]}, eyebrow:'Application', num:'03',
   title:'L’arpège éclaté',
   body:'Un arpège de Do aux cordes NON adjacentes : La→Si, Ré→Mi aigu. C’est le saut de corde en situation musicale réelle — exactement ce que tes arpèges de la semaine 13 exigeront à haute vitesse.',
   tips:['Si une corde parasite sonne, ta main gauche peut aider : le bout des doigts effleure les cordes voisines pour les étouffer. Défense à deux mains.']}
 ]},

{day:102, est:20, title:'La synchronisation : deux mains, un cerveau',
 tags:['Technique','Précision','Méthode'],
 intro:'La netteté d’un guitariste tient à un micro-détail invisible : les deux mains agissent au MÊME millième de seconde. Aujourd’hui, l’exercice-roi de la synchronisation — et ses variantes rythmiques.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le flou vient du décalage',
   body:[
    'Une note « sale » = la main gauche a appuyé un rien trop tôt ou trop tard par rapport à l’attaque. Le remède : l’exercice chromatique **1-2-3-4**, joué en conscience, chaque note comme un diamant.',
    'Le multiplicateur d’efficacité : varier les RYTHMES sur le même doigté. Le cerveau ne peut plus jouer en pilote automatique — il synchronise vraiment.'
   ],
   tips:['Ce n’est pas un échauffement aujourd’hui : c’est L’exercice. La différence est dans l’attention portée à chaque attaque.']},
  {kind:'tab', tab:{tempo:76, bpb:4, events:[
    {notes:[{s:1,f:5}], beats:0.5},{notes:[{s:1,f:6}], beats:0.5},{notes:[{s:1,f:7}], beats:0.5},{notes:[{s:1,f:8}], beats:0.5},
    {notes:[{s:2,f:5}], beats:0.75},{notes:[{s:2,f:6}], beats:0.25},{notes:[{s:2,f:7}], beats:0.75},{notes:[{s:2,f:8}], beats:0.25}
  ]}, eyebrow:'La cible', num:'02',
   title:'Droit, puis galopé',
   body:'Écoute : la première corde en croches égales, la deuxième en rythme « galop » (longue-courte). Même doigté 1-2-3-4, deux horloges. Reproduis, puis inverse (courte-longue) : ton cerveau proteste — c’est le signe qu’il travaille.',
   tips:['Trois rythmes à faire tourner : égal, longue-courte, courte-longue. Deux minutes chacun, méthode des paliers.']},
  {kind:'text', eyebrow:'Pour ancrer', num:'03',
   title:'Le scanner de netteté',
   body:[
    'Test final : joue le 1-2-3-4 très lentement (60 bpm) en écoutant CHAQUE attaque au microscope. Une note qui « clique », « frise » ou « bave » = un décalage à corriger sur-le-champ.',
    'Cinq minutes de ce scanner valent une heure de gammes distraites. La pratique délibérée, c’est exactement cette qualité d’attention.'
   ],
   tips:['Ton oreille est ton meilleur professeur de technique : elle entend des défauts que tes yeux ne voient pas.']}
 ]},

{day:103, est:20, title:'Le chrono des barrés : retour aux sources, en vitesse',
 tags:['Technique','Barré','Méthode'],
 intro:'Boucle bouclée : les barrés du jour 1, revisités avec tes outils de la semaine — chrono, paliers, changements en une minute. Mesure noir sur blanc le chemin parcouru en cent jours.',

  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Le test des changements en 1 minute',
   body:[
    'Le protocole du jour : choisis une paire d’accords, lance le minuteur d’une carte réglé sur 1 minute, et compte les changements **propres** (les six cordes sonnent). Note le score. Rejoue. Bats-le.',

   tips:['Le glissé se fait pression relâchée mais doigts EN CONTACT avec les cordes : l’index surfe, il ne décolle pas.']},

   body:[
    'Quatre accords, quatre défis : forme E majeure, forme A majeure, ouvert, forme Em mineure. Deux temps chacun, en boucle. C’est un slalom — chaque type de changement que tu connais, enchaîné.',
    'Applique les paliers : tempo du sans-faute, +4, +4… Note ton tempo final quelque part : dans deux semaines, tu le retesteras.'
   ],
   tips:['Il y a 103 jours, tenir UN Fa était le sommet. Aujourd’hui tu slalomes entre quatre formes au chrono. Prends deux secondes pour le réaliser.']}
 ]}

{day:106, est:20, title:'Apprendre un morceau : la méthode du découpage',
 tags:['Répertoire','Méthode','Chanson'],
 intro:'Semaine répertoire : on monte de vrais morceaux. Mais d’abord, LA méthode — car la différence entre celui qui apprend une chanson en trois jours et celui qui rame trois mois, c’est le découpage.',

    {notes:[{s:2,f:2}], beats:0.5},{notes:[{s:3,f:0}], beats:0.5}
  ]}, eyebrow:'La cible', num:'01',
   title:'Le motif sur Do (mesure 1)',
   body:[
    'Écoute la mesure d’ouverture : la pompe du pouce, un pincé avec le Mi aigu à vide, puis le pincé avec le **Sol aigu** (case 3) — cette note qui monte fait toute la mélancolie du morceau.',
    'Boucle-la seule, méthode d’hier : trois passages parfaits avant d’aller plus loin.'
   ],
   tips:['L’auriculaire attrape le Sol (case 3) sans lâcher le Do : tu l’as appris au jour 93 — tout converge.']},
  {kind:'tab', tab:{tempo:63, bpb:4, events:[
    {notes:[{s:1,f:0},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:3,f:2}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:3},{s:5,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:3,f:2}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5}
  ]}, eyebrow:'Section 3', num:'02',
   title:'Le motif sur Am puis Fmaj7',
   body:'La suite : même dessin de main droite, basses adaptées (La à vide, puis le Fa grave de la corde de Ré case 3 pour Famaj7). Écoute comme le motif « berce » différemment selon l’accord — c’est la signature du morceau.',
   tips:['Le pouce navigue, les doigts ne changent presque rien : la carte des basses du jour 67 en action.']},
  {kind:'text', eyebrow:'La soudure', num:'03',
   title:'Assemble les quatre mesures',
   body:[
    'Soude : mesure de Do → mesure de Sol/Si (même motif, basse Si = corde de La case 2) → Am → Fmaj7. Le couplet complet d’« Ajaccio » tourne en boucle, hypnotique.',
    'Trois tours propres = section acquise. Enregistre le couplet : demain on attaque un tout autre climat.'
   ],
   tips:['Joue-le UNE fois en pensant à la baie d’Ajaccio au couchant. Oui, vraiment : l’imagerie mentale améliore l’exécution — c’est documenté.']}
