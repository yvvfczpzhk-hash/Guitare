/* ----- métronome ----- */
const Metro={ on:false, bpm:80, beats:4, cur:0, next:0, timer:null, lookahead:0.1, schedAhead:0.12 };
function metroClick(time, isOne){
  Audio.ensure();
  const o=Audio.ctx.createOscillator(), g=Audio.ctx.createGain();
  o.frequency.value=isOne?1500:900; o.type='square';
  g.gain.setValueAtTime(0.0001,time); g.gain.exponentialRampToValueAtTime(isOne?0.4:0.25,time+0.001); g.gain.exponentialRampToValueAtTime(0.0001,time+0.05);
  o.connect(g); g.connect(Audio.master); o.start(time); o.stop(time+0.06);
}
function metroSchedule(){
  while(Metro.next < Audio.ctx.currentTime + Metro.schedAhead){
    const isOne = Metro.cur%Metro.beats===0;
    metroClick(Metro.next, isOne);
    const beatIdx=Metro.cur%Metro.beats;
    const delay=(Metro.next-Audio.ctx.currentTime)*1000;
    setTimeout(()=>flashDot(beatIdx), Math.max(0,delay));
    Metro.next += 60/Metro.bpm;
    Metro.cur++;
  }
}
function flashDot(i){
  const dots=document.querySelectorAll('#mDots .mdot');
  dots.forEach(d=>d.classList.remove('beat'));
  if(dots[i]) dots[i].classList.add('beat');
  setTimeout(()=>{ if(dots[i])dots[i].classList.remove('beat'); },120);
}
function buildDots(){
  const c=document.getElementById('mDots'); if(!c) return; c.innerHTML='';
  for(let i=0;i<Metro.beats;i++){ const d=document.createElement('div'); d.className='mdot'+(i===0?' one':''); c.appendChild(d); }
}
function initMetronome(){
  Metro.bpm=80; Metro.beats=4;
  buildDots();
  const sig=document.getElementById('mSig'); sig.innerHTML='';
  [2,3,4,6].forEach(n=>{ const b=document.createElement('button'); b.className='chipbtn'+(n===4?' on':''); b.textContent=n+'/4'; b.onclick=()=>{ Metro.beats=n; Metro.cur=0; buildDots(); sig.querySelectorAll('.chipbtn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }; sig.appendChild(b); });
  const range=document.getElementById('mRange'), bpmEl=document.getElementById('mBpm');
  const setB=v=>{ Metro.bpm=v; range.value=v; bpmEl.innerHTML=v+'<small>BPM</small>'; };
  range.oninput=()=>setB(+range.value);
  document.getElementById('mMinus').onclick=()=>setB(Math.max(40,Metro.bpm-1));
  document.getElementById('mPlus').onclick=()=>setB(Math.min(200,Metro.bpm+1));
  const tg=document.getElementById('mToggle');
  tg.onclick=()=>{ Audio.ensure();
    if(Metro.on){ Metro.on=false; clearInterval(Metro.timer); tg.classList.remove('playing'); tg.innerHTML=I.play+'<span>Démarrer</span>'; }
    else { Metro.on=true; Metro.cur=0; Metro.next=Audio.ctx.currentTime+0.08; metroSchedule(); Metro.timer=setInterval(metroSchedule,Metro.lookahead*1000); tg.classList.add('playing'); tg.innerHTML=I.stop+'<span>Arrêter</span>'; }
  };
}

/* ----- accordeur ----- */
function initTuner(){
  const c=document.getElementById('tuner'); if(!c) return; c.innerHTML='';
  const names=['Mi','La','Ré','Sol','Si','Mi']; const sub=['grave · 6','5','4','3','2','aigu · 1'];
  for(let s=0;s<6;s++){ const el=document.createElement('button'); el.className='tstr';
    el.innerHTML='<span class="tn">'+names[s]+'</span><span class="ts">'+sub[s]+'</span>';
    el.onclick=()=>{ Audio.ensure(); Audio.note(OPEN_FREQ[s],Audio.ctx.currentTime+0.03,{dur:3.4,gain:0.26}); el.classList.add('ring'); setTimeout(()=>el.classList.remove('ring'),1400); };
    c.appendChild(el);
  }
}

/* ----- explorateur d'accords ----- */
const CHORD_GROUPS=[
  {t:'Accords ouverts', k:['C','A','G','E','D','Am','Em','Dm','Cadd9','Asus2','Dsus4','Fmaj7']},
  {t:'Barrés majeurs (forme E)', k:['F','F#','G(b)','A(b)','B']},
  {t:'Barrés mineurs (forme Em)', k:['Fm','Gm','Bm(e)']},
  {t:'Barrés (forme A)', k:['Bb','B(a)','C(a)','D(a)','Bm','Cm']},
  {t:'Power chords', k:['F5','G5','A5']},
];
function initChordExp(){
  const c=document.getElementById('chordExp'); if(!c) return;
  let h='<div class="selrow" id="chordPick">';
  CHORD_GROUPS.forEach((g,gi)=>{ h+='<span class="lab">'+g.t+'</span>'; g.k.forEach(k=>{ h+='<button class="opt" data-ch="'+k+'">'+chordLabel(k)+'</button>'; }); });
  h+='</div><div id="chordView" class="diagram-wrap"></div>';
  c.innerHTML=h;
  const view=document.getElementById('chordView');
  function show(k){ const ch=CHORDS[k];
    c.querySelectorAll('.opt').forEach(o=>o.classList.toggle('on',o.getAttribute('data-ch')===k));
    view.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px"><div>'+renderChord(ch.frets,ch.fingers,ch.barres,{w:150,h:190})+'</div>'
      +'<div class="cname mono" style="font-size:18px;color:var(--brass-hi)">'+chordLabel(k)+'</div>'
      +'<button class="playbtn" id="chPlay">'+I.ear+'<span>Écouter</span></button></div>';
    document.getElementById('chPlay').onclick=()=>{ Audio.ensure(); Audio.strum(chordFreqs(ch.frets),Audio.ctx.currentTime+0.04,{dir:'down'}); };
  }
  c.querySelectorAll('.opt').forEach(o=>o.onclick=()=>show(o.getAttribute('data-ch')));
  show('F');
}

/* ----- explorateur de gammes ----- */
const SC_LIST=[['minPenta','Penta. min'],['majPenta','Penta. maj'],['blues','Blues'],['major','Majeure'],['natMinor','Mineure'],['dorian','Dorien'],['mixo','Mixolydien']];
const ScaleExp={root:'A',scale:'minPenta',start:5,span:4,names:false,playId:'SX'};
function initScaleExp(){
  const c=document.getElementById('scaleExp'); if(!c) return;
  let h='<div class="selrow" id="sxRoot"><span class="lab">Fondamentale</span>';
  NOTE_LET.forEach((n,i)=>{ h+='<button class="opt'+(n==='A'?' on':'')+'" data-root="'+n+'">'+n+'<small>'+NOTE_LAT[i]+'</small></button>'; });
  h+='</div><div class="selrow" id="sxScale"><span class="lab">Gamme</span>';
  SC_LIST.forEach(([k,lab])=>{ h+='<button class="opt'+(k==='minPenta'?' on':'')+'" data-scale="'+k+'">'+lab+'</button>'; });
  h+='</div>';
  h+='<div class="fretslide"><span>Case '+'<b id="sxStartLbl">5</b></span><input type="range" id="sxStart" min="0" max="14" value="5"><button class="subbtn" id="sxNames">'+I.grid+'<span>Noms</span></button></div>';
  h+='<div class="fretwrap" id="sxWrap"></div>';
  h+='<div class="audiobar"><button class="playbtn" id="sxPlay">'+I.ear+'<span>Écouter la gamme</span></button>'
    +'<span class="tempo"><span>Tempo</span><input type="range" id="sxTempo" min="50" max="160" value="100"><span class="bpm mono" id="sxBpm">100 bpm</span></span>'
    +'<button class="subbtn" id="sxLoop">'+I.loop+'<span>Boucle</span></button></div>';
  c.innerHTML=h;

  PLAYABLES['SX']={type:'scale',events:[],refs:{},tempo:100,loop:false};
  function rebuild(){
    const rootPc=letToPc(ScaleExp.root); const sc=SCALES[ScaleExp.scale];
    const fEnd=Math.min(22,ScaleExp.start+ScaleExp.span);
    const built=buildScale(rootPc,sc.iv,ScaleExp.start,fEnd,{names:ScaleExp.names});
    document.getElementById('sxWrap').innerHTML=built.html;
    const P=PLAYABLES['SX']; P.events=built.events; P.refs=built.refs;
    // pour stepScale + clear
    P._wrap='sxWrap';
  }
  c.querySelectorAll('[data-root]').forEach(b=>b.onclick=()=>{ ScaleExp.root=b.getAttribute('data-root'); c.querySelectorAll('[data-root]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); rebuild(); });
  c.querySelectorAll('[data-scale]').forEach(b=>b.onclick=()=>{ ScaleExp.scale=b.getAttribute('data-scale'); c.querySelectorAll('[data-scale]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); rebuild(); });
  const st=document.getElementById('sxStart');
  st.oninput=()=>{ ScaleExp.start=+st.value; document.getElementById('sxStartLbl').textContent=st.value; rebuild(); };
  document.getElementById('sxNames').onclick=function(){ ScaleExp.names=!ScaleExp.names; this.classList.toggle('on',ScaleExp.names); rebuild(); };
  const tempo=document.getElementById('sxTempo');
  tempo.oninput=()=>{ PLAYABLES['SX'].tempo=+tempo.value; document.getElementById('sxBpm').textContent=tempo.value+' bpm'; if(activePlayId==='SX')Player.tempo=+tempo.value; };
  document.getElementById('sxLoop').onclick=function(){ PLAYABLES['SX'].loop=!PLAYABLES['SX'].loop; this.classList.toggle('on',PLAYABLES['SX'].loop); if(activePlayId==='SX')Player.loop=PLAYABLES['SX'].loop; };
  document.getElementById('sxPlay').onclick=()=>{
    const id='SX'; const P=PLAYABLES[id];
    const btn=document.getElementById('sxPlay');
    if(activePlayId===id){ Player.stop(); btn.classList.remove('playing'); btn.innerHTML=I.ear+'<span>Écouter la gamme</span>'; activePlayId=null; return; }
    if(activePlayId){ Player.stop(); resetPlayBtn(activePlayId);} 
    Audio.ensure(); activePlayId=id; btn.classList.add('playing'); btn.innerHTML=I.stop+'<span>Arrêter</span>';
    Player.play(P.events,{tempo:P.tempo,loop:P.loop,onStep:(i)=>stepScale(P,i),onEnd:()=>{ btn.classList.remove('playing'); btn.innerHTML=I.ear+'<span>Écouter la gamme</span>'; activePlayId=null; }});
  };
  rebuild();
}

/* =========================================================
   ROUTEUR
========================================================= */
/* ----- métronome "jouer avec" (play-along par exercice) ----- */
const ExMetro={ on:false, id:null, bpm:90, beats:4, cur:0, next:0, timer:null };
function exMetroTick(){
  if(!ExMetro.on || !Audio.ctx) return;
  while(ExMetro.next < Audio.ctx.currentTime + 0.15){
    metroClick(ExMetro.next, ExMetro.cur%ExMetro.beats===0);
    ExMetro.next += 60/ExMetro.bpm; ExMetro.cur++;
  }
}
function exMetroStop(){
  if(!ExMetro.on) return;
  ExMetro.on=false; if(ExMetro.timer) clearInterval(ExMetro.timer); ExMetro.timer=null;
  const b=document.querySelector('[data-metro="'+ExMetro.id+'"]'); if(b){ b.classList.remove('on'); const sp=b.querySelector('span'); if(sp) sp.textContent='Métronome'; }
  ExMetro.id=null;
}
function exMetroToggle(id, bpm, beats){
  if(ExMetro.on && ExMetro.id===id){ exMetroStop(); return; }
  if(ExMetro.on) exMetroStop();
  if(activePlayId){ Player.stop(); resetPlayBtn(activePlayId); activePlayId=null; }
  Audio.ensure();
  ExMetro.on=true; ExMetro.id=id; ExMetro.bpm=bpm||90; ExMetro.beats=beats||4; ExMetro.cur=0; ExMetro.next=Audio.ctx.currentTime+0.12;
  exMetroTick(); ExMetro.timer=setInterval(exMetroTick, 60);
  const b=document.querySelector('[data-metro="'+id+'"]'); if(b){ b.classList.add('on'); const sp=b.querySelector('span'); if(sp) sp.textContent='Arrêter le clic'; }
}
function switchView(v){
  Player.stop(); activePlayId=null; stopAllTimers(); exMetroStop();
  if(Metro.on){ Metro.on=false; clearInterval(Metro.timer); }
  document.querySelectorAll('.view').forEach(s=>s.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-view')===v));
  if(v==='path') renderPath();
  if(v==='tools') renderTools();
  if(v==='today' && document.getElementById('view-today').innerHTML.trim()==='') renderToday();
}
document.getElementById('tabbar').addEventListener('click',(e)=>{ const b=e.target.closest('button'); if(b) switchView(b.getAttribute('data-view')); });

/* =========================================================
   INIT
========================================================= */
function boot(){
  updateStreak();
  renderToday();
}

{day:8, est:20, title:'La gamme majeure, mère de tout',

  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Sortir de la boîte',
   body:[
    'La pentatonique se répète tout le long du manche en **positions** qui se chevauchent. Les relier = pouvoir monter dans les aigus sans s’arrêter.',
    'La clé : une note **commune** entre deux positions sert de pont, souvent avec un petit **glissé** (/).' 
   ],
   tips:['Pas besoin de tout connaître : maîtriser deux positions et leur jonction, c’est déjà beaucoup de terrain.']},

  {kind:'scale', root:'A', scale:'minPenta', fret:[5,8], tempo:88,
   eyebrow:'Position 1', num:'02',
   title:'La boîte que tu connais',
   body:'Rappel de la position 1 autour de la case 5. Écoute, échauffe-toi dedans.',
   tips:['C’est ton camp de base : tu y reviens toujours.']},

  {kind:'scale', root:'A', scale:'minPenta', fret:[7,10], tempo:88,
   eyebrow:'Position 2', num:'03',
   title:'La boîte suivante',
   body:[
    'La même gamme, plus haut (cases 7-10). Mêmes notes, autre doigté. Écoute : c’est exactement le même son, plus aigu.',
    'Repère les fondamentales (La) : elles te disent que tu es toujours « chez toi ».'
   ],
   tips:['Apprends-la lentement, comme une nouvelle forme, puis fais le lien avec la position 1.']},

  {kind:'tab', tab:{tempo:80, bpb:4, events:[
    {notes:[{s:5,f:5}], beats:0.5}, {notes:[{s:5,f:8}], beats:0.5},

  ]}, eyebrow:'Exercice', num:'04',
   title:'Le pont entre les deux',
   body:'Une phrase qui monte de la position 1 vers la 2 avec un **glissé** (/). Écoute comment on « voyage » d’une boîte à l’autre.',
   tips:['Le glissé garde le doigt sur la corde : tu déplaces sans regratter.']}
 ],
 routine:[
  '3 min — position 1, aller-retour.',
  '6 min — position 2 seule, jusqu’à ce qu’elle soit en place.',
  '5 min — la phrase de jonction (le glissé), lentement.',

{day:11, est:20, title:'Le rythme : patterns de strumming',
 tags:['Rythme','Main droite','Groove'],
 intro:'On a beaucoup travaillé la main gauche. Place à la droite : c’est elle qui fait danser. Un même accord peut sonner ennuyeux ou irrésistible selon le rythme de la main.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La main qui groove',
   body:[
    'Le secret du rythme : la main droite **ne s’arrête jamais**. Elle descend et remonte en continu, comme un métronome. Tu touches les cordes seulement quand il faut.',
    'On note : **B** = coup vers le bas, **H** = coup vers le haut.'
   ],
   tips:['Garde le poignet souple : le mouvement vient du poignet, pas du bras.']},

  {kind:'chords', chords:['C','G','Am','F'], tempo:72, perBeats:4,
   eyebrow:'La grille', num:'02',
   title:'Do – Sol – Lam – Fa',
   body:[
    'La grille pop par excellence (on l’entend dans des centaines de chansons). Écoute-la tourner, puis pose les accords.',
    'Pour l’instant : un grand coup vers le bas par accord, juste pour enchaîner proprement.'
   ],
   tips:['Mets la **Boucle** : c’est ton terrain de jeu pour le rythme.']},

  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Le pattern « pop » universel',
   body:[
    'Sur 4 temps, joue : `B - B H - H B H`. En clair : bas (1), bas-haut (2), rien-haut (le « et » du 3), bas-haut (4).',
    'La main fait **tous** les mouvements, mais elle ne **frappe** les cordes que sur ces moments-là. Compte « 1 et 2 et 3 et 4 et » à voix haute.'
   ],
   tips:['Si tu te perds, ralentis jusqu’à ce que la main bouge toute seule, sans réfléchir.']},

  {kind:'text', eyebrow:'Pour ancrer', num:'04',
   title:'Un accord, plusieurs vies',
   body:[
    'Prends **un seul** accord (Do) et joue le pattern dessus en boucle 2 minutes. Oublie la main gauche, concentre-toi sur le **groove**.',
    'Ensuite seulement, applique le pattern à la grille entière. La main droite d’abord, toujours.'
   ]}
 ],
 routine:[
  '3 min — main droite à vide : descends/remonte en continu, sans appuyer la gauche.',
  '5 min — le pattern sur un seul accord (Do), jusqu’à ce qu’il roule.',
  '6 min — le pattern sur la grille Do-Sol-Lam-Fa.',
  '4 min — augmente un peu le tempo, garde la régularité.',
  '2 min — joue la grille en chantant ou en fredonnant par-dessus.'
 ]},

{day:12, est:20, title:'Palm muting & dynamique',
 tags:['Rythme','Technique','Main droite'],
 intro:'Toujours jouer à fond, c’est fatigant à écouter. Le palm muting et le jeu sur l’intensité donnent du relief : du chuchotement au cri. C’est ce qui rend un accompagnement vivant.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Étouffer avec la paume',
   body:[
    'Le **palm mute** (PM) : pose le **bord de la paume** de la main droite tout près du chevalet, sur les cordes graves. Le son devient court, étouffé, « tchak ».',
    'Plus tu avances la paume vers le manche, plus c’est étouffé. C’est un dosage, pas un interrupteur.'
   ],
   tips:['La paume reste posée pendant que le médiator attaque : les deux mains travaillent ensemble.']},

  {kind:'tab', tab:{tempo:88, bpb:4, events:[
    {notes:[{s:0,f:0,t:'PM'}], beats:0.5}, {notes:[{s:0,f:0,t:'PM'}], beats:0.5},
    {notes:[{s:0,f:3,t:'PM'}], beats:0.5}, {notes:[{s:0,f:0,t:'PM'}], beats:0.5},
    {notes:[{s:0,f:0},{s:1,f:2}], beats:1},
    {notes:[{s:0,f:0,t:'PM'}], beats:0.5}, {notes:[{s:0,f:3,t:'PM'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Un riff étouffé',
   body:[
    'Un motif sur la corde grave, étouffé à la paume (PM), avec un accord ouvert qui « explose » au milieu. Écoute le contraste.',
    'C’est la base du son rock/pop nerveux : des graves serrés, ponctués d’ouvertures.'
   ],
   tips:['Le contraste entre PM et notes ouvertes, c’est tout l’effet : ne mute pas tout.']},

  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Jouer fort, jouer doux',
   body:[
    'Reprends la grille d’hier (Do-Sol-Lam-Fa). Joue les deux premiers accords **tout doux** (paume légèrement posée), les deux suivants **francs et ouverts**.',
    'Tu crées une **dynamique** : couplet calme, refrain qui s’ouvre. C’est ce qui donne une émotion à un accompagnement.'
   ],
   tips:['Pense « vagues » : l’intensité monte et descend, elle n’est jamais plate.']},

  {kind:'text', eyebrow:'À retenir', num:'04',
   title:'Le relief avant la vitesse',
   body:'Un débutant joue vite et fort. Un musicien joue avec des **nuances**. Travailler le doux/fort te fera progresser plus que n’importe quel plan rapide.'}
 ],
 routine:[
  '3 min — pose la paume, trouve la zone du palm mute sur la corde grave.',
  '6 min — le riff étouffé, lentement puis au tempo.',
  '5 min — la grille en doux/fort (couplet/refrain).',
  '4 min — alterne 4 temps PM puis 4 temps ouverts sur un accord.',
  '2 min — joue une idée à toi en cherchant le relief.'
 ]},

   body:'Une grille mineure très expressive. Écoute-la, puis mets-la en **Boucle** : ce sera ton accompagnement pour improviser.',

{day:15, est:20, title:'Fingerpicking : les bases',
 tags:['Fingerpicking','Main droite','Singer-songwriter'],
 intro:'On range le médiator. Le jeu aux doigts, c’est le cœur du style singer-songwriter : ces arpèges délicats qui tournent sous une voix. On commence par le placement des doigts.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Un doigt, un rôle',
   body:[
    'Au fingerpicking, chaque doigt a son territoire : le **pouce (p)** s’occupe des **3 cordes graves**, l’**index (i)**, le **majeur (m)** et l’**annulaire (a)** prennent les 3 cordes aiguës.',
    'i = corde de Sol, m = corde de Si, a = corde de Mi aiguë. Le pouce gère la basse. Toujours.'
   ],
   tips:['Pose ta main détendue : les doigts tombent naturellement sur « leur » corde.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:0}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:1,f:0}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Arpège sur La mineur',
   body:[
    'Sur un accord de Lam (que tu tiens main gauche), on égrène : basse (pouce), puis i, m, a, puis on redescend. Écoute le motif tourner.',
    'L’accord reste **tenu** tout du long : seule la main droite bouge.'
   ],
   tips:['Joue chaque note bien séparée et régulière. La régularité avant la vitesse.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:1,f:3}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'Le même motif sur Do',
   body:'Change la main gauche pour un Do, garde exactement le même mouvement de main droite. Écoute : le motif est identique, la couleur change.',
   tips:['C’est ça la force du picking : un motif de main droite, et tu changes juste les accords.']},

  {kind:'text', eyebrow:'À retenir', num:'04',
   title:'Régularité = hypnose',
   body:[
    'Un bon arpège est **hypnotique** : régulier comme une horloge. C’est ce tapis qui permet à une voix de se poser dessus.',
    'Travaille lentement avec le métronome. La vitesse viendra toute seule, la régularité non.'
   ]}
 ],
 routine:[
  '3 min — main droite à vide : p-i-m-a sur cordes ouvertes, régulier.',
  '6 min — l’arpège sur Lam, au métronome lent.',
  '4 min — le même motif sur Do.',
  '5 min — enchaîne Lam → Do en gardant le motif, sans casser le rythme.',
  '2 min — laisse tourner, ferme les yeux, écoute.'
 ]},

{day:16, est:20, title:'Le motif qui tourne (style pop-folk)',
 tags:['Fingerpicking','Singer-songwriter','Groove'],
 intro:'Aujourd’hui, le motif arpégé typique de Ed Sheeran ou Vianney : celui qui tourne en boucle sous le chant. Quatre accords, un seul mouvement, et tu tiens une chanson entière.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le tapis sous la voix',
   body:[
    'Dans ce style, la guitare ne « joue » pas la mélodie : elle pose un **motif régulier** qui tourne, et la voix raconte par-dessus.',
    'On va utiliser quatre accords ouverts très chantants et un motif simple qui reste le même sur chacun.'
   ],
   tips:['Le but : pouvoir jouer le motif **sans y penser**, pour libérer la tête et chanter.']},

  {kind:'chords', chords:['Em','C','G','D'], tempo:74, perBeats:4,
   eyebrow:'Les accords', num:'02',
   title:'Mim – Do – Sol – Ré',
   body:'La grille de la chanson. Écoute-la, assure-toi que chaque accord sonne bien plaqué avant de passer au picking.',
   tips:['Ces quatre-là couvrent des centaines de chansons pop-folk. À garder précieusement.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:0,f:0}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5}
  ]}, eyebrow:'La cible', num:'03',
   title:'Le motif sur Mim',
   body:[
    'Le motif arpégé sur Mi mineur : basse au pouce, puis le dessin i-m-a-m qui tourne. Écoute comme ça « roule ».',

   ],
   tips:['Garde le pouce sur la **bonne basse** pour chaque accord : Mim et Sol → corde de Mi grave ; Do → corde de La ; Ré → corde de Ré.']},

  {kind:'text', eyebrow:'Le défi', num:'04',
   title:'Ajoute ta voix',
   body:[
    'Quand le motif tourne tout seul sur les 4 accords, essaie de **fredonner** n’importe quelle mélodie par-dessus.',

 ],

  '6 min — le motif sur Mim, puis sur chaque accord séparément.',

 ]},

{day:18, est:20, title:'Pentatonique majeure & relation mineur/majeur',
 tags:['Gamme','Pentatonique','Théorie'],
 intro:'Un déclic qui change tout : la pentatonique majeure et la pentatonique mineure, ce sont les mêmes notes. Comprends ce lien et tu doubles ton vocabulaire sans rien apprendre de neuf.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
