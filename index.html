<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Corde — Guitare, 20 min par jour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14110E; --ink2:#1C1813; --ink3:#26201A; --line:#332B22;
  --bone:#EDE6DA; --bone2:#B7AE9F; --bone3:#7E7568;
  --brass:#D8A24A; --brass-hi:#F2C879; --brass-dim:#7a5e2c;
  --patina:#5FA89C; --patina-dim:#2f5650;
  --red:#C9543B;
  --ok:#8FB98A;
  --r:16px; --r2:12px; --r3:9px;
  --maxw:760px;
  --shadow:0 18px 40px -22px rgba(0,0,0,.8);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(120% 60% at 50% -10%, #1f1a14 0%, var(--ink) 60%) fixed,
    var(--ink);
  color:var(--bone);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
  min-height:100vh;
}
::selection{background:var(--brass);color:#1a1408}
h1,h2,h3,h4{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-.02em;line-height:1.08;margin:0}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none !important}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px calc(14px) 20px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:linear-gradient(180deg, rgba(20,17,14,.96) 70%, rgba(20,17,14,0));
  backdrop-filter:blur(8px);
}
.wordmark{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
.wordmark .dotp{width:9px;height:9px;border-radius:50%;background:var(--brass);box-shadow:0 0 0 3px rgba(216,162,74,.18)}
.streak{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--brass-hi);
  background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;
}
.streak svg{width:14px;height:14px}

/* ---------- layout ---------- */
main{max-width:var(--maxw);margin:0 auto;padding:6px 18px 40px}
.view{animation:viewIn .4s ease both}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- lesson header ---------- */
.eyebrow{font-family:'JetBrains Mono';font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--brass)}
.lesson-head{padding:14px 2px 6px}
.lesson-head h1{font-size:clamp(30px,8vw,42px);margin:10px 0 0}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 12px}
.tag{font-family:'JetBrains Mono';font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--bone2);background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
.lesson-intro{color:var(--bone2);font-size:16px;max-width:60ch}

/* progress ring in head */
.daymeta{display:flex;align-items:center;gap:14px;margin-top:18px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono';font-size:12px;color:var(--bone2);background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:6px 12px}
.pill svg{width:13px;height:13px;color:var(--brass)}

/* ---------- cards ---------- */
.card{
  background:linear-gradient(180deg,var(--ink2),#191510);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:20px;
  margin:14px 0;
  box-shadow:var(--shadow);
  animation:cardIn .5s cubic-bezier(.2,.7,.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card.warm{border-color:var(--brass-dim);background:linear-gradient(180deg,#221a10,#191510)}
.card-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-eyebrow .num{font-family:'JetBrains Mono';font-weight:700;color:var(--ink);background:var(--brass);font-size:11px;border-radius:6px;padding:3px 7px;letter-spacing:.06em}
.card h2{font-size:21px;margin:2px 0 4px}
.card h3{font-size:17px}
.card p{color:var(--bone2);margin:10px 0}
.card p strong, .body strong{color:var(--bone);font-weight:600}
.card p em, .body em{color:var(--brass-hi);font-style:normal;font-weight:500}
.body{color:var(--bone2)}
.body ul{margin:10px 0;padding-left:0;list-style:none}
.body li{position:relative;padding:5px 0 5px 22px;color:var(--bone2)}
.body li::before{content:"";position:absolute;left:4px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--brass);opacity:.9}
.kbd{font-family:'JetBrains Mono';font-size:13px;color:var(--brass-hi);background:var(--ink3);border:1px solid var(--line);border-radius:6px;padding:1px 6px}

/* tips */
.tips{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.tip{display:flex;gap:10px;align-items:flex-start;font-size:14.5px;color:var(--bone2);padding:5px 0}
.tip .ic{flex:none;width:20px;height:20px;color:var(--patina);margin-top:1px}
.tip svg{width:20px;height:20px}

/* ---------- audio bar ---------- */
.audiobar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 4px}
.playbtn{
  display:inline-flex;align-items:center;gap:9px;
  font-weight:600;font-size:15px;color:#1a1408;
  background:linear-gradient(180deg,var(--brass-hi),var(--brass));
  border-radius:999px;padding:11px 20px 11px 17px;
  box-shadow:0 8px 20px -8px rgba(216,162,74,.6);
  transition:transform .12s ease, filter .2s ease;
}
.playbtn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.playbtn:active{transform:translateY(0)}
.playbtn svg{width:18px;height:18px}
.playbtn.playing{background:var(--ink3);color:var(--bone);box-shadow:none;border:1px solid var(--line)}
.subbtn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:999px;padding:9px 14px;transition:.15s}
.subbtn:hover{color:var(--bone);border-color:var(--brass-dim)}
.subbtn svg{width:15px;height:15px}
.subbtn.on{color:var(--brass-hi);border-color:var(--brass-dim);background:#241b10}
.metrobtn.on{color:#1a1408;background:linear-gradient(180deg,var(--brass-hi),var(--brass));border-color:var(--brass);animation:metropulse 1s ease infinite}
.metrobtn.on svg{color:#1a1408}
@keyframes metropulse{0%,100%{box-shadow:0 0 0 0 rgba(216,162,74,0)}50%{box-shadow:0 0 0 4px rgba(216,162,74,.22)}}
.tempo{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono';font-size:12px;color:var(--bone2)}
.tempo input[type=range]{-webkit-appearance:none;appearance:none;width:104px;height:4px;border-radius:4px;background:var(--line);outline:none}
.tempo input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--brass);cursor:pointer;box-shadow:0 0 0 4px rgba(216,162,74,.15)}
.tempo input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--brass);cursor:pointer}
.tempo .bpm{color:var(--brass-hi);min-width:46px}

/* ---------- diagram surfaces ---------- */
.diagram-wrap{display:flex;justify-content:center;padding:8px 0 4px}
.chord-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:6px 0}
.chord-cell{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border-radius:12px;padding:8px;transition:.15s;border:1px solid transparent}
.chord-cell:hover{background:var(--ink3);border-color:var(--line)}
.chord-cell .cname{font-family:'JetBrains Mono';font-weight:700;font-size:14px;color:var(--bone)}
.chord-cell.active .cname{color:var(--brass-hi)}
.fretwrap{overflow-x:auto;border-radius:12px;padding:4px}
svg.diagram{display:block;max-width:100%;height:auto}
svg .lbl{font-family:'JetBrains Mono';font-weight:600}

/* note dot animation */
.ndot{transition:fill .08s ease, r .08s ease}
.ndot.active{fill:var(--brass-hi)!important;stroke:var(--brass-hi)!important}
.fdot{cursor:pointer;transition:fill .1s ease,stroke .1s ease}
.fnote{cursor:pointer}
.fnote:hover .fdot{stroke:var(--brass-hi)}
.fname{user-select:none}
.fdot.active + .fname{fill:#1a1408}
.tabcol.active rect.coltxtbg{opacity:1}
.tabnum.active{fill:#1a1408}

/* ---------- recap / routine ---------- */
.routine li{counter-increment:rc;padding-left:34px}
.routine li::before{content:counter(rc);left:0;top:6px;width:auto;height:auto;background:none;font-family:'JetBrains Mono';font-weight:700;color:var(--brass);font-size:13px;border:1px solid var(--brass-dim);border-radius:6px;padding:1px 7px}
.routine{counter-reset:rc;list-style:none;padding:0;margin:8px 0}

/* finish button */
.finishbtn{
  width:100%;margin:22px 0 8px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;color:#1a1408;
  background:linear-gradient(180deg,var(--brass-hi),var(--brass));
  border-radius:14px;padding:16px;
  box-shadow:0 12px 28px -12px rgba(216,162,74,.55);transition:.15s;
}
.finishbtn:hover{filter:brightness(1.04);transform:translateY(-1px)}
.finishbtn.done{background:var(--ink2);color:var(--ok);border:1px solid var(--line);box-shadow:none}
.finishbtn svg{width:20px;height:20px}

/* ---------- parcours (timeline) ---------- */
.path-head{padding:14px 2px}
.path-head h1{font-size:30px}
.path-head p{color:var(--bone2)}
.weekband{font-family:'JetBrains Mono';font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--bone3);margin:24px 4px 8px;display:flex;align-items:center;gap:10px}
.weekband::after{content:"";flex:1;height:1px;background:var(--line)}
.daycard{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--ink2);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;margin:8px 0;transition:.15s;
}
.daycard:hover{border-color:var(--brass-dim);transform:translateX(2px)}
.daynum{flex:none;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-family:'JetBrains Mono';font-weight:700;font-size:15px;background:var(--ink3);color:var(--bone2);border:1px solid var(--line)}
.daycard.done .daynum{background:var(--patina-dim);color:#cfeee6;border-color:var(--patina-dim)}
.daycard.current .daynum{background:var(--brass);color:#1a1408;border-color:var(--brass);box-shadow:0 0 0 4px rgba(216,162,74,.18)}
.dayinfo{flex:1;min-width:0}
.dayinfo .dt{font-weight:600;font-size:15.5px;color:var(--bone);display:flex;align-items:center;gap:8px}
.dayinfo .ds{font-size:12.5px;color:var(--bone3);font-family:'JetBrains Mono';margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge-now{font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:.08em;color:#1a1408;background:var(--brass);border-radius:5px;padding:2px 6px}
.chev{flex:none;color:var(--bone3)}
.chev svg{width:18px;height:18px}

/* ---------- tools ---------- */
.tools-head{padding:14px 2px}
.tools-head h1{font-size:30px}
.tool{background:linear-gradient(180deg,var(--ink2),#191510);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin:14px 0;box-shadow:var(--shadow)}
.tool h2{font-size:19px;display:flex;align-items:center;gap:10px}
.tool h2 svg{width:20px;height:20px;color:var(--brass)}
.tool p.hint{color:var(--bone3);font-size:13.5px;margin:6px 0 14px}

/* metronome */
.metro{display:flex;flex-direction:column;align-items:center;gap:18px}
.metro-bpm{font-family:'Bricolage Grotesque';font-weight:800;font-size:64px;color:var(--bone);line-height:1;letter-spacing:-.04em}
.metro-bpm small{font-family:'JetBrains Mono';font-size:14px;font-weight:500;color:var(--bone3);letter-spacing:.1em;display:block;margin-top:2px}
.metro-dots{display:flex;gap:12px}
.mdot{width:16px;height:16px;border-radius:50%;background:var(--ink3);border:1px solid var(--line);transition:.05s}
.mdot.beat{background:var(--brass-hi);box-shadow:0 0 14px var(--brass)}
.mdot.one.beat{background:var(--patina)}
.metro-ctrls{display:flex;align-items:center;gap:14px;width:100%;max-width:340px}
.metro-ctrls input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:5px;background:var(--line)}
.metro-ctrls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brass);box-shadow:0 0 0 5px rgba(216,162,74,.15)}
.metro-ctrls input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:var(--brass)}
.rbtn{width:38px;height:38px;flex:none;border-radius:10px;background:var(--ink3);border:1px solid var(--line);color:var(--bone);display:grid;place-items:center;font-family:'JetBrains Mono';font-weight:700}
.rbtn:hover{border-color:var(--brass-dim)}
.sigrow{display:flex;gap:8px;margin-top:4px}
.chipbtn{font-family:'JetBrains Mono';font-size:12.5px;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:8px;padding:7px 12px;transition:.15s}
.chipbtn.on{color:#1a1408;background:var(--brass);border-color:var(--brass);font-weight:700}

/* tuner */
.tuner-strings{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.tstr{display:flex;flex-direction:column;align-items:center;gap:6px;width:58px;padding:14px 0;border-radius:12px;background:var(--ink3);border:1px solid var(--line);transition:.12s}
.tstr:hover{border-color:var(--brass-dim);transform:translateY(-2px)}
.tstr.ring{border-color:var(--brass);box-shadow:0 0 22px -6px var(--brass)}
.tstr .tn{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px}
.tstr .ts{font-family:'JetBrains Mono';font-size:10px;color:var(--bone3)}

/* explorer controls */
.selrow{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 14px}
.selrow .lab{flex-basis:100%;font-family:'JetBrains Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone3);margin-bottom:2px}
.opt{font-family:'JetBrains Mono';font-size:12.5px;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:8px;padding:8px 11px;transition:.12s;min-width:40px;text-align:center}
.opt:hover{border-color:var(--brass-dim)}
.opt.on{color:#1a1408;background:var(--brass);border-color:var(--brass);font-weight:700}
.opt small{display:block;font-size:9px;opacity:.7;font-weight:400;margin-top:1px}
.opt.on small{opacity:.85}
.fretslide{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono';font-size:12px;color:var(--bone2);margin:6px 0 12px}
.fretslide input{flex:1;-webkit-appearance:none;height:4px;border-radius:4px;background:var(--line)}
.fretslide input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--brass);box-shadow:0 0 0 4px rgba(216,162,74,.15)}
.fretslide input::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--brass)}

/* ---------- bottom nav ---------- */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;max-width:var(--maxw);margin:0 auto;
  background:linear-gradient(180deg, rgba(22,18,14,.86), rgba(18,15,11,.98));
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding:8px 14px calc(8px + env(safe-area-inset-bottom));
}
.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--bone3);font-size:10.5px;font-weight:600;letter-spacing:.02em;padding:6px 0;border-radius:12px;transition:.15s;
}
.tabbar button svg{width:22px;height:22px}
.tabbar button.on{color:var(--brass-hi)}
.tabbar button.on svg{filter:drop-shadow(0 0 8px rgba(216,162,74,.5))}

/* empty / done states */
.empty{text-align:center;padding:60px 20px;color:var(--bone3)}
.empty svg{width:46px;height:46px;color:var(--brass-dim);margin-bottom:14px}
.empty h2{color:var(--bone);font-size:24px;margin-bottom:8px}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink3);border:1px solid var(--brass-dim);color:var(--bone);font-size:14px;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:60;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px;color:var(--brass)}

/* ---------- minuteurs (exercice) ---------- */
.ctimer{margin-top:16px;border-top:1px dashed var(--line);padding-top:13px}
.ctimer-pill{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:999px;padding:7px 13px;transition:.16s}
.ctimer-pill:hover{color:var(--bone);border-color:var(--brass-dim)}
.ctimer-pill>svg:first-child{width:15px;height:15px;color:var(--patina)}
.ctimer-pill .ct-caret svg{width:14px;height:14px;color:var(--bone3);transition:transform .18s}
.ctimer.open .ct-caret svg{transform:rotate(90deg)}
.ctimer-pill .ct-pilltime{color:var(--brass-hi);font-weight:700}
.ctimer.open .ctimer-pill{background:var(--ink2);border-color:var(--brass-dim)}
.ctimer-panel{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:10px}
.ctimer-ring{position:relative;width:44px;height:44px;flex:none}
.ctimer-ring svg{display:block;width:100%;height:100%}
.ctimer-ring .ct-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bone)}
.ct-prog{transition:stroke-dashoffset .25s linear}
.ctimer-ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ct-go{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:#1a1408;background:linear-gradient(180deg,var(--brass-hi),var(--brass));border-radius:999px;padding:9px 16px;transition:.15s}
.ct-go:hover{filter:brightness(1.05)}
.ct-go svg{width:16px;height:16px}
.ct-mini{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'JetBrains Mono';font-size:12.5px;font-weight:700;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:9px;padding:9px 11px;transition:.15s}
.ct-mini:hover{color:var(--bone);border-color:var(--brass-dim)}
.ct-mini svg{width:15px;height:15px}
.ctimer.done .ctimer-ring .ct-time{color:var(--brass-hi)}
.ctimer.flash{animation:tflash .6s ease 2}
@keyframes tflash{0%,100%{filter:none}50%{filter:brightness(1.55)}}

/* ---------- session guidée ---------- */
.session-sub{color:var(--bone2);font-size:14.5px;margin:6px 0 0}
.sessionStart{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin:16px 0 6px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;color:#1a1408;background:linear-gradient(180deg,var(--brass-hi),var(--brass));border-radius:13px;padding:14px;box-shadow:0 10px 22px -12px rgba(216,162,74,.6);transition:.16s}
.sessionStart:hover{transform:translateY(-1px);filter:brightness(1.04)}
.sessionStart svg{width:19px;height:19px}
.session-run{margin:16px 0 6px;background:var(--ink);border:1px solid var(--line);border-radius:14px;padding:16px}
.srun-top{display:flex;align-items:center;gap:16px}
.ctimer-ring.big{width:104px;height:104px}
.ctimer-ring .ct-time.big{font-size:22px;font-weight:800;font-family:'Bricolage Grotesque';color:var(--bone)}
.srun-meta{min-width:0;flex:1}
.srun-step{font-size:12px;color:var(--brass-hi);font-weight:700;letter-spacing:.04em;margin-bottom:4px}
.srun-label{font-size:15px;color:var(--bone);line-height:1.35}
.sbar{height:6px;background:var(--ink3);border-radius:99px;overflow:hidden;margin:15px 0 12px}
.sbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--brass),var(--brass-hi));border-radius:99px;transition:width .25s linear}
.srun-ctrls{display:flex;gap:8px;flex-wrap:wrap}
.ct-mini.wide{padding:10px 14px}
.srun-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.srun-count{font-size:16px;font-weight:700;color:var(--brass-hi)}
.srun-hint{font-size:12.5px;color:var(--bone3);font-family:'JetBrains Mono'}
.rsteps{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:7px}
.rstep{position:relative;display:flex;align-items:center;gap:11px;background:var(--ink2);border:1px solid var(--line);border-radius:11px;padding:10px 11px;overflow:hidden;transition:border-color .18s,opacity .18s}
.rstep::after{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--p,0);background:rgba(216,162,74,.13);transition:width .25s linear;pointer-events:none}
.rstep>*{position:relative;z-index:1}
.rstep-no{flex:none;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--brass);border:1px solid var(--brass-dim);border-radius:7px}
.rstep-label{flex:1;font-size:14px;color:var(--bone2);line-height:1.35}
.rstep-go{flex:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--bone2);background:var(--ink3);border:1px solid var(--line);border-radius:8px;padding:7px 10px;transition:.15s}
.rstep-go:hover{color:var(--bone);border-color:var(--brass-dim)}
.rstep-go svg{width:14px;height:14px;color:var(--patina)}
.rstep-time{font-weight:700;color:var(--brass-hi)}
.rstep.active{border-color:var(--brass);background:var(--ink3)}
.rstep.active .rstep-no{background:var(--brass);color:#1a1408}
.rstep.done{opacity:.5}
.rstep.done .rstep-no{background:var(--patina-dim);border-color:var(--patina-dim);color:var(--patina)}
.rstep.soloing{border-color:var(--brass-dim)}
.rstep.soloflash{animation:tflash .6s ease 2}
.finishbtn.pulse{animation:fpulse 1.4s ease infinite}
.finishbtn.done{animation:none!important}
@keyframes fpulse{0%,100%{box-shadow:0 12px 30px -14px var(--brass)}50%{box-shadow:0 0 0 6px rgba(216,162,74,.16),0 12px 30px -14px var(--brass)}}

/* ---------- session séquentielle ---------- */
.session-meta{display:flex;gap:18px;margin:11px 0 2px;color:var(--bone3);font-size:13px}
.session-meta span{display:inline-flex;align-items:center;gap:6px}
.session-meta svg{width:14px;height:14px;color:var(--patina)}
.session-running{display:flex;align-items:center;gap:9px;justify-content:center;margin-top:12px;font-size:13.5px;color:var(--brass-hi);background:var(--ink3);border:1px solid var(--brass-dim);border-radius:11px;padding:11px}
.session-running svg{width:16px;height:16px;color:var(--brass)}

/* carte de l'exercice en cours / fait pendant la session */
.card.sess-active{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass),var(--shadow)}
.card.sess-active::before{content:"";position:absolute;left:0;right:auto;top:0;height:3px;width:var(--p,0%);background:linear-gradient(90deg,var(--brass),var(--brass-hi));border-radius:var(--r) 0 0 0;transition:width .25s linear;z-index:2}
.card{position:relative}
.card.sess-done{opacity:.6}
.card.sess-done::after{content:"✓ fait";position:absolute;top:14px;right:16px;font-family:'JetBrains Mono';font-weight:700;color:var(--ok);font-size:12px;letter-spacing:.03em}

/* barre de contrôle fixe (au-dessus de la barre d'onglets) */
.sessionbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(82px + env(safe-area-inset-bottom));z-index:45;width:min(720px,calc(100% - 18px));display:flex;align-items:center;gap:13px;padding:11px 13px;background:linear-gradient(180deg,#251d12,#1a140f);border:1px solid var(--brass-dim);border-radius:16px;box-shadow:0 16px 40px -18px rgba(0,0,0,.9);animation:sbin .26s cubic-bezier(.2,.7,.3,1) both}
@keyframes sbin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
.sb-ring{position:relative;width:42px;height:42px;flex:none}
.sb-ring svg{display:block;width:100%;height:100%}
.sb-ring .sb-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--bone)}
.sb-meta{flex:1;min-width:0}
.sb-step{font-size:11px;font-weight:700;color:var(--brass-hi);letter-spacing:.03em;margin-bottom:2px}
.sb-title{font-size:14px;color:var(--bone);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

body.session-on{padding-bottom:calc(168px + env(safe-area-inset-bottom))}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}

<script>
"use strict";

/* =========================================================
   STORAGE (safe — fonctionne hébergé, dégrade en mémoire)
========================================================= */
const Store = {
  mem:{},
  get(k){ try{ const v=localStorage.getItem(k); return v==null?null:JSON.parse(v);}catch(e){ return (k in this.mem)?this.mem[k]:null;} },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ this.mem[k]=v; } }
};

/* =========================================================
   MUSIQUE — accordage, notes
========================================================= */
const OPEN_FREQ = [82.41,110.00,146.83,196.00,246.94,329.63]; // E A D G B E (corde 6→1)
const OPEN_PC   = [4,9,2,7,11,4];
const NOTE_LAT  = ['Do','Do#','Ré','Ré#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];
const NOTE_LET  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const STRING_LBL= ['Mi','La','Ré','Sol','Si','Mi']; // grave→aigu

const freqAt = (s,f)=> OPEN_FREQ[s]*Math.pow(2,f/12);
const pcAt   = (s,f)=> (OPEN_PC[s]+f)%12;
const letToPc= (n)=> NOTE_LET.indexOf(n);

const SCALES = {
  minPenta:{name:'Pentatonique mineure', iv:[0,3,5,7,10]},
  majPenta:{name:'Pentatonique majeure', iv:[0,2,4,7,9]},
  blues:{name:'Gamme blues', iv:[0,3,5,6,7,10]},
  major:{name:'Gamme majeure', iv:[0,2,4,5,7,9,11]},
  natMinor:{name:'Mineure naturelle', iv:[0,2,3,5,7,8,10]},
  dorian:{name:'Mode dorien', iv:[0,2,3,5,7,9,10]},
  mixo:{name:'Mode mixolydien', iv:[0,2,4,5,7,9,10]},
};
function degreeOf(pc, rootPc, iv){
  for(let i=0;i<iv.length;i++){ if((rootPc+iv[i])%12===((pc%12)+12)%12) return i; }
  return -1;
}

/* =========================================================
   ACCORDS  (frets corde6→1 ; -1 = étouffée, 0 = à vide)
========================================================= */
const CH = (frets,fingers,barres,base)=>({frets,fingers:fingers||null,barres:barres||[],base:base||1});
const CHORDS = {
  // ouverts
  'C':  CH([-1,3,2,0,1,0],[0,3,2,0,1,0]),
  'A':  CH([-1,0,2,2,2,0],[0,0,1,2,3,0]),
  'G':  CH([3,2,0,0,0,3],[2,1,0,0,0,3]),
  'E':  CH([0,2,2,1,0,0],[0,2,3,1,0,0]),
  'D':  CH([-1,-1,0,2,3,2],[0,0,0,1,3,2]),
  'Am': CH([-1,0,2,2,1,0],[0,0,2,3,1,0]),
  'Em': CH([0,2,2,0,0,0],[0,2,3,0,0,0]),
  'Dm': CH([-1,-1,0,2,3,1],[0,0,0,2,3,1]),
  'Fmaj7':CH([-1,-1,3,2,1,0],[0,0,3,2,1,0]),
  'Cadd9':CH([-1,3,2,0,3,0],[0,2,1,0,3,0]),
  'Asus2':CH([-1,0,2,2,0,0],[0,0,1,2,0,0]),
  'Dsus4':CH([-1,-1,0,2,3,3],[0,0,0,1,2,3]),
  // barrés forme E (fondamentale corde 6)
  'F':   CH([1,3,3,2,1,1],[1,3,4,2,1,1],[{fret:1,lo:0,hi:5}]),
  'F#':  CH([2,4,4,3,2,2],[1,3,4,2,1,1],[{fret:2,lo:0,hi:5}],2),
  'G(b)':CH([3,5,5,4,3,3],[1,3,4,2,1,1],[{fret:3,lo:0,hi:5}],3),
  'A(b)':CH([5,7,7,6,5,5],[1,3,4,2,1,1],[{fret:5,lo:0,hi:5}],5),
  'B':   CH([7,9,9,8,7,7],[1,3,4,2,1,1],[{fret:7,lo:0,hi:5}],7),
  // barrés mineurs forme Em (fondamentale corde 6)
  'Fm':  CH([1,3,3,1,1,1],[1,3,4,1,1,1],[{fret:1,lo:0,hi:5}]),
  'Gm':  CH([3,5,5,3,3,3],[1,3,4,1,1,1],[{fret:3,lo:0,hi:5}],3),
  'Bm(e)':CH([7,9,9,7,7,7],[1,3,4,1,1,1],[{fret:7,lo:0,hi:5}],7),
  // barrés forme A (fondamentale corde 5)
  'B(a)':CH([-1,2,4,4,4,2],[0,1,3,3,3,1],[{fret:2,lo:1,hi:5}],2),
  'C(a)':CH([-1,3,5,5,5,3],[0,1,3,3,3,1],[{fret:3,lo:1,hi:5}],3),
  'Bb':  CH([-1,1,3,3,3,1],[0,1,3,3,3,1],[{fret:1,lo:1,hi:5}]),
  'D(a)':CH([-1,5,7,7,7,5],[0,1,3,3,3,1],[{fret:5,lo:1,hi:5}],5),
  // mineurs forme Am (fondamentale corde 5)
  'Bm':  CH([-1,2,4,4,3,2],[0,1,3,4,2,1],[{fret:2,lo:1,hi:5}],2),
  'Cm':  CH([-1,3,5,5,4,3],[0,1,3,4,2,1],[{fret:3,lo:1,hi:5}],3),
  // power
  'F5':  CH([1,3,3,-1,-1,-1],[1,3,4]),
  'G5':  CH([3,5,5,-1,-1,-1],[1,3,4],[],3),
  'A5':  CH([5,7,7,-1,-1,-1],[1,3,4],[],5),
};
// label affiché « propre » pour quelques accords renommés
const CH_DISPLAY = {'G(b)':'G','A(b)':'A','B(a)':'B','C(a)':'C','D(a)':'D','Bm(e)':'Bm'};
const chordLabel = (k)=> CH_DISPLAY[k]||k;
function chordFreqs(frets){
  const out=[]; for(let s=0;s<6;s++){ if(frets[s]>=0) out.push(freqAt(s,frets[s])); } return out;
}

/* =========================================================
   MOTEUR AUDIO — synthèse de corde pincée (Karplus-Strong)
========================================================= */
const Audio = {
  ctx:null, master:null, comp:null, cache:new Map(),
  ensure(){
    if(this.ctx) { if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext||window.webkitAudioContext;
    this.ctx = new AC();
    this.comp = this.ctx.createDynamicsCompressor();
    this.comp.threshold.value=-14; this.comp.ratio.value=3.2; this.comp.attack.value=.004; this.comp.release.value=.25;
    this.master = this.ctx.createGain(); this.master.gain.value=0.9;
    this.master.connect(this.comp); this.comp.connect(this.ctx.destination);
  },
  beep(n, freq){
    this.ensure(); if(!this.ctx) return;
    n=n||1; freq=freq||880;
    for(let k=0;k<n;k++){
      const t=this.ctx.currentTime + k*0.16;
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.30,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t+0.16);
    }
  },
  chime(){
    this.ensure(); if(!this.ctx) return;
    [659.25,830.61,987.77].forEach((f,k)=>{
      const t=this.ctx.currentTime + k*0.16;
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.34,t+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t+0.36);
    });
  },
  buffer(freq, dur){
    const key = Math.round(freq*8)+'_'+Math.round(dur*4);
    if(this.cache.has(key)) return this.cache.get(key);
    const sr=this.ctx.sampleRate;
    const N=Math.max(2,Math.round(sr/freq));
    const wt=new Float32Array(N);
    for(let i=0;i<N;i++) wt[i]=Math.random()*2-1;
    // adoucir le bruit initial (deux passes de moyenne) -> attaque plus "doigt"
    for(let p=0;p<2;p++){ let prev=wt[N-1]; for(let i=0;i<N;i++){ const c=wt[i]; wt[i]=(c+prev)*0.5; prev=c; } }
    const total=Math.floor(dur*sr);
    const buf=this.ctx.createBuffer(1,total,sr);
    const d=buf.getChannelData(0);
    const decay= freq<140?0.9935 : freq<300?0.9955 : 0.9968;
    let idx=0;
    for(let i=0;i<total;i++){
      const c=wt[idx]; d[i]=c;
      const nx=wt[(idx+1)%N];
      wt[idx]=decay*0.5*(c+nx);
      idx=(idx+1)%N;
    }
    if(this.cache.size>400) this.cache.clear();
    this.cache.set(key,buf);
    return buf;
  },
  note(freq, when, opt){
    opt=opt||{};
    const dur=opt.dur||2.6, peak=opt.gain!=null?opt.gain:0.22;
    const buf=this.buffer(freq, dur+0.1);
    const src=this.ctx.createBufferSource(); src.buffer=buf;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(peak,when+0.004);
    // léger filtre passe-bas pour la chaleur
    const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=Math.min(7000, freq*9+1800); lp.Q.value=0.4;
    src.connect(lp); lp.connect(g); g.connect(this.master);
    src.start(when); src.stop(when+dur+0.12);
    return {src,g};
  },
  strum(freqs, when, opt){
    opt=opt||{}; const dir=opt.dir||'down', spread=opt.spread||0.020, gain=opt.gain!=null?opt.gain:0.17, dur=opt.dur||3.2;
    const arr=freqs.slice(); // déjà grave→aigu
    const order = dir==='down'? arr : arr.slice().reverse();
    const nodes=[];
    order.forEach((f,i)=>{ nodes.push(this.note(f, when+i*spread, {dur, gain})); });
    return nodes;
  }
};
// reprendre le contexte au premier geste
['pointerdown','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,()=>Audio.ensure(),{once:true,passive:true}));

/* =========================================================
   PLAYER — séquences (gammes / tablatures) + sync visuelle
========================================================= */
const Player = {
  active:false, raf:0, nodes:[], onStep:null, onEnd:null,
  iterStart:0, iterEnd:0, events:[], tempo:90, loop:false, building:null,
  stop(){
    this.active=false;
    if(this.raf) cancelAnimationFrame(this.raf), this.raf=0;
    const now=Audio.ctx?Audio.ctx.currentTime:0;
    this.nodes.forEach(n=>{ try{ n.g.gain.cancelScheduledValues(now); n.g.gain.setTargetAtTime(0,now,0.03); n.src.stop(now+0.12);}catch(e){} });
    this.nodes=[];
    if(this.onStep) this.onStep(-1);
    this.onStep=null; this.onEnd=null;
  },
  schedule(start){
    const spb=60/this.tempo; let t=start;
    this.events.forEach(ev=>{
      if(!ev.rest && ev.freqs && ev.freqs.length){
        const dur=Math.max(ev.beats*spb*1.05, 1.3);
        const gain = ev.freqs.length>1 ? 0.15 : 0.21;
        if(ev.freqs.length>2){ this.nodes.push(...Audio.strum(ev.freqs,t,{dur,gain})); }
        else ev.freqs.forEach(f=> this.nodes.push(Audio.note(f,t,{dur,gain})) );
      }
      t+=ev.beats*spb;
    });
    return t;
  },
  play(events, opt){
    Audio.ensure();
    this.stop();
    this.events=events; this.tempo=opt.tempo||90; this.loop=!!opt.loop;
    this.onStep=opt.onStep||null; this.onEnd=opt.onEnd||null;
    this.active=true;
    const start=Audio.ctx.currentTime+0.07;
    this.iterStart=start; this.iterEnd=this.schedule(start);
    const spb=60/this.tempo;
    const frame=()=>{
      if(!this.active) return;
      const now=Audio.ctx.currentTime;
      if(now>=this.iterEnd-0.0005){
        if(this.loop){ this.iterStart=this.iterEnd; this.iterEnd=this.schedule(this.iterStart); }
        else { this.active=false; if(this.onStep)this.onStep(-1); const e=this.onEnd; this.onStep=null;this.onEnd=null; if(e)e(); return; }
      }
      let acc=this.iterStart, idx=-1;
      for(let i=0;i<this.events.length;i++){ const d=this.events[i].beats*spb; if(now>=acc && now<acc+d){idx=i;break;} acc+=d; }
      if(this.onStep) this.onStep(idx);
      this.raf=requestAnimationFrame(frame);
    };
    this.raf=requestAnimationFrame(frame);
  }
};

/* =========================================================
   RENDU — diagramme d'accord (SVG vertical)
========================================================= */
function renderChord(frets, fingers, barres, opt){
  opt=opt||{}; const W=opt.w||116, H=opt.h||150;
  const padX=18, top=30, bottom=16, rows=5;
  const pos=frets.filter(f=>f>0);
  let base=1, showNut=true;
  if(pos.length){ const mx=Math.max(...pos), mn=Math.min(...pos);
    if(mx>4){ base=mn; showNut=false; } }
  const sgap=(W-2*padX)/5, fgap=(H-top-bottom)/rows;
  const sx=i=>padX+i*sgap;
  const fy=r=>top+r*fgap; // r=0 nut line
  const dotY=r=>top+(r-0.5)*fgap;
  let s='<svg class="diagram" viewBox="0 0 '+W+' '+H+'" width="'+W+'" aria-hidden="true">';
  // base fret label
  if(!showNut){ s+='<text class="lbl" x="'+(padX-7)+'" y="'+(fy(0)+fgap*0.7)+'" font-size="11" fill="var(--brass-hi)" text-anchor="end">'+base+'</text>'; }
  // frets
  for(let r=0;r<=rows;r++){ const y=fy(r); const nut=(r===0&&showNut);
    s+='<line x1="'+sx(0)+'" y1="'+y+'" x2="'+sx(5)+'" y2="'+y+'" stroke="'+(nut?'var(--bone)':'var(--line)')+'" stroke-width="'+(nut?4:1.4)+'" stroke-linecap="round"/>'; }
  // strings
  for(let i=0;i<6;i++){ s+='<line x1="'+sx(i)+'" y1="'+fy(0)+'" x2="'+sx(i)+'" y2="'+fy(rows)+'" stroke="var(--line)" stroke-width="1.4"/>'; }
  // open/mute markers
  for(let i=0;i<6;i++){ const f=frets[i];
    if(f===0){ s+='<circle cx="'+sx(i)+'" cy="'+(top-12)+'" r="4.4" fill="none" stroke="var(--bone2)" stroke-width="1.6"/>'; }
    else if(f<0){ const x=sx(i),y=top-12; s+='<path d="M'+(x-4)+' '+(y-4)+'L'+(x+4)+' '+(y+4)+'M'+(x+4)+' '+(y-4)+'L'+(x-4)+' '+(y+4)+'" stroke="var(--bone3)" stroke-width="1.7" stroke-linecap="round"/>'; }
  }
  // barres
  barres.forEach(b=>{ const r=b.fret-base+1; if(r<1||r>rows) return; const y=dotY(r);
    s+='<rect x="'+(sx(b.lo)-7)+'" y="'+(y-7)+'" width="'+(sx(b.hi)-sx(b.lo)+14)+'" height="14" rx="7" fill="var(--brass)"/>'; });
  // dots
  for(let i=0;i<6;i++){ const f=frets[i]; if(f<=0) continue; const r=f-base+1; if(r<1||r>rows) continue;
    const onBarre = barres.some(b=>b.fret===f && i>=b.lo && i<=b.hi);
    if(!onBarre) s+='<circle cx="'+sx(i)+'" cy="'+dotY(r)+'" r="7" fill="var(--brass)"/>';
    if(fingers && fingers[i]>0) s+='<text x="'+sx(i)+'" y="'+(dotY(r)+3.6)+'" font-size="10" font-family="JetBrains Mono" font-weight="700" fill="#1a1408" text-anchor="middle">'+fingers[i]+'</text>';
  }
  s+='</svg>';
  return s;
}

/* =========================================================
   RENDU — manche horizontal (gammes) + audio
   retourne { html, events, refs:Map('s-f'->ids) }
========================================================= */
function buildScale(rootPc, iv, fStart, fEnd, opt){
  opt=opt||{};
  const scalePc=new Set(iv.map(x=>(rootPc+x)%12));
  const showNames=!!opt.names;
  // positions
  const cells=[]; // {s,f,root,deg,name}
  for(let s=0;s<6;s++) for(let f=fStart;f<=fEnd;f++){ const pc=pcAt(s,f); if(scalePc.has(pc)){ cells.push({s,f,root:pc===rootPc,deg:degreeOf(pc,rootPc,iv),name:NOTE_LET[pc]}); } }
  // geometry
  const nF=fEnd-fStart+1;
  const padL=fStart===0?26:30, padR=14, padT=14, padB=22;
  const fretW=Math.max(46, Math.min(62, 360/nF));
  const W=padL+nF*fretW+padR, H=padT+5*22+padB+0;
  const sGap=22; const sy=s=>padT+(5-s)*sGap; // grave bas
  const cellX=f=>padL+(f-fStart+0.5)*fretW;
  const fretLineX=k=>padL+k*fretW; // k=0..nF
  let s='<svg class="diagram" viewBox="0 0 '+W+' '+H+'" width="'+W+'">';
  // inlays
  [3,5,7,9,15,17,19,21].forEach(mf=>{ if(mf>=fStart&&mf<=fEnd){ s+='<circle cx="'+cellX(mf)+'" cy="'+((sy(2)+sy(3))/2)+'" r="3.2" fill="var(--line)"/>'; }});
  if(12>=fStart&&12<=fEnd){ s+='<circle cx="'+cellX(12)+'" cy="'+(sy(1))+'" r="3.2" fill="var(--line)"/><circle cx="'+cellX(12)+'" cy="'+(sy(4))+'" r="3.2" fill="var(--line)"/>'; }
  // strings
  for(let i=0;i<6;i++){ const y=sy(i); s+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line)" stroke-width="'+(1+ (5-i)*0.18)+'"/>'; }
  // frets
  for(let k=0;k<=nF;k++){ const x=fretLineX(k); const isNut=(fStart===0&&k===0);
    s+='<line x1="'+x+'" y1="'+sy(5)+'" x2="'+x+'" y2="'+sy(0)+'" stroke="'+(isNut?'var(--bone)':'var(--line)')+'" stroke-width="'+(isNut?3.5:1.3)+'"/>'; }
  // fret numbers
  for(let f=fStart;f<=fEnd;f++){ s+='<text class="lbl" x="'+cellX(f)+'" y="'+(sy(5)+16)+'" font-size="9.5" fill="var(--bone3)" text-anchor="middle">'+f+'</text>'; }
  // notes
  const refs={};
  cells.forEach(c=>{ const x=cellX(c.f), y=sy(c.s); const id='n_'+c.s+'_'+c.f+'_'+Math.random().toString(36).slice(2,6);
    refs[c.s+'-'+c.f]=id;
    if(c.root){ s+='<circle id="'+id+'" class="ndot" data-sf="'+c.s+'-'+c.f+'" cx="'+x+'" cy="'+y+'" r="8.4" fill="var(--brass)" stroke="var(--brass)"/>';
      const t = showNames? c.name : 'R';
      s+='<text x="'+x+'" y="'+(y+3.4)+'" font-size="9" font-family="JetBrains Mono" font-weight="700" fill="#1a1408" text-anchor="middle" pointer-events="none">'+t+'</text>'; }
    else { s+='<circle id="'+id+'" class="ndot" data-sf="'+c.s+'-'+c.f+'" cx="'+x+'" cy="'+y+'" r="7.6" fill="var(--ink2)" stroke="var(--patina)" stroke-width="1.8"/>';
      if(showNames) s+='<text x="'+x+'" y="'+(y+3.2)+'" font-size="8.5" font-family="JetBrains Mono" font-weight="600" fill="var(--patina)" text-anchor="middle" pointer-events="none">'+c.name+'</text>'; }
  });
  s+='</svg>';
  // run (montée puis descente) -> events
  const asc=[]; for(let st=0;st<6;st++){ for(let f=fStart;f<=fEnd;f++){ if(scalePc.has(pcAt(st,f))) asc.push({s:st,f}); } }
  // dédoublonner hauteurs identiques consécutives
  const seq=asc.slice();
  const desc=seq.slice(0,-1).reverse();
  const full=seq.concat(desc);
  const events=full.map(n=>({freqs:[freqAt(n.s,n.f)], beats:0.5, s:n.s, f:n.f}));
  return {html:s, events, refs};
}

/* =========================================================
   RENDU — carte du manche (notes à mémoriser) + audio
   retourne { html, events, refs }
========================================================= */
function buildFretboard(notes, opt){
  opt=opt||{};
  const fmin=Math.min.apply(null,notes.map(n=>n.f)), fmax=Math.max.apply(null,notes.map(n=>n.f));
  let fStart=opt.fStart!=null?opt.fStart:fmin, fEnd=opt.fEnd!=null?opt.fEnd:fmax;
  if(fEnd-fStart<3) fEnd=fStart+3;
  const nF=fEnd-fStart+1;
  const padL=fStart===0?26:30, padR=14, padT=14, padB=22;
  const fretW=Math.max(30, Math.min(58, 430/nF));
  const W=padL+nF*fretW+padR, H=padT+5*22+padB;
  const sGap=22, sy=s=>padT+(5-s)*sGap, cellX=f=>padL+(f-fStart+0.5)*fretW, fretLineX=k=>padL+k*fretW;
  let s='<svg class="diagram" viewBox="0 0 '+W+' '+H+'" width="'+W+'">';
  [3,5,7,9,15,17,19,21].forEach(mf=>{ if(mf>=fStart&&mf<=fEnd){ s+='<circle cx="'+cellX(mf)+'" cy="'+((sy(2)+sy(3))/2)+'" r="3.2" fill="var(--line)"/>'; }});
  if(12>=fStart&&12<=fEnd){ s+='<circle cx="'+cellX(12)+'" cy="'+sy(1)+'" r="3.2" fill="var(--line)"/><circle cx="'+cellX(12)+'" cy="'+sy(4)+'" r="3.2" fill="var(--line)"/>'; }
  for(let i=0;i<6;i++){ const y=sy(i); s+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line)" stroke-width="'+(1+(5-i)*0.18)+'"/>'; }
  for(let k=0;k<=nF;k++){ const x=fretLineX(k); const isNut=(fStart===0&&k===0); s+='<line x1="'+x+'" y1="'+sy(5)+'" x2="'+x+'" y2="'+sy(0)+'" stroke="'+(isNut?'var(--bone)':'var(--line)')+'" stroke-width="'+(isNut?3.5:1.3)+'"/>'; }
  for(let f=fStart;f<=fEnd;f++){ s+='<text class="lbl" x="'+cellX(f)+'" y="'+(sy(5)+16)+'" font-size="9.5" fill="var(--bone3)" text-anchor="middle">'+f+'</text>'; }
  const refs={};
  notes.forEach(n=>{ const x=cellX(n.f), y=sy(n.s); const nm=NOTE_LAT[pcAt(n.s,n.f)]; const id='f_'+n.s+'_'+n.f+'_'+Math.random().toString(36).slice(2,6);
    refs[n.s+'-'+n.f]=id;
    s+='<g class="fnote" data-fnote="'+n.s+'-'+n.f+'" data-name="'+nm+'">';
    s+='<circle id="'+id+'" class="ndot fdot" cx="'+x+'" cy="'+y+'" r="10.5" fill="var(--ink3)" stroke="var(--brass)" stroke-width="1.8"/>';
    s+='<text class="fname" x="'+x+'" y="'+(y+3.3)+'" font-size="'+(nm.length>2?7.5:9.5)+'" font-family="JetBrains Mono" font-weight="700" fill="var(--brass-hi)" text-anchor="middle" pointer-events="none">'+(opt.reveal?nm:'?')+'</text>';
    s+='</g>';
  });
  s+='</svg>';
  const ord=notes.slice().sort((a,b)=> a.s-b.s || a.f-b.f);
  const events=ord.map(n=>({freqs:[freqAt(n.s,n.f)], beats:0.6, s:n.s, f:n.f}));
  return {html:s, events, refs};
}

/* =========================================================
   RENDU — tablature (SVG) + playhead
========================================================= */
function buildTab(tab){
  // tab = { tempo, bpb, events:[{notes:[{s,f,t}], beats, label} | {rest:true,beats}] }
  const evs=tab.events, bpb=tab.bpb||4;
  const padL=30, padR=20, padT=16, padB=18, sGap=15;
  const unit=34; // px par temps
  let totalBeats=evs.reduce((a,e)=>a+e.beats,0);
  const W=padL+totalBeats*unit+padR, H=padT+5*sGap+padB+8;
  const lineY=i=>padT+(5-i)*sGap; // i=0 graveE en bas -> dessine aigu en haut: corde i, top->bottom = aigu..grave
  // En tablature: ligne du haut = Mi aigu (corde index 5). y pour index i: padT+(5-i)*sGap => i=5 haut, i=0 bas. OK.
  let x=padL;
  let s='<svg class="diagram" viewBox="0 0 '+W+' '+H+'" width="'+W+'">';
  // lignes
  for(let i=0;i<6;i++){ const y=lineY(i); s+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1.2"/>'; }
  // étiquettes cordes
  STRING_LBL.forEach((lab,i)=>{ s+='<text x="'+(padL-8)+'" y="'+(lineY(i)+3)+'" font-size="8.5" font-family="JetBrains Mono" fill="var(--bone3)" text-anchor="end">'+lab+'</text>'; });
  // barres de mesure
  let beatAcc=0; let colInfo=[];
  evs.forEach((e,i)=>{
    const cx=x+ (e.beats*unit)/2;
    colInfo.push({x:cx,left:x,width:e.beats*unit});
    if(!e.rest && e.notes){ e.notes.forEach(n=>{
      const y=lineY(n.s);
      s+='<g class="tabcol" data-col="'+i+'">';
      s+='<rect class="coltxtbg" x="'+(cx-8)+'" y="'+(y-7)+'" width="16" height="14" rx="4" fill="var(--brass)" opacity="0"/>';
      s+='<text class="tabnum" data-col="'+i+'" x="'+cx+'" y="'+(y+3.4)+'" font-size="11" font-family="JetBrains Mono" font-weight="700" fill="var(--bone)" text-anchor="middle">'+n.f+'</text>';
      if(n.t){ s+='<text x="'+(cx+10)+'" y="'+(y-4)+'" font-size="8" font-family="JetBrains Mono" fill="var(--patina)">'+n.t+'</text>'; }
      s+='</g>';
    }); }
    x+=e.beats*unit; beatAcc+=e.beats;
  });
  // playhead
  s+='<line class="tabhead" x1="'+padL+'" y1="'+(padT-4)+'" x2="'+padL+'" y2="'+(lineY(0)+6)+'" stroke="var(--brass-hi)" stroke-width="2" opacity="0"/>';
  s+='</svg>';
  const events=evs.map(e=> e.rest? {rest:true,beats:e.beats} : {freqs:e.notes.map(n=>freqAt(n.s,n.f)), beats:e.beats});
  return {html:s, events, colInfo, totalW:W};
}

/* =========================================================

function inlineMd(t){
  if(!t) return '';
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,'<em>$1</em>')
          .replace(/`(.+?)`/g,'<span class="kbd">$1</span>');
}
function bodyHTML(body){
  if(!body) return '';

    // tableau => liste à puces
    return '<div class="body"><ul>'+body.map(li=>'<li>'+inlineMd(li)+'</li>').join('')+'</ul></div>';
  }
  return '<div class="body">'+body.split('\n').filter(Boolean).map(p=>'<p>'+inlineMd(p)+'</p>').join('')+'</div>';
}
function tipsHTML(tips){

/* =========================================================
   MINUTEURS — moteur, widget de carte, session guidée
========================================================= */
const TIMERS={};
let TID=0;
let sessionState=null;
const RING_R=19, RING_C=2*Math.PI*19;     // anneau minuteur de carte
const SRING_R=46, SRING_C=2*Math.PI*46;   // anneau session
function fmtT(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); const r=s%60; return m+':'+String(r).padStart(2,'0'); }

/* écran maintenu allumé pendant la session (mobile) */
const Wake={ lock:null,
  on(){ try{ if('wakeLock' in navigator && !this.lock){ navigator.wakeLock.request('screen').then(l=>{ this.lock=l; l.addEventListener('release',()=>{ Wake.lock=null; }); }).catch(()=>{}); } }catch(e){} },
  off(){ try{ if(this.lock){ this.lock.release(); this.lock=null; } }catch(e){} }
};
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible' && sessionState) Wake.on(); });

/* filet de sécurité : fait aboutir les minuteurs même si l'onglet
   est en arrière-plan (requestAnimationFrame gelé) */
setInterval(()=>{
  for(const id in TIMERS){ const t=TIMERS[id];
    if(t && t.running && Date.now()>=t.endAt){
      if(t.raf){ cancelAnimationFrame(t.raf); t.raf=null; }
      t.running=false; t.remaining=0;
      if(t.onTick) t.onTick(t);
      if(t.onDone) t.onDone();
    }
  }
}, 900);

function timerMake(id, total, onTick, onDone){
  TIMERS[id]={total:total, remaining:total, running:false, endAt:0, raf:null, onTick:onTick||null, onDone:onDone||null};
  return TIMERS[id];
}
function timerLoop(id){
  const t=TIMERS[id]; if(!t||!t.running) return;
  t.remaining=Math.max(0,(t.endAt-Date.now())/1000);
  if(t.remaining<=0.04){
    t.remaining=0; t.running=false; t.raf=null;
    if(t.onTick) t.onTick(t);
    if(t.onDone) t.onDone();
    return;
  }
  if(t.onTick) t.onTick(t);
  t.raf=requestAnimationFrame(()=>timerLoop(id));
}
function timerStart(id){
  const t=TIMERS[id]; if(!t||t.running) return;
  if(t.remaining<=0.05) t.remaining=t.total;
  Audio.ensure();
  t.running=true; t.endAt=Date.now()+t.remaining*1000;
  timerLoop(id);
}
function timerPause(id){
  const t=TIMERS[id]; if(!t||!t.running) return;
  t.remaining=Math.max(0,(t.endAt-Date.now())/1000);
  t.running=false; if(t.raf){cancelAnimationFrame(t.raf); t.raf=null;}
  if(t.onTick) t.onTick(t);
}
function timerToggle(id){ const t=TIMERS[id]; if(!t) return; t.running?timerPause(id):timerStart(id); }
function timerReset(id){
  const t=TIMERS[id]; if(!t) return;
  if(t.raf){cancelAnimationFrame(t.raf); t.raf=null;}
  t.running=false; t.remaining=t.total;
  if(t.onTick) t.onTick(t);
}
function timerAdd(id, delta){
  const t=TIMERS[id]; if(!t) return;
  t.total=Math.max(30, t.total+delta);
  t.remaining=Math.min(t.total, Math.max(1, t.remaining+delta));
  if(t.running) t.endAt=Date.now()+t.remaining*1000;
  if(t.onTick) t.onTick(t);
}
function stopAllTimers(){
  for(const id in TIMERS){ const t=TIMERS[id]; if(t&&t.raf) cancelAnimationFrame(t.raf); }
  for(const id in TIMERS) delete TIMERS[id];
  sessionState=null;
  Wake.off();
  document.body.classList.remove('session-on');
  const _bar=document.getElementById('sessionBar'); if(_bar) _bar.classList.add('hidden');
  document.querySelectorAll('.card.sess-active,.card.sess-done').forEach(c=>{ c.classList.remove('sess-active','sess-done'); c.style.removeProperty('--p'); });
}

function blockIsTimed(b){
  if(TIMED_KINDS.indexOf(b.kind)>=0) return true;
  if(b.kind==='text' && b.eyebrow && EX_EYEBROWS.indexOf(b.eyebrow)>=0) return true;

}
function defaultSecsFor(b){

function cardTimerHTML(id, secs){

  +      '<button class="ct-mini" data-ctadd="'+id+'" data-d="30">+30s</button>'

  +    '</div>'

}
function ctTickFn(id){
  return (t)=>{
    const w=document.querySelector('[data-ct="'+id+'"]'); if(!w) return;
    const te=w.querySelector('.ct-time'); if(te) te.textContent=fmtT(t.remaining);
    const pe=w.querySelector('.ct-pilltime'); if(pe) pe.textContent=fmtT(t.remaining);
    const pr=w.querySelector('.ct-prog'); if(pr) pr.style.strokeDashoffset=(RING_C*(1-(t.total? t.remaining/t.total:0))).toFixed(1);
    const go=w.querySelector('.ct-go');
    if(go){ const lbl = t.running?'Pause' : (t.remaining<=0?'Relancer' : (t.remaining<t.total?'Reprendre':'Démarrer')); go.innerHTML=(t.running?I.pause:I.play)+'<span>'+lbl+'</span>'; }
    w.classList.toggle('running', t.running);
    w.classList.toggle('done', !t.running && t.remaining<=0);
  };
}
function ctDoneFn(id){
  return ()=>{ Audio.beep(2,880);
    const w=document.querySelector('[data-ct="'+id+'"]'); if(w){ w.classList.add('flash'); setTimeout(()=>w.classList.remove('flash'),1200); }
    const t=TIMERS[id]; if(t) ctTickFn(id)(t);
    if(!sessionState) toast('Minuteur terminé');
  };
}
function ensureCardTimer(id){
  if(TIMERS[id]) return;
  const w=document.querySelector('[data-ct="'+id+'"]'); if(!w) return;
  const secs=+w.getAttribute('data-secs')||180;
  timerMake(id, secs, ctTickFn(id), ctDoneFn(id));
}

  if(tab) b.tab=tab;
  return b;
}
function transitionBlock(cb){
  const names=cb.chords; if(!names||names.length<2) return null;
  const isB=n=>CHORDS[n] && CHORDS[n].barres.length>0;
  if(!names.some(isB)) return null; // pas de barré => transition facile, pas de drill séparé
  let a=names[0], b=names[1];
  for(let i=0;i<names.length-1;i++){ if(isB(names[i])!==isB(names[i+1])){ a=names[i]; b=names[i+1]; break; } }
  return {
    kind:'chords', chords:[a,b], tempo:60, perBeats:4, eyebrow:'Transition', min:3,
    title:'Le changement '+chordLabel(a)+' ↔ '+chordLabel(b),
    body:[
      'La vraie difficulté n\u2019est pas de tenir l\u2019accord, c\u2019est de **passer** de l\u2019un à l\u2019autre. On isole ce changement.',
      '**Changements en 1 minute** : passe de '+chordLabel(a)+' à '+chordLabel(b)+' et inversement, sans t\u2019arrêter, et compte combien de changements **propres** tu réussis en une minute. Note ton score et essaie de le battre aux prochaines séances.'
    ],
    tips:[
      'Repère les doigts qui **ne bougent pas** d\u2019un accord à l\u2019autre et laisse-les en place.',
      'Bouge tous les doigts **ensemble**, comme une seule forme, pas un par un.',
      'Lent et net vaut mieux que rapide et étouffé.'
    ]
  };
}
function freePlayBlock(L){
  return {
    kind:'text', eyebrow:'Jeu libre', min:3,
    title:'Termine en jouant pour le plaisir',
    body:[
      'Range les consignes. Rejoue ce que tu as travaillé aujourd\u2019hui, ou simplement un accord, une gamme ou un bout de morceau que tu aimes.',
      'Cette minute **sans objectif** est ce qui te donnera envie de reprendre demain — elle fait pleinement partie de l\u2019entraînement.'
    ],
    tips:['Aucune pression, aucune faute possible ici : amuse-toi.']
  };
}
function assembleBlocks(L){
  const out=[];
  const hasWarmup=(L.blocks||[]).some(b=>b.eyebrow==='Échauffement');
  if(!hasWarmup) out.push(warmupBlock(L));
  const fb=fretboardBlock(L.day); if(fb) out.push(fb);
  (L.blocks||[]).forEach(b=>{
    out.push(b);
    if(b.kind==='chords'){ const t=transitionBlock(b); if(t) out.push(t); }
  });
  out.push(freePlayBlock(L));
  return out;
}
function sessionLauncherHTML(L){
  const exos=assembleBlocks(L).filter(blockIsTimed);
  const totalSec=exos.reduce((a,b)=>a+defaultSecsFor(b),0);
  let h='<div class="card warm session" id="sessionCard">';
  h+='<div class="card-eyebrow"><span class="eyebrow">Session minutée</span></div>';
  h+='<h2>Enchaîne tes '+exos.length+' exercices</h2>';
  h+='<p class="session-sub">Appuie sur play : chaque exercice est <strong>chronométré automatiquement</strong> et la page défile jusqu\u2019à lui pour que tu le voies bien. À la fin de son minuteur, on passe au suivant tout seul. Pause, avance ou arrêt à tout moment depuis la barre en bas.</p>';
  h+='<div class="session-meta mono"><span>'+I.clock+fmtT(totalSec)+'</span><span>'+I.fork+exos.length+' exercices</span></div>';
  h+='<button class="sessionStart" id="sessionStart">'+I.play+'<span>Démarrer la session</span></button>';
  h+='<div class="session-running hidden" id="sessionRunning">'+I.wave+'<span>Session en cours — suis la barre en bas</span></div>';
  h+='</div>';
  return h;
}

/* ===== session séquentielle : un exercice à la fois, minuteur auto + défilement ===== */
const SB_R=15.5, SB_C=2*Math.PI*15.5;
function scrollToCard(el){
  if(!el) return;
  const y=el.getBoundingClientRect().top + window.pageYOffset - 76;
  window.scrollTo({top:Math.max(0,y), behavior:'smooth'});
}
function sessionStart(){
  const today=document.getElementById('view-today'); if(!today) return;
  today.querySelectorAll('.card.sess-done,.card.sess-active').forEach(c=>{ c.classList.remove('sess-done','sess-active'); c.style.removeProperty('--p'); });
  const cards=[];
  today.querySelectorAll('[data-ct]').forEach(w=>{
    const card=w.closest('.card'); if(!card) return;
    const sec=+w.getAttribute('data-secs')||180;
    const h2=card.querySelector('h2'); const ttl=h2?h2.textContent:'Exercice';
    cards.push({card:card, sec:sec, title:ttl});
  });
  if(!cards.length) return;
  sessionState={cards:cards, idx:0, running:true};
  Wake.on();
  document.body.classList.add('session-on');
  const bar=document.getElementById('sessionBar'); if(bar) bar.classList.remove('hidden');
  const sb=document.getElementById('sessionStart'); if(sb) sb.classList.add('hidden');
  const rn=document.getElementById('sessionRunning'); if(rn) rn.classList.remove('hidden');
  sessionEnter(0);
}
function sessionEnter(i){
  const st=sessionState; if(!st) return;
  exMetroStop();
  st.idx=i;
  st.cards.forEach((c,k)=>{
    c.card.classList.toggle('sess-active', k===i);
    c.card.classList.toggle('sess-done', k<i);
    if(k!==i) c.card.style.removeProperty('--p');
  });
  const cur=st.cards[i];
  const step=document.getElementById('sbStep'); if(step) step.textContent='Exercice '+(i+1)+' / '+st.cards.length;
  const ti=document.getElementById('sbTitle'); if(ti) ti.textContent=cur.title;
  const tg=document.getElementById('sbToggle'); if(tg) tg.innerHTML=I.pause;
  timerMake('SESSION', cur.sec, sessionTick, sessionAdvance);
  timerStart('SESSION');
  scrollToCard(cur.card);
}
function sessionTick(t){
  const tm=document.getElementById('sbTime'); if(tm) tm.textContent=fmtT(t.remaining);
  const pr=document.getElementById('sbProg'); if(pr) pr.style.strokeDashoffset=(SB_C*(1-(t.total? t.remaining/t.total:0))).toFixed(2);
  const st=sessionState; if(st){ const c=st.cards[st.idx]; if(c) c.card.style.setProperty('--p',(100*(t.total?(t.total-t.remaining)/t.total:0)).toFixed(1)+'%'); }
}
function sessionAdvance(){
  const st=sessionState; if(!st) return;
  Audio.beep(2,880);
  const c=st.cards[st.idx]; if(c){ c.card.classList.remove('sess-active'); c.card.classList.add('sess-done'); c.card.style.setProperty('--p','100%'); }
  if(st.idx < st.cards.length-1){ sessionEnter(st.idx+1); }
  else { sessionFinish(); }
}
function sessionFinish(){
  if(TIMERS['SESSION']){ if(TIMERS['SESSION'].raf) cancelAnimationFrame(TIMERS['SESSION'].raf); delete TIMERS['SESSION']; }
  sessionState=null;
  Wake.off();
  Audio.chime();
  document.body.classList.remove('session-on');
  const bar=document.getElementById('sessionBar'); if(bar) bar.classList.add('hidden');
  document.querySelectorAll('#view-today .card.sess-active').forEach(c=>{ c.classList.remove('sess-active'); c.classList.add('sess-done'); });
  const sb=document.getElementById('sessionStart'); if(sb){ sb.classList.remove('hidden'); sb.innerHTML=I.reset+'<span>Refaire la session</span>'; }
  const rn=document.getElementById('sessionRunning'); if(rn) rn.classList.add('hidden');
  toast('Session terminée — bravo !');
  const fin=document.getElementById('finishBtn'); if(fin && !fin.classList.contains('done')) fin.classList.add('pulse');
}
function sessionToggle(){
  const t=TIMERS['SESSION']; if(!t||!sessionState) return;
  timerToggle('SESSION');
  sessionState.running=t.running;
  const b=document.getElementById('sbToggle'); if(b) b.innerHTML=t.running?I.pause:I.play;
}
function sessionSkip(){
  if(!sessionState) return;
  const t=TIMERS['SESSION']; if(t&&t.raf){ cancelAnimationFrame(t.raf); t.raf=null; t.running=false; }
  sessionAdvance();
}
function sessionStop(){
  if(TIMERS['SESSION']){ if(TIMERS['SESSION'].raf) cancelAnimationFrame(TIMERS['SESSION'].raf); delete TIMERS['SESSION']; }
  sessionState=null;
  Wake.off();
  document.body.classList.remove('session-on');
  const bar=document.getElementById('sessionBar'); if(bar) bar.classList.add('hidden');
  document.querySelectorAll('#view-today .card').forEach(c=>{ c.classList.remove('sess-active','sess-done'); c.style.removeProperty('--p'); });
  const sb=document.getElementById('sessionStart'); if(sb){ sb.classList.remove('hidden'); sb.innerHTML=I.play+'<span>Démarrer la session</span>'; }
  const rn=document.getElementById('sessionRunning'); if(rn) rn.classList.add('hidden');
}

/* clics liés aux minuteurs / session */
document.addEventListener('click',(e)=>{
  const open=e.target.closest('[data-ctopen]');
  if(open){ const id=open.getAttribute('data-ctopen'); ensureCardTimer(id); const w=document.querySelector('[data-ct="'+id+'"]'); const p=w&&w.querySelector('.ctimer-panel'); if(p){ p.classList.toggle('hidden'); w.classList.toggle('open',!p.classList.contains('hidden')); } return; }
  const tg=e.target.closest('[data-cttoggle]');
  if(tg){ const id=tg.getAttribute('data-cttoggle'); ensureCardTimer(id); timerToggle(id); return; }
  const add=e.target.closest('[data-ctadd]');
  if(add){ const id=add.getAttribute('data-ctadd'); ensureCardTimer(id); timerAdd(id, +add.getAttribute('data-d')); return; }
  const rst=e.target.closest('[data-ctreset]');
  if(rst){ const id=rst.getAttribute('data-ctreset'); ensureCardTimer(id); timerReset(id); return; }
  if(e.target.closest('#sessionStart')){ sessionStart(); return; }
  if(e.target.closest('#sbToggle')){ sessionToggle(); return; }
  if(e.target.closest('#sbNext')){ sessionSkip(); return; }
  if(e.target.closest('#sbStop')){ sessionStop(); return; }
});

/* =========================================================
   RENDU D'UN BLOC (avec minuteur d'exercice)

function renderBlock(b, idx){
  let html=renderBlockInner(b, idx);
  if(html && blockIsTimed(b)){
    const tw=cardTimerHTML('ct'+(++TID), defaultSecsFor(b));
    html=html.replace(/<\/div>\s*$/, tw+'</div>');
  }
  return html;
}
function renderBlockInner(b, idx){
  const ey = b.eyebrow ? '<div class="card-eyebrow">'+(b.num?'<span class="num">'+b.num+'</span>':'')+'<span class="eyebrow">'+b.eyebrow+'</span></div>' : '';
  const ttl = b.title ? '<h2>'+inlineMd(b.title)+'</h2>' : '';

  if(b.kind==='text'){
    return '<div class="card'+(b.warm?' warm':'')+'">'+ey+ttl+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  if(b.kind==='chord'){
    const c=CHORDS[b.chord]; const id='p'+(++PID);
    PLAYABLES[id]={type:'chord', frets:c.frets};
    let dia='<div class="diagram-wrap"><div class="chord-cell" data-chordplay="'+id+'"><div>'+renderChord(c.frets,c.fingers,c.barres)+'</div><span class="cname">'+(b.label||chordLabel(b.chord))+'</span></div></div>';
    let bar='<div class="audiobar"><button class="playbtn" data-play="'+id+'">'+I.ear+'<span>Écouter l\'accord</span></button></div>';
    return '<div class="card">'+ey+ttl+dia+bar+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  if(b.kind==='chords'){
    const id='p'+(++PID);
    const list=b.chords.map(name=>{ const c=CHORDS[name]; const cid='c'+(++PID);
      PLAYABLES[cid]={type:'chord',frets:c.frets};
      return '<div class="chord-cell" data-chordplay="'+cid+'"><div>'+renderChord(c.frets,c.fingers,c.barres)+'</div><span class="cname">'+chordLabel(name)+'</span></div>';
    }).join('');
    PLAYABLES[id]={type:'progression', chords:b.chords.map(n=>CHORDS[n].frets), perBeats:b.perBeats||2};
    const tempo=b.tempo||70;
    let bar='<div class="audiobar"><button class="playbtn" data-play="'+id+'">'+I.ear+'<span>Écouter l\'enchaînement</span></button>'
      +'<span class="tempo"><span>Tempo</span><input type="range" min="40" max="110" value="'+tempo+'" data-tempo="'+id+'"><span class="bpm mono" id="bpm_'+id+'">'+tempo+' bpm</span></span>'
      +'<button class="subbtn" data-loop="'+id+'">'+I.loop+'<span>Boucle</span></button>'
      +'<button class="subbtn metrobtn" data-metro="'+id+'" data-bpm="'+tempo+'" data-beats="4">'+I.metro+'<span>Métronome</span></button></div>';
    PLAYABLES[id].tempo=tempo;
    return '<div class="card">'+ey+ttl+'<div class="chord-row">'+list+'</div>'+bar+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  if(b.kind==='scale'){
    const id='p'+(++PID);
    const rootPc=letToPc(b.root); const sc=SCALES[b.scale];
    const built=buildScale(rootPc, sc.iv, b.fret[0], b.fret[1], {names:b.names});
    PLAYABLES[id]={type:'scale', events:built.events, refs:built.refs, tempo:b.tempo||92, loop:false, namesToggle:b.root, scale:b.scale, fret:b.fret};
    const tempo=b.tempo||92;
    const cap = sc.name+' de '+b.root+' ('+NOTE_LAT[rootPc]+') · cases '+b.fret[0]+'–'+b.fret[1];
    let bar='<div class="audiobar"><button class="playbtn" data-play="'+id+'">'+I.ear+'<span>Écouter la gamme</span></button>'
      +'<span class="tempo"><span>Tempo</span><input type="range" min="50" max="160" value="'+tempo+'" data-tempo="'+id+'"><span class="bpm mono" id="bpm_'+id+'">'+tempo+' bpm</span></span>'
      +'<button class="subbtn" data-loop="'+id+'">'+I.loop+'<span>Boucle</span></button>'
      +'<button class="subbtn" data-names="'+id+'">'+I.grid+'<span>Noms</span></button>'
      +'<button class="subbtn metrobtn" data-metro="'+id+'" data-bpm="'+tempo+'" data-beats="4">'+I.metro+'<span>Métronome</span></button></div>';
    return '<div class="card">'+ey+ttl
      +'<div class="fretwrap" id="wrap_'+id+'">'+built.html+'</div>'
      +'<div class="mono" style="text-align:center;font-size:11px;color:var(--bone3);margin-top:4px">'+cap+'</div>'
      +bar+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  if(b.kind==='tab'){
    const id='p'+(++PID);
    const built=buildTab(b.tab);
    PLAYABLES[id]={type:'tab', events:built.events, colInfo:built.colInfo, tempo:b.tab.tempo||90, loop:false};
    const tempo=b.tab.tempo||90;
    let bar='<div class="audiobar"><button class="playbtn" data-play="'+id+'">'+I.ear+'<span>Écouter</span></button>'
      +'<span class="tempo"><span>Tempo</span><input type="range" min="50" max="150" value="'+tempo+'" data-tempo="'+id+'"><span class="bpm mono" id="bpm_'+id+'">'+tempo+' bpm</span></span>'
      +'<button class="subbtn" data-loop="'+id+'">'+I.loop+'<span>Boucle</span></button>'
      +'<button class="subbtn metrobtn" data-metro="'+id+'" data-bpm="'+tempo+'" data-beats="'+((b.tab&&b.tab.bpb)||4)+'">'+I.metro+'<span>Métronome</span></button></div>';
    return '<div class="card">'+ey+ttl+'<div class="fretwrap" id="wrap_'+id+'">'+built.html+'</div>'+bar+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  if(b.kind==='fret'){
    const id='p'+(++PID);
    const built=buildFretboard(b.notes,{reveal:b.reveal});
    PLAYABLES[id]={type:'fretboard', events:built.events, refs:built.refs, tempo:b.tempo||96, loop:false};
    const hint='<div class="mono" style="text-align:center;font-size:11px;color:var(--bone3);margin-top:6px">Touche une note pour l\u2019entendre et r\u00e9v\u00e9ler son nom</div>';
    let bar='<div class="audiobar"><button class="playbtn" data-play="'+id+'">'+I.ear+'<span>Entendre les notes</span></button>'
      +'<button class="subbtn" data-revealfret="wrap_'+id+'">'+I.grid+'<span>R\u00e9v\u00e9ler</span></button></div>';
    return '<div class="card">'+ey+ttl+'<div class="fretwrap" id="wrap_'+id+'">'+built.html+'</div>'+hint+bar+bodyHTML(b.body)+tipsHTML(b.tips)+'</div>';
  }

  return '';
}

function renderLesson(L){
  PID=0; for(const k in PLAYABLES) delete PLAYABLES[k];
  TID=0; stopAllTimers();
  const total=LESSONS.length;
  const done=getDone();
  let h='';
  h+='<div class="lesson-head">';
  h+='<div class="eyebrow">Jour '+String(L.day).padStart(2,'0')+' · '+(L.est||20)+' min · '+total+' jours</div>';
  h+='<h1>'+L.title+'</h1>';
  h+='<div class="tags">'+L.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>';
  h+='<p class="lesson-intro">'+inlineMd(L.intro)+'</p>';
  h+='<div class="daymeta"><span class="pill">'+I.clock+(L.est||20)+' min</span><span class="pill">'+I.ear+'Écoute chaque exemple avant de jouer</span></div>';
  h+='</div>';
  h+=sessionLauncherHTML(L);
  assembleBlocks(L).forEach((b,i)=>{ h+=renderBlock(b,i); });
  const isDone=done.includes(L.day);
  h+='<button class="finishbtn'+(isDone?' done':'')+'" id="finishBtn" data-day="'+L.day+'">'+(isDone?I.check+'<span>Jour terminé — bravo !</span>':I.check+'<span>Marquer le jour terminé</span>')+'</button>';
  if(L.day<total){ h+='<button class="subbtn" id="nextBtn" style="display:flex;margin:0 auto 10px;justify-content:center" data-next="'+(L.day+1)+'">Voir le jour suivant '+I.chev+'</button>'; }
  return h;
}

/* =========================================================
   ETAT / PROGRESSION
========================================================= */
function getDone(){ return Store.get('corde.done')||[]; }
function setDone(a){ Store.set('corde.done',a); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function yestStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function currentDayIndex(){ // index dans LESSONS (0-based) de la leçon "du jour"
  const done=getDone();
  for(let i=0;i<LESSONS.length;i++){ if(!done.includes(LESSONS[i].day)) return i; }
  return LESSONS.length-1;
}
let viewingDay=null; // jour actuellement affiché dans l'onglet Aujourd'hui

function markDone(day){
  const done=getDone();
  if(!done.includes(day)){ done.push(day); setDone(done); }
  // streak
  const t=todayStr(), y=yestStr();
  const sd=Store.get('corde.streak')||{count:0,last:null};
  if(sd.last!==t){ sd.count = (sd.last===y)? sd.count+1 : 1; sd.last=t; Store.set('corde.streak',sd); }
  updateStreak();
}
function updateStreak(){
  const sd=Store.get('corde.streak')||{count:0,last:null};
  const t=todayStr(), y=yestStr();
  let c=sd.count; if(sd.last && sd.last!==t && sd.last!==y) c=0;
  const el=document.getElementById('streakBadge');
  if(c>0){ el.innerHTML=I.flame+c+' jour'+(c>1?'s':''); el.style.display=''; }
  else { el.innerHTML=I.flame+'Commence'; el.style.display=''; }
}

/* =========================================================
   PLAYBACK HANDLERS (délégation)
========================================================= */
let activePlayId=null;
function resetPlayBtn(id){
  const btn=document.querySelector('[data-play="'+id+'"]'); if(!btn) return;
  btn.classList.remove('playing');
  const P=PLAYABLES[id];
  const lbl = P.type==='chord'?'Écouter l\'accord' : P.type==='progression'?'Écouter l\'enchaînement' : P.type==='scale'?'Écouter la gamme' : P.type==='tab'?'Écouter':P.type==='fretboard'?'Entendre les notes':'Écouter le résultat';
  btn.innerHTML=I.ear+'<span>'+lbl+'</span>';
}
function setPlaying(id){
  const btn=document.querySelector('[data-play="'+id+'"]'); if(!btn) return;
  btn.classList.add('playing'); btn.innerHTML=I.stop+'<span>Arrêter</span>';
}

function stepScale(P, idx){
  if(!P.refs) return;
  Object.values(P.refs).forEach(rid=>{ const e=document.getElementById(rid); if(e)e.classList.remove('active'); });
  if(idx<0) return;
  const ev=P.events[idx]; if(!ev) return; const rid=P.refs[ev.s+'-'+ev.f];
  const e=document.getElementById(rid); if(e) e.classList.add('active');
}
function stepTab(P, idx, wrapId){
  const wrap=document.getElementById(wrapId); if(!wrap) return;
  wrap.querySelectorAll('.tabcol').forEach(g=>g.classList.remove('active'));
  wrap.querySelectorAll('.tabnum').forEach(t=>t.classList.remove('active'));
  const head=wrap.querySelector('.tabhead');
  if(idx<0){ if(head) head.setAttribute('opacity','0'); return; }
  wrap.querySelectorAll('.tabcol[data-col="'+idx+'"]').forEach(g=>g.classList.add('active'));
  wrap.querySelectorAll('.tabnum[data-col="'+idx+'"]').forEach(t=>t.classList.add('active'));
  const ci=P.colInfo[idx]; if(head && ci){ head.setAttribute('x1',ci.x); head.setAttribute('x2',ci.x); head.setAttribute('opacity','0.9'); }
}

function playId(id){
  const P=PLAYABLES[id]; if(!P) return;
  if(activePlayId===id){ Player.stop(); resetPlayBtn(id); activePlayId=null; return; }
  if(activePlayId){ Player.stop(); resetPlayBtn(activePlayId); }
  exMetroStop();
  Audio.ensure();
  activePlayId=id;

  if(P.type==='chord'){
    setPlaying(id);
    Audio.strum(chordFreqs(P.frets), Audio.ctx.currentTime+0.05, {dir:'down'});
    setTimeout(()=>{ if(activePlayId===id){ resetPlayBtn(id); activePlayId=null; } }, 1500);
    return;
  }
  if(P.type==='progression'){
    setPlaying(id);
    const events=[]; P.chords.forEach(fr=> events.push({freqs:chordFreqs(fr), beats:P.perBeats}) );
    Player.play(events,{tempo:P.tempo,loop:P.loop,onStep:null,onEnd:()=>{ resetPlayBtn(id); activePlayId=null; }});
    return;
  }
  if(P.type==='scale'){
    setPlaying(id);
    Player.play(P.events,{tempo:P.tempo,loop:P.loop,onStep:(i)=>stepScale(P,i),onEnd:()=>{ resetPlayBtn(id); activePlayId=null; }});
    return;
  }
  if(P.type==='fretboard'){
    setPlaying(id);
    Player.play(P.events,{tempo:P.tempo,loop:P.loop,onStep:(i)=>stepScale(P,i),onEnd:()=>{ resetPlayBtn(id); activePlayId=null; }});
    return;
  }
  if(P.type==='tab'){
    setPlaying(id);
    const wrapId='wrap_'+id;
    Player.play(P.events,{tempo:P.tempo,loop:P.loop,onStep:(i)=>stepTab(P,i,wrapId),onEnd:()=>{ resetPlayBtn(id); activePlayId=null; }});
    return;
  }
}

document.addEventListener('click',(e)=>{
  const play=e.target.closest('[data-play]');
  if(play){ playId(play.getAttribute('data-play')); return; }
  const cp=e.target.closest('[data-chordplay]');
  if(cp){ Audio.ensure(); const id=cp.getAttribute('data-chordplay'); const P=PLAYABLES[id]; if(P&&P.frets){ Audio.strum(chordFreqs(P.frets),Audio.ctx.currentTime+0.04,{dir:'down'}); cp.classList.add('active'); setTimeout(()=>cp.classList.remove('active'),700);} return; }
  const lp=e.target.closest('[data-loop]');
  if(lp){ const id=lp.getAttribute('data-loop'); PLAYABLES[id].loop=!PLAYABLES[id].loop; lp.classList.toggle('on',PLAYABLES[id].loop); if(activePlayId===id) Player.loop=PLAYABLES[id].loop; return; }
  const nm=e.target.closest('[data-names]');
  if(nm){ const id=nm.getAttribute('data-names'); toggleScaleNames(id, nm); return; }
  const fn=e.target.closest('[data-fnote]');
  if(fn){ Audio.ensure(); const sf=fn.getAttribute('data-fnote').split('-'); const s=+sf[0], f=+sf[1];
    Audio.note(freqAt(s,f),Audio.ctx.currentTime+0.02,{dur:1.8,gain:0.24});
    const t=fn.querySelector('.fname'); if(t){ const nmv=fn.getAttribute('data-name'); t.textContent=(t.textContent==='?'?nmv:'?'); }
    const c=fn.querySelector('circle'); if(c){ c.classList.add('active'); setTimeout(()=>c.classList.remove('active'),450); }
    return; }
  const rv=e.target.closest('[data-revealfret]');
  if(rv){ const wrap=document.getElementById(rv.getAttribute('data-revealfret'));
    if(wrap){ const ts=wrap.querySelectorAll('.fname'); const anyHidden=Array.prototype.some.call(ts,t=>t.textContent==='?');
      ts.forEach(t=>{ const g=t.closest('[data-name]'); t.textContent= anyHidden? g.getAttribute('data-name'):'?'; });
      rv.classList.toggle('on',anyHidden); }
    return; }
  const mt=e.target.closest('[data-metro]');
  if(mt){ const id=mt.getAttribute('data-metro'); const beats=+mt.getAttribute('data-beats')||4; const sl=document.querySelector('[data-tempo="'+id+'"]'); const bpm=sl?+sl.value:(+mt.getAttribute('data-bpm')||90); exMetroToggle(id,bpm,beats); return; }
  const fin=e.target.closest('#finishBtn');
  if(fin){ const day=+fin.getAttribute('data-day'); const wasDone=getDone().includes(day);
    markDone(day);
    if(!wasDone){ toast('Jour '+day+' validé. À demain !'); }
    fin.classList.add('done'); fin.innerHTML=I.check+'<span>Jour terminé — bravo !</span>';
    return; }
  const nx=e.target.closest('#nextBtn');
  if(nx){ const d=+nx.getAttribute('data-next'); openDay(d); return; }
  const dc=e.target.closest('[data-openday]');
  if(dc){ openDay(+dc.getAttribute('data-openday')); return; }
});

document.addEventListener('input',(e)=>{
  const tp=e.target.closest('[data-tempo]');
  if(tp){ const id=tp.getAttribute('data-tempo'); const v=+tp.value; PLAYABLES[id].tempo=v;
    const lab=document.getElementById('bpm_'+id); if(lab) lab.textContent=v+' bpm';

});

function toggleScaleNames(id, btn){
  const P=PLAYABLES[id]; P.names=!P.names; btn.classList.toggle('on',P.names);
  // re-build le SVG
  const wrap=document.getElementById('wrap_'+id); if(!wrap) return;
  const rootPc=letToPc(P.namesToggle); const sc=SCALES[P.scale];
  const built=buildScale(rootPc,sc.iv,P.fret[0],P.fret[1],{names:P.names});

}
