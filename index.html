{day:108, est:20, title:'« Marché de nuit » : le morceau rythmique',
 tags:['Répertoire','Rythme','Chanson'],
 intro:'Morceau guidé n°2 : tout l’inverse du premier. « Marché de nuit » est nerveux, percussif, en doubles-croches — le refrain qu’on joue debout. Tes semaines 6 et 14 entrent en scène.',
 blocks:[
  {kind:'chords', chords:['Em7','G','Dsus4','Cadd9'], tempo:70, perBeats:4, eyebrow:'Section 1', num:'01',
   title:'La grille qui pulse',
   body:[
    'Quatre accords aux doigts communs (tes amis du jour 37) : Em7 → Sol → Résus4 → Cadd9. Écoute, puis plaque-les avec des changements nets — les deux doigts ancrés ne bougent JAMAIS.',
    'Le morceau vit à 70 bpm mais en doubles-croches : ça fourmille sans courir.'
   ],
   tips:['Section 1 = juste la grille. Résiste à l’envie de rythmer avant que les changements soient automatiques.']},
  {kind:'text', eyebrow:'Section 2', num:'02',
   title:'Le pattern signature',
   body:[
    'Le rythme du morceau : ton pattern doubles-croches du jour 37, avec un **chuck** sur les temps 2 et 4 (jour 40) et un **ghost** avant chaque changement d’accord (jour 39). Tout ton arsenal, dans une seule mesure.',
    'Monte-le par couches, comme le Travis : (1) pattern seul, (2) + chucks, (3) + ghosts. Une couche stable avant la suivante.'
   ],
   tips:['Le chuck sur 2 et 4 est la caisse claire du morceau : c’est lui qui donne envie de bouger la tête.']},
  {kind:'text', eyebrow:'La soudure', num:'03',
   title:'Deux tours pleins, avec dynamique',
   body:[
    'Joue deux tours de grille avec le pattern complet : premier tour à mi-puissance (couplet), deuxième tour pleine ouverture (refrain). Le morceau existe dès que ce contraste vit.',
    'Enregistre. Demain : le pont qui relie « Ajaccio » et « Marché de nuit » — car les deux morceaux vont devenir un set.'
   ],
   tips:['Deux morceaux aux climats opposés : c’est voulu. Un répertoire, c’est une palette, pas une couleur.']}
 ]},

{day:109, est:20, title:'Structurer un set : l’art d’enchaîner',
 tags:['Répertoire','Arrangement','Scène'],
 intro:'Deux morceaux ne font pas un set : il faut les relier. Aujourd’hui, les transitions — intro, pont entre morceaux, fin — ce qui distingue « jouer des chansons » de « donner un moment ».',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le set est un seul morceau',
   body:[
    'Règle des musiciens de scène : un set se pense comme UNE pièce avec des chapitres. Trois outils : l’**intro** (ton riff du jour 95, ou 4 mesures d’« Ajaccio » en solo), le **pont** (2 mesures neutres pour changer de climat), la **fin** (un accord tenu + un silence assumé).',
    'Le pont du jour : après le dernier Fmaj7 d’« Ajaccio », deux mesures de Mi mineur 7 gratté doucement en crescendo… et « Marché de nuit » explose. Nuit qui tombe, marché qui s’allume.'
   ],
   tips:['Le silence APRÈS le dernier accord fait partie du set : compte trois secondes avant de bouger. Toujours.']},
  {kind:'chords', chords:['Fmaj7','Em7','Em7','G'], tempo:66, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Le pont entre les deux mondes',
   body:'Écoute la transition : le Famaj7 final d’« Ajaccio », le Mim7 qui s’installe (deux mesures, crescendo), et le Sol qui lance le second morceau. Quatre mesures qui changent la température de la pièce.',
   tips:['Le crescendo se fait à la main droite seule : même pattern, amplitude qui grandit. La main gauche ne sait même pas qu’il se passe quelque chose.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Le set complet, chronométré',
   body:[
    'Enchaîne TOUT : couplet d’« Ajaccio » ×2 → pont → « Marché de nuit » (couplet doux + refrain plein) → fin sur un Sol tenu + 3 secondes de silence. Chronomètre : tu devrais tenir 3 à 4 minutes de musique continue.',
    'C’est ton premier set. Pas un exercice, pas une leçon : un set. La semaine 18 le fera grandir à 15 minutes.'
   ],
   tips:['Rate quelque chose ? La règle de scène absolue : on ne s’arrête JAMAIS, on ne grimace JAMAIS. Le public n’entend que ce que ton visage avoue.']}
 ]},

{day:110, est:20, title:'Relever à l’oreille : voler comme un musicien',
 tags:['Répertoire','Oreille','Méthode'],
 intro:'Dernière compétence de répertoire, la plus précieuse : apprendre un morceau SANS tablature, à l’oreille. C’est un muscle, il se travaille avec une méthode — la voici.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Le protocole du releveur',
   body:[
    'Pour relever une chanson : (1) trouve la **tonique** — la note qui sonne « maison », fredonne-la, cherche-la sur ta corde de Mi grave (ton quiz du manche sert ici !), (2) déduis la tonalité et sa **famille de degrés** (jour 78), (3) teste I, IV, V, vi sur le passage — 90 % des pop songs vivent là, (4) affine à l’oreille.',
    'Tu ne devines pas au hasard : tu élimines dans un champ restreint. C’est de la déduction, pas de la magie.'
   ],
   tips:['Commence par des chansons à 3-4 accords que tu connais par cœur vocalement : l’oreille relève ce qu’elle peut chanter.']},
  {kind:'chords', chords:['G','Em','C','D'], tempo:66, perBeats:4, eyebrow:'L’entraînement', num:'02',
   title:'Le jeu du degré caché',
   body:[
    'Entraînement guidé : écoute cette grille SANS regarder les noms ci-dessus (triche interdite !). Identifie : quel accord sonne « maison » ? Lequel sonne mineur ? Lequel appelle le retour ?',
    'Puis vérifie : I (Sol), vi (Mim), IV (Do), V (Ré). Si tu en as senti deux sur quatre, ton oreille est déjà en route.'
   ],
   tips:['Refais le jeu avec les grilles des ateliers passés : chaque grille de l’app devient un exercice d’oreille gratuit.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Ta première chanson relevée',
   body:[
    'Cette semaine (pas forcément aujourd’hui) : choisis UNE chanson que tu adores, simple, et relève sa grille avec le protocole. Vérifie sur internet APRÈS seulement — l’erreur assumée puis corrigée grave dix fois mieux.',
    'Le jour où tu relèves seul, l’app, les tablatures et les profs deviennent des accélérateurs, plus des béquilles. C’est l’autonomie — le vrai objectif des quatre mois.'
   ],
   tips:['Idée : les chansons de Vianney tournent souvent sur 4 accords en I-V-vi-IV. Ton répertoire de cœur est ton meilleur manuel.']}
 ]},

/* ===== S17 — MUSICALITÉ & INTERPRÉTATION (jours 113-117) ===== */
{day:113, est:20, title:'Les dynamiques : le volume est un instrument',
 tags:['Musicalité','Interprétation','Dynamique'],
 intro:'Semaine de l’interprète. Deux guitaristes jouent les mêmes notes : l’un ennuie, l’autre émeut. La différence tient d’abord au VOLUME — pas celui de l’ampli, celui des doigts. Cartographions-le.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La carte d’intensité',
   body:[
    'Les musiciens pensent en nuances : **pp** (murmure), **mf** (conversation), **ff** (proclamation). Un morceau est un TRAJET entre ces niveaux — jamais un plateau.',
    'L’outil : avant de jouer, dessine mentalement la carte. « Ajaccio » : couplet pp, montée mf, dernier tour presque rien. « Marché de nuit » : couplet mf, refrain ff, dernier accord sec.'
   ],
   tips:['Le niveau le plus difficile n’est pas le fort : c’est le VRAI doux, celui qui reste net. C’est lui qu’on travaille en premier.']},
  {kind:'chords', chords:['Em7','Cmaj7','G','Dsus4'], tempo:64, perBeats:4, eyebrow:'L’exercice', num:'02',
   title:'La grille aux trois étages',
   body:[
    'Joue cette grille TROIS tours de suite : tour 1 en pp (effleure, tout doit rester net), tour 2 en mf, tour 3 en ff (sans taper — l’amplitude vient du bras, pas de la crispation).',
    'Écoute d’abord la référence au tempo, puis à toi. Le but : trois étages clairement distincts, mesurables à l’oreille.'
   ],
   tips:['Test objectif : enregistre les trois tours. Si on ne devine pas instantanément lequel est lequel, recommence — l’écart doit être évident.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Le crescendo d’une mesure',
   body:[
    'Micro-compétence des pros : le crescendo SUR une seule mesure. Quatre temps qui grossissent : pp → p → mf → f, en douceur, sans à-coup.',
    'Place-le juste avant chaque refrain de « Marché de nuit » : cette rampe d’une mesure décuple l’impact de l’explosion qui suit. L’attente EST l’émotion.'
   ],
   tips:['Règle éternelle : pour que le fort semble fort, il faut que le doux d’avant soit VRAIMENT doux. Le contraste fait tout.']}
 ]},

{day:114, est:20, title:'Le rubato : jouer avec le temps',
 tags:['Musicalité','Interprétation','Tempo'],
 intro:'Après le volume, le temps. Le rubato — ralentir, suspendre, reprendre — est ce qui fait « respirer » une intro ou une fin. Interdit avec un groupe, sublime en solo. Et tu joues seul.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le temps volé (et rendu)',
   body:[
    '**Rubato** veut dire « volé » : on étire certaines notes, on presse d’autres, mais le trajet global garde son sens. Trois usages en or : l’**intro** (hors tempo, comme une pensée), le **point culminant** (une suspension d’un demi-temps avant la note clé), la **fin** (le grand ralenti).',
    'La règle qui sauve : le rubato s’applique à une musique qu’on sait jouer PARFAITEMENT en place. On ne déforme que ce qu’on maîtrise droit.'
   ],
   tips:['Écoute un pianiste jouer une ballade : le temps se dilate et se contracte comme une respiration. C’est exactement ça.']},
  {kind:'tab', tab:{tempo:56, bpb:4, events:[
    {notes:[{s:1,f:3},{s:5,f:0}], beats:1.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:2,f:2}], beats:0.75},{notes:[{s:3,f:0}], beats:0.75},
    {rest:true, beats:0.5},
    {notes:[{s:1,f:3},{s:4,f:1},{s:5,f:0}], beats:2}
  ]}, eyebrow:'La cible', num:'02',
   title:'L’intro d’« Ajaccio », version libre',
   body:'Écoute : le motif du morceau, mais étiré — la première basse s’attarde, un silence suspend, l’accord final s’ouvre lentement. C’est la MÊME musique que le jour 107, avec du temps dedans. Reproduis en exagérant d’abord.',
   tips:['Exagérer puis doser : la méthode des acteurs vaut pour les musiciens. On trouve le juste en dépassant.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'La grande fin ralentie',
   body:[
    'Travaille la fin de ton set : les deux dernières mesures de « Marché de nuit » en ritardando — chaque temps 10 % plus long que le précédent — jusqu’à l’accord final qui tombe comme une pierre dans l’eau.',
    'Puis les trois secondes de silence (jour 109). Le ralenti + le silence : la formule de 99 % des fins mémorables.'
   ],
   tips:['Le métronome est ton ami 95 % du temps ; aujourd’hui, éteins-le en conscience. Savoir QUAND s’en passer, c’est ça la maîtrise.']}
 ]},

{day:115, est:20, title:'Le tempo intérieur : ton métronome invisible',
 tags:['Musicalité','Tempo','Méthode'],
 intro:'Paradoxe du jour : pour jouer libre, il faut un tempo intérieur en acier. On le construit avec un exercice redoutable — le métronome qui disparaît — et le juge le plus honnête : l’enregistreur.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'Le clic fantôme',
   body:[
    'L’exercice des studios : lance le métronome de l’exercice ci-dessous, joue 4 mesures AVEC… puis coupe-le mentalement (ignore-le) 4 mesures, puis re-synchronise. Es-tu encore dessus ?',
    'Variante suprême avec l’outil Métronome de l’onglet Outils : alterne 2 mesures avec clic, 2 mesures où tu le coupes toi-même. L’écart au retour du clic mesure ton horloge interne.'
   ],
   tips:['Dériver est NORMAL au début. Le but n’est pas zéro dérive aujourd’hui : c’est une dérive qui rétrécit semaine après semaine.']},
  {kind:'chords', chords:['Am','F','C','G'], tempo:72, perBeats:4, eyebrow:'Le terrain', num:'02',
   title:'La grille-test',
   body:'Ta fidèle grille, au tempo témoin. Joue-la avec le métronome de la carte, puis fais l’exercice du clic fantôme : 4 mesures avec, 4 mesures « seul », retour. Trois cycles.',
   tips:['Astuce corporelle : le pied qui bat DISCRÈTEMENT la pulsation est ton métronome de secours autorisé. Tous les pros l’utilisent.']},
  {kind:'text', eyebrow:'Le juge', num:'03',
   title:'L’enregistreur ne ment jamais',
   body:[
    'Enregistre 8 mesures sans aucun clic, puis réécoute en battant la mesure : où as-tu accéléré ? (Presque toujours : dans les passages qu’on maîtrise le moins — l’excitation compense l’insécurité.)',
    'Note le passage fautif, retravaille-le AVEC clic, réenregistre. Cette boucle jouer→écouter→corriger est le feedback loop le plus puissant de tout l’apprentissage musical.'
   ],
   tips:['S’écouter est inconfortable les cinq premières fois, précieux toute la vie. Les grands le font systématiquement — c’est même à ça qu’on les reconnaît.']}
 ]},

{day:116, est:20, title:'Trois versions d’un même couplet',
 tags:['Musicalité','Arrangement','Interprétation'],
 intro:'Exercice de style à la Queneau, version guitare : UN couplet, TROIS habits. C’est l’entraînement direct de la compétence qui fait les grands accompagnateurs — choisir, pas subir.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'L’habit fait le couplet',
   body:[
    'Un même couplet (grille + mélodie) peut être : **murmuré** (arpèges doux, rubato léger), **porté** (Travis régulier, mf), **poussé** (rythmique doubles-croches + chucks). Trois émotions, zéro note d’harmonie changée.',
    'Les grands accompagnateurs choisissent l’habit selon LE TEXTE : premier couplet nu, deuxième habillé, dernier refrain déchaîné. La progression d’intensité raconte autant que les paroles.'
   ],
   tips:['Question à te poser désormais devant toute chanson : « quel habit pour quelle phrase ? ». C’est la question d’arrangeur.']},
  {kind:'chords', chords:['C','GB','Am','Fmaj7'], tempo:63, perBeats:4, eyebrow:'Le terrain', num:'02',
   title:'Le couplet d’« Ajaccio », à habiller',
   body:'La grille du morceau guidé, ton matériau du jour. Écoute-la une fois, puis joue les trois versions : (1) arpèges libres presque rubato, (2) le Travis du jour 107, (3) grattée doubles-croches avec dynamique.',
   tips:['Chronomètre-toi : 3 minutes par version, pas plus. La contrainte de temps force les choix — et choisir, c’est le métier.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Enregistre le triptyque',
   body:[
    'Enregistre les trois versions à la suite (une seule prise, 10 secondes de pause entre chaque). Réécoute et tranche : laquelle servirait un texte mélancolique ? un texte d’espoir ? un texte de colère douce ?',
    'Garde le triptyque : c’est ton book d’arrangeur. Le jour où tu accompagneras quelqu’un — ou toi-même sur scène — ces trois habits seront tes premiers réflexes.'
   ],
   tips:['Il n’y a pas de « meilleure » version. Il y a la version juste POUR un moment donné. Ce relativisme-là est une maturité musicale.']}
 ]},

{day:117, est:20, title:'Improviser une intro et une outro',
 tags:['Musicalité','Impro','Scène'],
 intro:'Dernier art de l’interprète : les portes d’entrée et de sortie improvisées. Quatre mesures inventées sur le moment qui installent le climat — le geste qui fait dire « il ne joue pas, il raconte ».',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'La recette de l’intro improvisée',
   body:[
    'Une intro improvisée n’invente presque rien : elle prend **les accords du couplet**, les joue en arpèges rubato, et glisse UNE note de mélodie du morceau en clin d’œil. L’auditeur pressent la chanson avant qu’elle commence.',
    'L’outro, c’est l’inverse : le dernier accord se décompose (arpège descendant, ralenti), une note tenue en vibrato, silence. On ne finit pas une chanson : on la laisse partir.'
   ],
   tips:['Improviser ≠ tout inventer. Improviser = réorganiser du connu avec liberté. Tu as 116 jours de connu.']},
  {kind:'tab', tab:{tempo:58, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:1},{notes:[{s:3,f:0}], beats:0.5},{notes:[{s:4,f:1}], beats:0.5},
    {notes:[{s:5,f:0}], beats:0.75},{notes:[{s:5,f:3,t:'h'}], beats:1.25},
    {notes:[{s:4,f:1}], beats:0.5},{notes:[{s:3,f:0,t:'~'}], beats:1.5}
  ]}, eyebrow:'Exemple', num:'02',
   title:'Une intro improvisée témoin',
   body:'Écoute UNE façon d’ouvrir « Ajaccio » : la basse de Do qui s’installe, un arpège paresseux, et le hammer vers le Sol aigu — la note signature du morceau, en clin d’œil. Quatre mesures, un climat.',
   tips:['Ne l’apprends PAS par cœur : joue-la deux fois, puis fais TA version. Le témoin montre le chemin, il n’est pas le chemin.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Trois intros, trois soirs',
   body:[
    'Le rituel de la semaine : chaque jour, improvise une intro DIFFÉRENTE pour le même morceau (change une chose : le registre, le rubato, la note de clin d’œil). Trois intros = le réflexe s’installe.',
    'Puis une outro : dernier accord décomposé, note tenue, silence de trois secondes. Ton set possède maintenant des portes vivantes, jamais deux fois les mêmes.'
   ],
   tips:['C’est exactement ce qui distingue un concert d’une répétition : les portes improvisées prouvent que la musique se passe MAINTENANT.']}
 ]},

/* ===== S18 — INTÉGRATION & AUTONOMIE (jours 120-124 + 126) ===== */
{day:120, est:20, title:'Le grand bilan technique : six épreuves',
 tags:['Bilan','Méthode','Intégration'],
 intro:'Dernière semaine ! On commence par l’état des lieux : six épreuves qui traversent les quatre mois. Pas pour juger — pour MESURER, et savoir exactement quoi entretenir après.',
 blocks:[
  {kind:'text', eyebrow:'Le protocole', num:'01',
   title:'Les six épreuves',
   body:[
    '**1. Barrés** : le parcours F → Sol(b) → Do(a) → Fm au chrono d’une minute (jour 103). **2. Manche** : le quiz du jour, viser 6/6 en moins de 3 s par note. **3. Penta** : traverser 3 positions dans une phrase (jour 53). **4. Rythme** : le pattern doubles-croches + chuck, 2 minutes sans décrocher. **5. Travis** : le motif complet sur la grille Do-Am-F-Sol, 1 minute. **6. Oreille** : identifier I, IV, V, vi dans une grille de l’app sans regarder.',
    'Note chaque épreuve sur 3 : fragile / correct / solide. Aucun zéro possible — tu as travaillé chacune pendant des semaines.'
   ],
   tips:['La note sert UNE chose : désigner tes deux priorités d’entretien. Le reste est déjà à toi.']},
  {kind:'chords', chords:['F','G(b)','C(a)','Fm'], tempo:66, perBeats:2, eyebrow:'Épreuve 1', num:'02',
   title:'Le parcours des barrés, chronométré',
   body:'Lance le minuteur de cette carte sur 1 minute et compte les tours de parcours propres. Compare mentalement avec le jour 1, où tenir UN Fa était l’Everest. Souris. Puis note ton score.',
   tips:['Les cinq autres épreuves se font avec les outils de l’app : quiz du jour, gammes de l’explorateur, métronome. Tout est là.']},
  {kind:'text', eyebrow:'Le verdict', num:'03',
   title:'Tes deux chantiers',
   body:[
    'Identifie tes DEUX épreuves les plus fragiles : elles deviennent les invités permanents de ta future routine d’entretien (jour 122). Les quatre solides ne demandent qu’une visite hebdomadaire.',
    'C’est le méta-apprentissage en action : savoir ce qu’on sait, cibler ce qui reste. Cette lucidité vaut toutes les techniques.'
   ],
   tips:['Garde tes notes quelque part : dans trois mois, refais les six épreuves. La comparaison sera ton nouveau moteur.']}
 ]},

{day:121, est:20, title:'Ton set de quinze minutes',
 tags:['Répertoire','Scène','Intégration'],
 intro:'Le projet de la semaine : un set complet d’un quart d’heure. Aujourd’hui, on le construit — l’ordre, les transitions, la courbe d’émotion. Comme un vrai concert, parce que c’en sera un.',
 blocks:[
  {kind:'text', eyebrow:'La méthode', num:'01',
   title:'La courbe du set',
   body:[
    'Un set de 15 minutes = 4 à 5 pièces. La courbe éprouvée : **ouvrir doux** (on installe la confiance), **monter** (le morceau rythmique), **respirer** (l’instant suspendu — ton intro improvisée étirée, ou le blues lent), **culminer**, **fermer intime** (le public part avec un murmure).',
    'Ton inventaire : « Ajaccio », « Marché de nuit », ta compo du jour 82, un blues de 12 mesures avec solo, tes huit mesures de solo composé (jour 89). Cinq pièces : pile un set.'
   ],
   tips:['Écris la setlist sur un papier, comme les vrais : l’ordre, le climat de chaque pièce, la transition entre elles. Ce papier EST le concert.']},
  {kind:'chords', chords:['A7','D7','E7'], tempo:62, perBeats:4, eyebrow:'La respiration', num:'02',
   title:'Le blues lent, pièce centrale',
   body:'Le moment suspendu du set : ton blues en La, ralenti à 62, avec deux chorus de solo (bends justes, silences, double-stops). Écoute le tempo cible : c’est un blues qui prend son temps. Répète-le dans cet esprit.',
   tips:['La pièce lente est celle où l’on t’entend VRAIMENT : chaque note compte double. C’est un cadeau, pas un piège.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Premier filage',
   body:[
    'Filage = jouer le set en entier, dans l’ordre, sans s’arrêter, transitions comprises. Chronomètre. Note (mentalement) les deux moments les plus fragiles : ce sont eux qu’on retravaille demain — en désordre, méthode du jour 106.',
    'Un filage imparfait complet vaut mieux que trois débuts parfaits. La scène est un marathon d’endurance attentionnelle : on l’entraîne en entier.'
   ],
   tips:['Joue le filage DEBOUT si tu comptes jouer debout un jour : l’équilibre, la sangle, les angles — tout change. Autant s’y faire ici.']}
 ]},

{day:122, est:20, title:'Construire TA routine d’entretien',
 tags:['Méthode','Autonomie','Routine'],
 intro:'L’app t’a guidé 122 jours ; dans cinq jours, tu te guideras seul. Aujourd’hui, on conçoit ensemble ta routine post-parcours — celle qui entretient TOUT en 20 minutes par jour, à vie.',
 blocks:[
  {kind:'text', eyebrow:'La science', num:'01',
   title:'Les trois lois de l’entretien',
   body:[
    '**Loi 1 — l’espacement** : une compétence solide survit avec une visite par semaine ; une compétence fragile en demande trois. **Loi 2 — l’entrelacement** : mieux vaut 4 × 5 minutes sur 4 sujets que 20 minutes sur un seul. **Loi 3 — le désir** : une routine qui ne contient pas de plaisir pur meurt en trois semaines.',
    'Ton gabarit quotidien : 3 min d’échauffement + quiz du manche · 5 min sur ton chantier n°1 (bilan du jour 120) · 5 min tournantes (un jour gammes, un jour rythme, un jour oreille, un jour répertoire) · 5 min de set ou de morceau · 2 min de jeu libre. Vingt minutes, tout y est.'
   ],
   tips:['Note ce gabarit et affiche-le : une routine écrite a statistiquement bien plus de chances de survivre qu’une routine mentale.']},
  {kind:'text', eyebrow:'Personnalisation', num:'02',
   title:'Remplis les cases',
   body:[
    'À toi : chantier n°1 = ? (ton épreuve la plus fragile). Rotation des 5 minutes tournantes = ? (mets ton chantier n°2 deux fois dans la semaine). Ton « plaisir pur » de fin = ? (le riff, le blues, la compo — CE QUE TU VEUX).',
    'Et le rendez-vous fixe : quel moment de ta journée ? Ancre la routine à une habitude existante (après le sport, après le café du soir…) — l’ancrage d’habitude est la technique de constance la plus documentée qui soit.'
   ],
   tips:['20 minutes par jour battent 2 h 30 le dimanche : tu le sais depuis le jour 21, et 100 jours de streak te l’ont prouvé.']},
  {kind:'chords', chords:['C','G','Am','F'], tempo:72, perBeats:4, eyebrow:'Le rituel', num:'03',
   title:'Répétition générale de la routine',
   body:'Fais tourner ta nouvelle routine UNE fois, maintenant, avec la grille témoin en guise de « morceau ». Vingt minutes chrono, les cinq blocs, dans l’ordre. Elle doit te sembler évidente — sinon, simplifie.',
   tips:['L’app reste ton coffre : reviens piocher n’importe quel jour, n’importe quel outil. La routine est à toi, les ressources restent là.']}
 ]},

{day:123, est:20, title:'Jouer pour quelqu’un : la répétition générale',
 tags:['Scène','Interprétation','Défi'],
 intro:'La musique est un art de transmission : elle n’existe complètement que partagée. Aujourd’hui, on prépare le concert du jour 126 — et le trac qui va avec, car lui aussi se travaille.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le trac est un carburant mal réglé',
   body:[
    'Le trac n’est pas un ennemi : c’est de l’énergie d’activation. Trois réglages prouvés : (1) la **respiration 4-6** avant de jouer (inspire 4 s, expire 6 s, trois fois — le système nerveux redescend), (2) **sur-apprendre** l’ouverture (les 30 premières secondes doivent être inratables : c’est elles qui lancent la confiance), (3) **répéter en conditions** — d’où aujourd’hui.',
    'Ton public du jour 126 : ta compagne, un ami, Florent, ou ton téléphone en mode vidéo face à toi. Un témoin suffit — c’est le regard qui change tout, pas la foule.'
   ],
   tips:['Les 30 premières secondes sur-apprises : c’est le conseil n°1 de tous les coachs de scène. Ton intro d’« Ajaccio » doit sortir en dormant.']},
  {kind:'chords', chords:['C','GB','Am','Fmaj7'], tempo:63, perBeats:4, eyebrow:'L’ouverture', num:'02',
   title:'Les 30 secondes inratables',
   body:'Ton ouverture de set : l’intro improvisée d’« Ajaccio » (mais fixée, cette fois — choisis TA version préférée du jour 117) puis le premier couplet. Répète-la cinq fois d’affilée, dont une les yeux fermés, une debout, une après trois respirations 4-6.',
   tips:['La varier volontairement (assis, debout, yeux fermés) rend l’exécution robuste au contexte : c’est de la pratique variable, et c’est prouvé aussi.']},
  {kind:'text', eyebrow:'Le défi', num:'03',
   title:'Filage en conditions réelles',
   body:[
    'Le filage du jour : set complet, DEBOUT ou dans la position du concert, téléphone qui filme (le témoin de substitution). Applique les règles de scène : on ne s’arrête jamais, on ne s’excuse jamais, on tient les silences.',
    'Réécoute uniquement les transitions et l’ouverture. Le reste, tu le connais : ne nourris pas le perfectionnisme la veille d’un concert — même un concert de salon.'
   ],
   tips:['Fixe MAINTENANT le rendez-vous du jour 126 : un moment, un lieu, un témoin. Un concert annoncé est un concert qui a lieu.']}
 ]},

{day:124, est:20, title:'L’enregistrement miroir : 124 jours en une écoute',
 tags:['Bilan','Méthode','Feedback'],
 intro:'Avant-dernière marche : l’enregistrement bilan. Une prise complète, comparée à tes toutes premières traces. C’est le jour où le progrès, invisible au quotidien, devient une évidence sonore.',
 blocks:[

   title:'La prise témoin',
   body:[
    'Enregistre AUJOURD’HUI, en une seule prise chacun : (1) le parcours de barrés du jour 120, (2) une minute de pentatonique improvisée avec voyage entre positions, (3) le couplet d’« Ajaccio », (4) 30 secondes de ce que tu veux — ta signature du moment.',
    'Puis réécoute tes enregistrements les plus anciens (jour 19, jour 82, jour 96… ceux que tu as gardés). Écoute-les VRAIMENT, dans l’ordre chronologique.'
   ],
   tips:['Prévois d’être surpris : la mémoire lisse le progrès, l’enregistrement le restitue brut. C’est souvent un moment émouvant — c’est normal, et mérité.']},
  {kind:'text', eyebrow:'L’analyse', num:'02',
   title:'Écouter comme un professeur',
   body:[
    'En réécoutant ta prise du jour, note trois choses avec la bienveillance d’un bon prof : UNE force évidente (nomme-la précisément : « le pouce du Travis ne bouge plus »), UNE marge claire (« les bends aigus montent un poil bas »), UNE surprise (« je ne savais pas que je faisais déjà ça »).',
    'Ce regard à trois entrées — force, marge, surprise — est la grille d’auto-évaluation la plus saine qui existe : elle motive sans flatter, corrige sans démolir.'
   ],
   tips:['Partage la comparaison avant/après avec quelqu’un (Florent adorerait). Dire son progrès à voix haute le consolide — et il y a de quoi être fier.']},
  {kind:'chords', chords:['Am','F','C','G'], tempo:74, perBeats:4, eyebrow:'Le plaisir', num:'03',
   title:'Un tour pour rien — pour tout',
   body:'Termine par un tour de ta grille fétiche, sans objectif, sans jugement, juste pour le son. C’est cette gratuité qui t’a fait revenir 124 jours. Ne la perds jamais : c’est elle, la musique.',
   tips:['Demain : la dernière révision espacée du parcours. Après-demain : le concert. Tout est prêt.']}
 ]},
