function renderPath(){
  const done=getDone(); const cur=LESSONS[currentDayIndex()];
  let h='<div class="path-head"><div class="eyebrow">Ton chemin</div><h1>Le parcours</h1><p>Un cours par jour. Tu peux revoir les jours passés ou prendre de l\'avance.</p></div>';
  let lastWeek=-1;
  LESSONS.forEach(L=>{
    const wk=Math.floor((L.day-1)/7);
    if(wk!==lastWeek){ h+='<div class="weekband">'+(WEEK_TITLES[wk]||('Semaine '+(wk+1)))+'</div>'; lastWeek=wk; }
    const isDone=done.includes(L.day);
    const isCur=cur&&cur.day===L.day;
    h+='<button class="daycard'+(isDone?' done':'')+(isCur?' current':'')+'" data-openday="'+L.day+'">';
    h+='<div class="daynum">'+(isDone?I.check:String(L.day).padStart(2,'0'))+'</div>';

}

/* ----- métronome ----- */
const Metro={ on:false, bpm:80, beats:4, cur:0, next:0, timer:null, lookahead:0.1, schedAhead:0.12 };
function metroClick(time, isOne){
  Audio.ensure();
  const o=Audio.ctx.createOscillator(), g=Audio.ctx.createGain();
  o.frequency.value=isOne?1500:900; o.type='square';
  g.gain.setValueAtTime(0.0001,time); g.gain.exponentialRampToValueAtTime(isOne?0.4:0.25,time+0.001); g.gain.exponentialRampToValueAtTime(0.0001,time+0.05);
  o.connect(g); g.connect(Audio.master); o.start(time); o.stop(time+0.06);
}
function metroSchedule(){
  while(Metro.next < Audio.ctx.currentTime + Metro.schedAhead){
    const isOne = Metro.cur%Metro.beats===0;
    metroClick(Metro.next, isOne);
    const beatIdx=Metro.cur%Metro.beats;
    const delay=(Metro.next-Audio.ctx.currentTime)*1000;
    setTimeout(()=>flashDot(beatIdx), Math.max(0,delay));
    Metro.next += 60/Metro.bpm;
    Metro.cur++;
  }
}
function flashDot(i){
  const dots=document.querySelectorAll('#mDots .mdot');
  dots.forEach(d=>d.classList.remove('beat'));
  if(dots[i]) dots[i].classList.add('beat');
  setTimeout(()=>{ if(dots[i])dots[i].classList.remove('beat'); },120);
}
function buildDots(){
  const c=document.getElementById('mDots'); if(!c) return; c.innerHTML='';
  for(let i=0;i<Metro.beats;i++){ const d=document.createElement('div'); d.className='mdot'+(i===0?' one':''); c.appendChild(d); }
}
function initMetronome(){
  Metro.bpm=80; Metro.beats=4;
  buildDots();
  const sig=document.getElementById('mSig'); sig.innerHTML='';
  [2,3,4,6].forEach(n=>{ const b=document.createElement('button'); b.className='chipbtn'+(n===4?' on':''); b.textContent=n+'/4'; b.onclick=()=>{ Metro.beats=n; Metro.cur=0; buildDots(); sig.querySelectorAll('.chipbtn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }; sig.appendChild(b); });
  const range=document.getElementById('mRange'), bpmEl=document.getElementById('mBpm');
  const setB=v=>{ Metro.bpm=v; range.value=v; bpmEl.innerHTML=v+'<small>BPM</small>'; };
  range.oninput=()=>setB(+range.value);
  document.getElementById('mMinus').onclick=()=>setB(Math.max(40,Metro.bpm-1));
  document.getElementById('mPlus').onclick=()=>setB(Math.min(200,Metro.bpm+1));
  const tg=document.getElementById('mToggle');
  tg.onclick=()=>{ Audio.ensure();
    if(Metro.on){ Metro.on=false; clearInterval(Metro.timer); tg.classList.remove('playing'); tg.innerHTML=I.play+'<span>Démarrer</span>'; }
    else { Metro.on=true; Metro.cur=0; Metro.next=Audio.ctx.currentTime+0.08; metroSchedule(); Metro.timer=setInterval(metroSchedule,Metro.lookahead*1000); tg.classList.add('playing'); tg.innerHTML=I.stop+'<span>Arrêter</span>'; }
  };
}

/* ----- accordeur ----- */
function initTuner(){
  const c=document.getElementById('tuner'); if(!c) return; c.innerHTML='';
  const names=['Mi','La','Ré','Sol','Si','Mi']; const sub=['grave · 6','5','4','3','2','aigu · 1'];
  for(let s=0;s<6;s++){ const el=document.createElement('button'); el.className='tstr';
    el.innerHTML='<span class="tn">'+names[s]+'</span><span class="ts">'+sub[s]+'</span>';
    el.onclick=()=>{ Audio.ensure(); Audio.note(OPEN_FREQ[s],Audio.ctx.currentTime+0.03,{dur:3.4,gain:0.26}); el.classList.add('ring'); setTimeout(()=>el.classList.remove('ring'),1400); };
    c.appendChild(el);
  }
}

/* ----- explorateur d'accords ----- */
const CHORD_GROUPS=[
  {t:'Accords ouverts', k:['C','A','G','E','D','Am','Em','Dm','Cadd9','Asus2','Dsus4','Fmaj7']},

  {t:'Barrés (forme A)', k:['Bb','B(a)','C(a)','D(a)','Bm','Cm']},
  {t:'Power chords', k:['F5','G5','A5']},
  {t:'7e & couleurs', k:['Am7','Em7','Dm7','Bm7','Cmaj7','Gmaj7','G7','C7','A7','E7','D7','B7','Asus4','Esus4','Dsus2']},
  {t:'Basses alternatives (slash)', k:['GB','DFs','CG']},
  {t:'Formes CAGED mobiles', k:['D(c)','E(d)','A(gsh)']},
  {t:'Triades', k:['Ctri_o','Ctri_5','Ctri_9','Amtri_o','Amtri_5','Amtri_9','Ftri','Gtri','Dtri','Emtri','Ctri_m','Gtri_m','Amtri_m']},
];
function initChordExp(){
  const c=document.getElementById('chordExp'); if(!c) return;
  let h='<div class="selrow" id="chordPick">';
  CHORD_GROUPS.forEach((g,gi)=>{ h+='<span class="lab">'+g.t+'</span>'; g.k.forEach(k=>{ h+='<button class="opt" data-ch="'+k+'">'+chordLabel(k)+'</button>'; }); });
  h+='</div><div id="chordView" class="diagram-wrap"></div>';
  c.innerHTML=h;
  const view=document.getElementById('chordView');
  function show(k){ const ch=CHORDS[k];
    c.querySelectorAll('.opt').forEach(o=>o.classList.toggle('on',o.getAttribute('data-ch')===k));
    view.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px"><div>'+renderChord(ch.frets,ch.fingers,ch.barres,{w:150,h:190})+'</div>'
      +'<div class="cname mono" style="font-size:18px;color:var(--brass-hi)">'+chordLabel(k)+'</div>'
      +'<button class="playbtn" id="chPlay">'+I.ear+'<span>Écouter</span></button></div>';
    document.getElementById('chPlay').onclick=()=>{ Audio.ensure(); Audio.strum(chordFreqs(ch.frets),Audio.ctx.currentTime+0.04,{dir:'down'}); };
  }
  c.querySelectorAll('.opt').forEach(o=>o.onclick=()=>show(o.getAttribute('data-ch')));
  show('F');

/* ----- explorateur de gammes ----- */
const SC_LIST=[['minPenta','Penta. min'],['majPenta','Penta. maj'],['blues','Blues'],['major','Majeure'],['natMinor','Mineure'],['dorian','Dorien'],['mixo','Mixolydien']];
const ScaleExp={root:'A',scale:'minPenta',start:5,span:4,names:false,playId:'SX'};
function initScaleExp(){
  const c=document.getElementById('scaleExp'); if(!c) return;
  let h='<div class="selrow" id="sxRoot"><span class="lab">Fondamentale</span>';
  NOTE_LET.forEach((n,i)=>{ h+='<button class="opt'+(n==='A'?' on':'')+'" data-root="'+n+'">'+n+'<small>'+NOTE_LAT[i]+'</small></button>'; });
  h+='</div><div class="selrow" id="sxScale"><span class="lab">Gamme</span>';
  SC_LIST.forEach(([k,lab])=>{ h+='<button class="opt'+(k==='minPenta'?' on':'')+'" data-scale="'+k+'">'+lab+'</button>'; });
  h+='</div>';

  h+='<div class="fretwrap" id="sxWrap"></div>';
  h+='<div class="audiobar"><button class="playbtn" id="sxPlay">'+I.ear+'<span>Écouter la gamme</span></button>'
    +'<span class="tempo"><span>Tempo</span><input type="range" id="sxTempo" min="50" max="160" value="100"><span class="bpm mono" id="sxBpm">100 bpm</span></span>'
    +'<button class="subbtn" id="sxLoop">'+I.loop+'<span>Boucle</span></button></div>';
  c.innerHTML=h;

  PLAYABLES['SX']={type:'scale',events:[],refs:{},tempo:100,loop:false};
  function rebuild(){
    const rootPc=letToPc(ScaleExp.root); const sc=SCALES[ScaleExp.scale];
    const fEnd=Math.min(22,ScaleExp.start+ScaleExp.span);
    const built=buildScale(rootPc,sc.iv,ScaleExp.start,fEnd,{names:ScaleExp.names});
    document.getElementById('sxWrap').innerHTML=built.html;
    const P=PLAYABLES['SX']; P.events=built.events; P.refs=built.refs;
    // pour stepScale + clear
    P._wrap='sxWrap';
  }
  c.querySelectorAll('[data-root]').forEach(b=>b.onclick=()=>{ ScaleExp.root=b.getAttribute('data-root'); c.querySelectorAll('[data-root]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); rebuild(); });
  c.querySelectorAll('[data-scale]').forEach(b=>b.onclick=()=>{ ScaleExp.scale=b.getAttribute('data-scale'); c.querySelectorAll('[data-scale]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); rebuild(); });
  const st=document.getElementById('sxStart');
  st.oninput=()=>{ ScaleExp.start=+st.value; document.getElementById('sxStartLbl').textContent=st.value; rebuild(); };
  document.getElementById('sxNames').onclick=function(){ ScaleExp.names=!ScaleExp.names; this.classList.toggle('on',ScaleExp.names); rebuild(); };
  const tempo=document.getElementById('sxTempo');
  tempo.oninput=()=>{ PLAYABLES['SX'].tempo=+tempo.value; document.getElementById('sxBpm').textContent=tempo.value+' bpm'; if(activePlayId==='SX')Player.tempo=+tempo.value; };
  document.getElementById('sxLoop').onclick=function(){ PLAYABLES['SX'].loop=!PLAYABLES['SX'].loop; this.classList.toggle('on',PLAYABLES['SX'].loop); if(activePlayId==='SX')Player.loop=PLAYABLES['SX'].loop; };
  document.getElementById('sxPlay').onclick=()=>{
    const id='SX'; const P=PLAYABLES[id];
    const btn=document.getElementById('sxPlay');
    if(activePlayId===id){ Player.stop(); btn.classList.remove('playing'); btn.innerHTML=I.ear+'<span>Écouter la gamme</span>'; activePlayId=null; return; }
    if(activePlayId){ Player.stop(); resetPlayBtn(activePlayId);} 
    Audio.ensure(); activePlayId=id; btn.classList.add('playing'); btn.innerHTML=I.stop+'<span>Arrêter</span>';
    Player.play(P.events,{tempo:P.tempo,loop:P.loop,onStep:(i)=>stepScale(P,i),onEnd:()=>{ btn.classList.remove('playing'); btn.innerHTML=I.ear+'<span>Écouter la gamme</span>'; activePlayId=null; }});
  };
  rebuild();
}

========================================================= */
/* ----- métronome "jouer avec" (play-along par exercice) ----- */
const ExMetro={ on:false, id:null, bpm:90, beats:4, cur:0, next:0, timer:null };
function exMetroTick(){
  if(!ExMetro.on || !Audio.ctx) return;
  while(ExMetro.next < Audio.ctx.currentTime + 0.15){
    metroClick(ExMetro.next, ExMetro.cur%ExMetro.beats===0);
    ExMetro.next += 60/ExMetro.bpm; ExMetro.cur++;
  }
}
function exMetroStop(){
  if(!ExMetro.on) return;
  ExMetro.on=false; if(ExMetro.timer) clearInterval(ExMetro.timer); ExMetro.timer=null;
  const b=document.querySelector('[data-metro="'+ExMetro.id+'"]'); if(b){ b.classList.remove('on'); const sp=b.querySelector('span'); if(sp) sp.textContent='Métronome'; }
  ExMetro.id=null;
}
function exMetroToggle(id, bpm, beats){
  if(ExMetro.on && ExMetro.id===id){ exMetroStop(); return; }
  if(ExMetro.on) exMetroStop();
  if(activePlayId){ Player.stop(); resetPlayBtn(activePlayId); activePlayId=null; }
  Audio.ensure();
  ExMetro.on=true; ExMetro.id=id; ExMetro.bpm=bpm||90; ExMetro.beats=beats||4; ExMetro.cur=0; ExMetro.next=Audio.ctx.currentTime+0.12;
  exMetroTick(); ExMetro.timer=setInterval(exMetroTick, 60);
  const b=document.querySelector('[data-metro="'+id+'"]'); if(b){ b.classList.add('on'); const sp=b.querySelector('span'); if(sp) sp.textContent='Arrêter le clic'; }
}
function switchView(v){
  Player.stop(); activePlayId=null; stopAllTimers(); exMetroStop();
  if(Metro.on){ Metro.on=false; clearInterval(Metro.timer); }
  document.querySelectorAll('.view').forEach(s=>s.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-view')===v));
  if(v==='path') renderPath();
  if(v==='tools') renderTools();
  if(v==='today' && document.getElementById('view-today').innerHTML.trim()==='') renderToday();
}
document.getElementById('tabbar').addEventListener('click',(e)=>{ const b=e.target.closest('button'); if(b) switchView(b.getAttribute('data-view')); });

   INIT

function boot(){
  updateStreak();
  renderToday();
}

{day:4, est:20, title:'L’autre barré : la forme A',
 tags:['Barré','Forme A','Manche'],

    'Avantage : pour un même accord, tu as souvent **deux positions** sur le manche. Tu choisis la plus proche.'
   ],
   tips:['Tu peux laisser la corde de Mi grave **muette** : le pouce ou la pointe de l’index l’étouffe.']},

  {kind:'chord', chord:'Bb', eyebrow:'La cible', num:'02',
   title:'Si bémol (Bb)',
   body:[
    'Barré case 1 sur la corde de La, et trois doigts qui forment la « bosse » du La majeur case 3.',
    'Écoute, puis pose. Le petit défi : faire sonner les trois cordes du milieu avec un doigt un peu plié.'
   ],
   tips:['Si la corde la plus aiguë ne sonne pas, ce n’est pas grave au début : concentre-toi sur les 4 cordes principales.']},

  {kind:'chords', chords:['Bb','B(a)','C(a)','D(a)'], tempo:60, perBeats:4,
   eyebrow:'Exercice', num:'03',

   body:'Si bémol (case 1) → Si (case 2) → Do (case 3) → Ré (case 5). Même forme, on glisse. Écoute d’abord la cible.',

  {kind:'text', eyebrow:'Pour ancrer', num:'04',

   ]}
 ],
 routine:[
  '2 min — échauffement barré forme A : Bb posé/relâché.',
  '5 min — Bb, cordes une à une.',
  '5 min — la montée Bb→Si→Do→Ré.',
  '5 min — enchaîne un accord en forme E et le même genre d’accord en forme A.',
  '3 min — improvise en mélangeant formes E et A le long du manche.'
 ]},

{day:5, est:20, title:'La pentatonique mineure, position 1',

    'On apprend La mineur pentatonique : c’est la **relative** de Do majeur, et elle se joue dans une boîte autour de la **case 5**.'

  {kind:'tab', tab:{tempo:80, bpb:4, events:[

{day:6, est:20, title:'Donner vie à la pentatonique',
 tags:['Pentatonique','Phrasé','Technique'],
 intro:'Jouer les notes dans l’ordre, c’est une gamme. Les lier, les faire respirer, c’est un solo. Aujourd’hui : hammer-on, pull-off, et le goût du phrasé.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Lier au lieu de cogner',
   body:[
    'Un **hammer-on** (h) : tu joues une note, puis tu « frappes » une case plus haute avec un autre doigt, sans regratter.',
    'Un **pull-off** (p) : l’inverse, tu « tires » le doigt pour faire sonner la note plus basse. Ces deux gestes rendent le jeu **fluide et vivant**.'
   ],
   tips:['Le secret du hammer : de la vitesse dans le doigt, pas de la force.']},

  ]}, eyebrow:'Exercice', num:'03',
   title:'Pull-off',
   body:'Le mouvement inverse : tu « tires » le doigt vers le bas pour faire sonner la note plus grave (marquée « p »).',
   tips:['Ne soulève pas le doigt tout droit : accroche légèrement la corde en partant.']},

  {kind:'tab', tab:{tempo:74, bpb:4, events:[

 ],
 routine:[

{day:8, est:20, title:'La gamme majeure, mère de tout',
 tags:['Gamme','Majeure','Théorie'],
 intro:'La pentatonique vient de la gamme majeure. Comprendre la majeure, c’est comprendre d’où viennent les accords, les solos, les mélodies. On pose les fondations.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La formule magique',
   body:[
    'La gamme majeure suit toujours le même écart entre les notes : **Ton – Ton – ½ – Ton – Ton – Ton – ½**.',
    'Sur la guitare, un **ton = 2 cases**, un **demi-ton = 1 case**. Do majeure, c’est juste « les touches blanches du piano » : Do Ré Mi Fa Sol La Si.'
   ],
   tips:['Les deux demi-tons sont entre Mi-Fa et Si-Do : les seuls endroits « collés ».']},

  {kind:'scale', root:'C', scale:'major', fret:[0,3], tempo:80,
   eyebrow:'La cible', num:'02',
   title:'Do majeure en position ouverte',
   body:[
    'Écoute la gamme : Do Ré Mi Fa Sol La Si Do. C’est le son le plus « naturel » qui existe, celui des comptines.',
    'Elle se joue cases 0 à 3, en utilisant les cordes à vide. Repère les **Do** en laiton.'
   ],
   tips:['Active **Noms** pour suivre les notes : c’est le meilleur moyen de mémoriser le manche.']},

  {kind:'tab', tab:{tempo:84, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:0.5}, {notes:[{s:2,f:0}], beats:0.5},

    {notes:[{s:3,f:0}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:4,f:1}], beats:1}
  ]}, eyebrow:'Exercice', num:'03',
   title:'Une octave, note à note',
   body:'La gamme de Do sur une octave, de la corde de La à la corde de Si. Écoute, puis joue lentement. Chante les notes en même temps si tu peux.',
   tips:['Chanter ce qu’on joue accélère énormément la mémorisation.']},

  {kind:'text', eyebrow:'À retenir', num:'04',
   title:'Pourquoi ça compte',
   body:[
    'Chaque note de cette gamme porte un **numéro** (degré). Les accords d’une chanson en Do (Do, Rém, Mim, Fa, Sol, Lam) viennent **tous** de cette gamme.',
    'C’est pour ça qu’une chanson « sonne ensemble » : tout sort du même réservoir de 7 notes.'

 ],

  '3 min — échauffement : la gamme une octave, très lentement.',
  '6 min — gamme de Do, montée + descente, en disant les noms.',

  '2 min — pose-toi sur un Do : écoute comme c’est « la maison ».'
 ]},

{day:11, est:20, title:'Le rythme : patterns de strumming',
 tags:['Rythme','Main droite','Groove'],
 intro:'On a beaucoup travaillé la main gauche. Place à la droite : c’est elle qui fait danser. Un même accord peut sonner ennuyeux ou irrésistible selon le rythme de la main.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La main qui groove',
   body:[
    'Le secret du rythme : la main droite **ne s’arrête jamais**. Elle descend et remonte en continu, comme un métronome. Tu touches les cordes seulement quand il faut.',
    'On note : **B** = coup vers le bas, **H** = coup vers le haut.'
   ],
   tips:['Garde le poignet souple : le mouvement vient du poignet, pas du bras.']},

  {kind:'chords', chords:['C','G','Am','F'], tempo:72, perBeats:4,
   eyebrow:'La grille', num:'02',
   title:'Do – Sol – Lam – Fa',
   body:[
    'La grille pop par excellence (on l’entend dans des centaines de chansons). Écoute-la tourner, puis pose les accords.',
    'Pour l’instant : un grand coup vers le bas par accord, juste pour enchaîner proprement.'
   ],
   tips:['Mets la **Boucle** : c’est ton terrain de jeu pour le rythme.']},

  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Le pattern « pop » universel',
   body:[
    'Sur 4 temps, joue : `B - B H - H B H`. En clair : bas (1), bas-haut (2), rien-haut (le « et » du 3), bas-haut (4).',
    'La main fait **tous** les mouvements, mais elle ne **frappe** les cordes que sur ces moments-là. Compte « 1 et 2 et 3 et 4 et » à voix haute.'
   ],
   tips:['Si tu te perds, ralentis jusqu’à ce que la main bouge toute seule, sans réfléchir.']},

  {kind:'text', eyebrow:'Pour ancrer', num:'04',
   title:'Un accord, plusieurs vies',
   body:[
    'Prends **un seul** accord (Do) et joue le pattern dessus en boucle 2 minutes. Oublie la main gauche, concentre-toi sur le **groove**.',
    'Ensuite seulement, applique le pattern à la grille entière. La main droite d’abord, toujours.'
   ]}
 ],
 routine:[
  '3 min — main droite à vide : descends/remonte en continu, sans appuyer la gauche.',
  '5 min — le pattern sur un seul accord (Do), jusqu’à ce qu’il roule.',
  '6 min — le pattern sur la grille Do-Sol-Lam-Fa.',
  '4 min — augmente un peu le tempo, garde la régularité.',
  '2 min — joue la grille en chantant ou en fredonnant par-dessus.'
 ]},

{day:12, est:20, title:'Palm muting & dynamique',
 tags:['Rythme','Technique','Main droite'],
 intro:'Toujours jouer à fond, c’est fatigant à écouter. Le palm muting et le jeu sur l’intensité donnent du relief : du chuchotement au cri. C’est ce qui rend un accompagnement vivant.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Étouffer avec la paume',
   body:[
    'Le **palm mute** (PM) : pose le **bord de la paume** de la main droite tout près du chevalet, sur les cordes graves. Le son devient court, étouffé, « tchak ».',
    'Plus tu avances la paume vers le manche, plus c’est étouffé. C’est un dosage, pas un interrupteur.'
   ],
   tips:['La paume reste posée pendant que le médiator attaque : les deux mains travaillent ensemble.']},

  {kind:'tab', tab:{tempo:88, bpb:4, events:[
    {notes:[{s:0,f:0,t:'PM'}], beats:0.5}, {notes:[{s:0,f:0,t:'PM'}], beats:0.5},
    {notes:[{s:0,f:3,t:'PM'}], beats:0.5}, {notes:[{s:0,f:0,t:'PM'}], beats:0.5},
    {notes:[{s:0,f:0},{s:1,f:2}], beats:1},
    {notes:[{s:0,f:0,t:'PM'}], beats:0.5}, {notes:[{s:0,f:3,t:'PM'}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Un riff étouffé',
   body:[
    'Un motif sur la corde grave, étouffé à la paume (PM), avec un accord ouvert qui « explose » au milieu. Écoute le contraste.',
    'C’est la base du son rock/pop nerveux : des graves serrés, ponctués d’ouvertures.'
   ],
   tips:['Le contraste entre PM et notes ouvertes, c’est tout l’effet : ne mute pas tout.']},

  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Jouer fort, jouer doux',
   body:[
    'Reprends la grille d’hier (Do-Sol-Lam-Fa). Joue les deux premiers accords **tout doux** (paume légèrement posée), les deux suivants **francs et ouverts**.',
    'Tu crées une **dynamique** : couplet calme, refrain qui s’ouvre. C’est ce qui donne une émotion à un accompagnement.'
   ],
   tips:['Pense « vagues » : l’intensité monte et descend, elle n’est jamais plate.']},

  {kind:'text', eyebrow:'À retenir', num:'04',
   title:'Le relief avant la vitesse',
   body:'Un débutant joue vite et fort. Un musicien joue avec des **nuances**. Travailler le doux/fort te fera progresser plus que n’importe quel plan rapide.'}
 ],
 routine:[
  '3 min — pose la paume, trouve la zone du palm mute sur la corde grave.',
  '6 min — le riff étouffé, lentement puis au tempo.',
  '5 min — la grille en doux/fort (couplet/refrain).',
  '4 min — alterne 4 temps PM puis 4 temps ouverts sur un accord.',
  '2 min — joue une idée à toi en cherchant le relief.'
 ]},

/* ============ SEMAINE 3 — FINGERPICKING & IMPRO ============ */

{day:15, est:20, title:'Fingerpicking : les bases',
 tags:['Fingerpicking','Main droite','Singer-songwriter'],
 intro:'On range le médiator. Le jeu aux doigts, c’est le cœur du style singer-songwriter : ces arpèges délicats qui tournent sous une voix. On commence par le placement des doigts.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Un doigt, un rôle',
   body:[
    'Au fingerpicking, chaque doigt a son territoire : le **pouce (p)** s’occupe des **3 cordes graves**, l’**index (i)**, le **majeur (m)** et l’**annulaire (a)** prennent les 3 cordes aiguës.',
    'i = corde de Sol, m = corde de Si, a = corde de Mi aiguë. Le pouce gère la basse. Toujours.'
   ],
   tips:['Pose ta main détendue : les doigts tombent naturellement sur « leur » corde.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:0}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5},
    {notes:[{s:1,f:0}], beats:0.5}, {notes:[{s:3,f:2}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Arpège sur La mineur',
   body:[
    'Sur un accord de Lam (que tu tiens main gauche), on égrène : basse (pouce), puis i, m, a, puis on redescend. Écoute le motif tourner.',
    'L’accord reste **tenu** tout du long : seule la main droite bouge.'
   ],
   tips:['Joue chaque note bien séparée et régulière. La régularité avant la vitesse.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:1,f:3}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:1}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:1,f:3}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'Le même motif sur Do',
   body:'Change la main gauche pour un Do, garde exactement le même mouvement de main droite. Écoute : le motif est identique, la couleur change.',
   tips:['C’est ça la force du picking : un motif de main droite, et tu changes juste les accords.']},

  {kind:'text', eyebrow:'À retenir', num:'04',
   title:'Régularité = hypnose',
   body:[
    'Un bon arpège est **hypnotique** : régulier comme une horloge. C’est ce tapis qui permet à une voix de se poser dessus.',
    'Travaille lentement avec le métronome. La vitesse viendra toute seule, la régularité non.'
   ]}
 ],
 routine:[
  '3 min — main droite à vide : p-i-m-a sur cordes ouvertes, régulier.',
  '6 min — l’arpège sur Lam, au métronome lent.',
  '4 min — le même motif sur Do.',
  '5 min — enchaîne Lam → Do en gardant le motif, sans casser le rythme.',
  '2 min — laisse tourner, ferme les yeux, écoute.'
 ]},

{day:16, est:20, title:'Le motif qui tourne (style pop-folk)',
 tags:['Fingerpicking','Singer-songwriter','Groove'],
 intro:'Aujourd’hui, le motif arpégé typique de Ed Sheeran ou Vianney : celui qui tourne en boucle sous le chant. Quatre accords, un seul mouvement, et tu tiens une chanson entière.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le tapis sous la voix',
   body:[
    'Dans ce style, la guitare ne « joue » pas la mélodie : elle pose un **motif régulier** qui tourne, et la voix raconte par-dessus.',
    'On va utiliser quatre accords ouverts très chantants et un motif simple qui reste le même sur chacun.'
   ],
   tips:['Le but : pouvoir jouer le motif **sans y penser**, pour libérer la tête et chanter.']},

  {kind:'chords', chords:['Em','C','G','D'], tempo:74, perBeats:4,
   eyebrow:'Les accords', num:'02',
   title:'Mim – Do – Sol – Ré',
   body:'La grille de la chanson. Écoute-la, assure-toi que chaque accord sonne bien plaqué avant de passer au picking.',
   tips:['Ces quatre-là couvrent des centaines de chansons pop-folk. À garder précieusement.']},

  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:0,f:0}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:3,f:0}], beats:0.5},
    {notes:[{s:4,f:0}], beats:0.5}, {notes:[{s:5,f:0}], beats:0.5}
  ]}, eyebrow:'La cible', num:'03',
   title:'Le motif sur Mim',
   body:[
    'Le motif arpégé sur Mi mineur : basse au pouce, puis le dessin i-m-a-m qui tourne. Écoute comme ça « roule ».',
    'Une fois en place sur Mim, tu l’appliques tel quel sur Do, Sol et Ré (seule la main gauche change).'
   ],
   tips:['Garde le pouce sur la **bonne basse** pour chaque accord : Mim et Sol → corde de Mi grave ; Do → corde de La ; Ré → corde de Ré.']},

  {kind:'text', eyebrow:'Le défi', num:'04',
   title:'Ajoute ta voix',
   body:[
    'Quand le motif tourne tout seul sur les 4 accords, essaie de **fredonner** n’importe quelle mélodie par-dessus.',
    'Peu importe que ce soit juste : l’objectif est de **dissocier** les deux mains de la voix. C’est exactement le métier du singer-songwriter.'
   ],
   tips:['Si la voix fait dérailler les mains, c’est que le motif n’est pas encore assez automatique : ralentis.']}
 ],
 routine:[
  '3 min — révise les 4 accords, transitions propres.',
  '6 min — le motif sur Mim, puis sur chaque accord séparément.',
  '5 min — enchaîne les 4 accords avec le motif, en boucle.',
  '4 min — laisse tourner et fredonne par-dessus.',
  '2 min — joue lentement, savoure le côté hypnotique.'
 ]},

{day:17, est:20, title:'Fingerpicking avec barrés',
 tags:['Fingerpicking','Barré','Synthèse'],
 intro:'On marie les deux gros chantiers : les arpèges et les barrés. Arpéger un barré sonne magnifique — et c’est plus accessible que de le gratter en force. Les semaines se rejoignent.',

   title:'Le barré aime les arpèges',
   body:[
    'Bonne nouvelle : pour arpéger un barré, tu n’as pas besoin que **toutes** les cordes sonnent en même temps. Tu les joues une par une, donc la pression peut être moins parfaite.',
    'C’est une excellente façon de **consolider** les barrés sans se crisper.'
   ],
   tips:['Concentre la pression de l’index sur les cordes que le motif va réellement jouer.']},

  ]}, eyebrow:'La cible', num:'03',
   title:'Arpège sur le Fa barré',
   body:[
    'Maintenant le vrai Fa barré (case 1), arpégé. La basse (pouce) sur la corde de Mi grave, puis le motif aigu. Écoute le résultat, plein et chaud.',

{day:18, est:20, title:'Pentatonique majeure & relation mineur/majeur',
 tags:['Gamme','Pentatonique','Théorie'],
 intro:'Un déclic qui change tout : la pentatonique majeure et la pentatonique mineure, ce sont les mêmes notes. Comprends ce lien et tu doubles ton vocabulaire sans rien apprendre de neuf.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Mêmes notes, deux visages',
   body:[
    'La pentatonique de **Do majeur** contient exactement les mêmes notes que la pentatonique de **La mineur**. La forme sur le manche est **identique**.',
    'Ce qui change, c’est la **note de repos** : si tu te poses sur Do, ça sonne majeur (lumineux) ; sur La, ça sonne mineur (mélancolique).'
   ],
   tips:['La fondamentale que tu vises en fin de phrase décide de la couleur. Tout est là.']},

  {kind:'scale', root:'A', scale:'minPenta', fret:[5,8], tempo:88,
   eyebrow:'Version mineure', num:'02',
   title:'La penta mineure (rappel)',
   body:'La boîte de la semaine 1, centrée sur La. Repère les La en laiton : ce sont tes points de repos « mineurs ».',
   tips:['Pose-toi sur La en fin de phrase : écoute la couleur mélancolique.']},

  {kind:'scale', root:'C', scale:'majPenta', fret:[5,8], tempo:88,
   eyebrow:'Version majeure', num:'03',
   title:'La même boîte, en majeur',
   body:[
    'Exactement la même forme, mais les fondamentales mises en avant sont les **Do**. Écoute : les notes sont les mêmes, l’ambiance devient lumineuse.',
    'Tu n’as **rien** de nouveau à apprendre côté doigts : juste une nouvelle cible.'
   ],
   tips:['Active **Noms** sur les deux gammes et compare : les mêmes notes, d’autres repères.']},

  {kind:'tab', tab:{tempo:80, bpb:4, events:[
    {notes:[{s:5,f:5}], beats:0.5}, {notes:[{s:4,f:8}], beats:0.5},
    {notes:[{s:4,f:5}], beats:0.5}, {notes:[{s:3,f:7}], beats:0.5},
    {notes:[{s:3,f:5,t:'~'}], beats:2}
  ]}, eyebrow:'Le lick', num:'04',
   title:'Une phrase « majeure » qui se pose sur Do',
   body:'La même boîte, mais cette phrase résout sur un Do : écoute comme ça sonne plus joyeux, plus « pop », que les licks mineurs de la semaine 1.',
   tips:['Pour sonner majeur sur une chanson lumineuse, vise les Do. Pour sonner triste, vise les La. Même gamme.']}
 ],
 routine:[
  '3 min — la boîte, aller-retour.',
  '5 min — improvise en te posant **toujours** sur La (couleur mineure).',

{day:19, est:20, title:'Construire un solo',
 tags:['Impro','Phrasé','Solo'],
 intro:'Improviser au hasard, ça lasse vite. Un beau solo, c’est de la conversation : des phrases qui se répondent, des silences, une montée. Aujourd’hui, l’art de raconter une histoire.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Parler, pas réciter',
   body:[
    'Un solo se construit comme une **phrase parlée** : une idée, une respiration, une réponse. Pas un flot ininterrompu de notes.',
    'Trois ingrédients : la **question** (une phrase qui reste en suspens), la **réponse** (qui résout), et le **silence** entre les deux.'
   ],
   tips:['Le silence n’est pas du vide : c’est ce qui donne du poids aux notes.']},

  {kind:'tab', tab:{tempo:76, bpb:4, events:[
    {notes:[{s:2,f:5}], beats:0.5}, {notes:[{s:3,f:5}], beats:0.5},
    {notes:[{s:3,f:7}], beats:0.5}, {notes:[{s:4,f:5,t:'~'}], beats:1.5},
    {rest:true, beats:1}
  ]}, eyebrow:'La question', num:'02',
   title:'Une phrase en suspens',
   body:'Cette phrase se termine sur une note « ouverte » (un Mi) et un silence : l’oreille **attend la suite**. C’est volontaire.',

   title:'La forme C, déplacée : un Ré',

    'Prends ton Do ouvert, glisse toute la forme de **2 cases**, et barre avec l’index ce que le sillet faisait avant : tu obtiens un **Ré**, en forme C.',
    'Écoute la cible, puis construis-la doigt par doigt : annulaire sur la basse (corde de La, case 5), la forme de Do au-dessus, l’index qui barre en case 2.'
   ],
   tips:['C’est un accord d’intérieur de manche : parfait entre deux positions.','Si les 6 cordes ne sonnent pas, joue seulement les 4 aiguës : la forme reste valable.']},

 ]},

{day:24, est:20, title:'La forme G, version futée',

  {kind:'chords', chords:['Gtri','Emtri','Ctri_o','Dtri'], tempo:62, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Sol – Mim – Do – Ré en quatre cases',
   body:[
    'Écoute la grille pop jouée en triades aiguës : tout se passe entre les cases 0 et 4. Chaque changement ne bouge qu’un ou deux doigts.',
    'Pose-la lentement : Sol (4-3-3), Mi mineur (0-0-0 !), Do (0-1-0), Ré (2-3-2).'
   ],
   tips:['Le Mim à vide est ton point de repos : trois cordes à vide en plein milieu de la grille.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Compare avec la version « gros accords »',
   body:[
    'Joue un tour de la grille en accords complets (Sol, Mim, Do, Ré ouverts), puis un tour en triades. Écoute : l’une remplit, l’autre **dessine**.',
    'Aucune n’est meilleure : ce sont deux outils. Couplet en triades, refrain en accords pleins — et ton accompagnement respire.'

   tips:['Enregistre les deux versions et réécoute : le contraste saute aux oreilles.']}
 ]},

/* ===== S6 — RYTHME : LES DOUBLES-CROCHES (jours 36-40) ===== */
{day:36, est:20, title:'La pulsation en doubles-croches',
 tags:['Rythme','Main droite','Groove'],
 intro:'Jusqu’ici ta main comptait « 1-et-2-et ». On passe au niveau supérieur : « 1-e-et-e » — quatre mouvements par temps. C’est la pulsation de 90 % de la pop moderne.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Quatre par temps',
   body:[
    'Une **double-croche** divise le temps en quatre : on compte « **1 e & e, 2 e & e**… ». La main descend sur « 1 » et « & », remonte sur les deux « e ».',
    'Comme en Phase 1 : la main **ne s’arrête jamais**. Elle balaie en continu, deux fois plus fin ; toucher ou frôler les cordes devient un choix, pas un mouvement.'
   ],
   tips:['Dis le compte À VOIX HAUTE en jouant : c’est prouvé, verbaliser le rythme accélère son intégration.']},
  {kind:'tab', tab:{tempo:60, bpb:4, events:[
    {notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},
    {notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},{notes:[{s:0,f:0}], beats:0.25},
    {notes:[{s:0,f:0},{s:1,f:2},{s:2,f:2}], beats:2}
  ]}, eyebrow:'La cible', num:'02',
   title:'Huit doubles, un accord',
   body:'Écoute la mitraille régulière de doubles-croches sur la corde grave, puis l’accord qui libère. Reproduis : 8 doubles étouffées à la paume, puis un Mi qui s’ouvre.',
   tips:['Mets le métronome de l’exercice à 60 : lent, mais chaque note PILE à sa place.']},
  {kind:'text', eyebrow:'Exercice', num:'03',
   title:'Le driller des accents',
   body:[
    'Toujours 8 doubles par mesure, mais accentue tour à tour : d’abord tous les « 1 » et « & » (les temps), puis seulement les « e » (les contretemps). ',
    'Sentir la différence temps/contretemps dans la main, c’est LA compétence qui débloque tous les patterns de la semaine.'
   ],
   tips:['Si tu te perds, ralentis. La précision d’abord — la vitesse est un sous-produit, jamais un objectif.']}
 ]},

{day:37, est:20, title:'LE pattern doubles-croches de la pop',
 tags:['Rythme','Main droite','Groove'],
 intro:'Il existe un pattern en doubles-croches qu’on entend partout, des ballades folk aux tubes pop. Aujourd’hui, tu l’apprends — et tu ne pourras plus t’en passer.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'B - BH -H B- BH',
   body:[
    'Sur « 1 e & e 2 e & e » : **Bas** (1) … **Bas-Haut** (&-e) … **Haut** (e de 2) **Bas** (&)… puis **Bas-Haut**. En clair : B, (rien), B, H, (rien), H, B, (rien) — la main balaie tout, ne touche que là.',
    'Ce qui le rend addictif : le trou sur le temps 2 et la reprise en l’air. C’est ce « hoquet » qui groove.'
   ],
   tips:['Apprends-le par le son, pas par la lecture : écoute la cible ci-dessous en boucle avant de jouer.']},
  {kind:'chords', chords:['Cadd9','G','Dsus4','Em7'], tempo:64, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Le pattern sur une grille folk',
   body:[
    'Quatre accords qui gardent deux doigts communs (annulaire et auriculaire posés sur les cordes de Si et Mi aigu !) : la grille parfaite pour se concentrer sur la main droite.',
    'Écoute la grille, mets-la en boucle, puis joue le pattern dessus, un accord par mesure.'
   ],
   tips:['Ces deux doigts qui ne bougent JAMAIS pendant 4 accords : c’est du voice leading appliqué, cadeau de la semaine dernière.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Rendre le pattern automatique',
   body:[
    'Reste sur UN accord et joue le pattern 2 minutes sans t’arrêter, jusqu’à pouvoir parler en même temps. Puis remets la grille.',
    'Le test ultime : fredonner une mélodie par-dessus. Si la main tient, le pattern est à toi pour la vie.'
   ],
   tips:['Un pattern n’est acquis que quand il survit à la distraction.']}
 ]},

{day:38, est:20, title:'La syncope : tenir à travers le temps',
 tags:['Rythme','Groove','Théorie'],
 intro:'La syncope, c’est frapper juste avant le temps fort et laisser sonner par-dessus. C’est elle qui donne cette sensation d’élan, de musique qui « tire en avant ».',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Anticiper le temps',
   body:[
    'Au lieu de frapper l’accord sur le « 3 », tu le frappes sur le « & » juste avant… et tu **ne rejoues pas** le 3 : l’accord tenu traverse le temps fort.',
    'L’oreille attend le 3, il arrive en avance : cette micro-surprise, répétée, c’est le moteur du groove pop et funk.'
   ],
   tips:['La main continue son balayage pendant la tenue : elle passe au-dessus des cordes sans les toucher.']},
  {kind:'tab', tab:{tempo:68, bpb:4, events:[
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2}], beats:1},
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2}], beats:0.5},
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2}], beats:1.5},
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2}], beats:0.5},{notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Écoute l’anticipation',
   body:'Un La mineur : coup sur 1, coup sur 2, puis le coup **anticipé** (sur le « & » de 2) qui sonne longtemps à travers le 3. Écoute plusieurs fois : repère le moment « en avance ».',
   tips:['Compte à voix haute « 1, 2 ET————, 4 et » : le mot « ET » tenu, c’est ta syncope.']},
  {kind:'chords', chords:['Am','G','F','E'], tempo:66, perBeats:4, eyebrow:'Application', num:'03',
   title:'Syncope sur la descente andalouse',
   body:'Reprends la descente Am-Sol-Fa-Mi de la Phase 1, mais anticipe chaque changement d’accord d’une demi-croche : le nouvel accord arrive sur le « & » du 4 précédent. Sensation immédiate de musique qui avance.',
   tips:['C’est dur au début : le cerveau veut changer sur le 1. Ralentis à 60 et gagne le combat une mesure à la fois.']}
 ]},

{day:39, est:20, title:'Ghost strums : le squelette du groove',
 tags:['Rythme','Main droite','Groove'],
 intro:'Les meilleurs rythmiciens jouent des notes… qu’on n’entend presque pas. Les ghost strums — cordes frôlées, étouffées — remplissent l’espace et font respirer le pattern.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le presque-rien qui change tout',

    'Alterné avec les vrais accords, il transforme un pattern carré en groove vivant : accord–tchk–accord–tchk.'
   ],
   tips:['La main gauche reste posée EN CONTACT avec les cordes : c’est elle qui étouffe, pas la droite.']},
  {kind:'tab', tab:{tempo:70, bpb:4, events:[
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2},{s:4,f:1}], beats:0.5},
    {notes:[{s:1,f:0,t:'x'}], beats:0.5},
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2},{s:4,f:1}], beats:0.5},
    {notes:[{s:1,f:0,t:'x'}], beats:0.5},
    {notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2},{s:4,f:1}], beats:1},
    {notes:[{s:1,f:0,t:'x'}], beats:0.5},{notes:[{s:1,f:0},{s:2,f:2},{s:3,f:2},{s:4,f:1}], beats:0.5}
  ]}, eyebrow:'La cible', num:'02',
   title:'Am avec fantômes',
   body:'Écoute : accord, tchk, accord, tchk… Les « x » sont les ghost strums (ici symbolisés par une note sèche — sur ta guitare, ce sera un vrai « tchk » étouffé, encore mieux).',
   tips:['Le ghost est PLUS DOUX que l’accord : c’est une texture, pas une frappe.']},
  {kind:'chords', chords:['Am','F','C','G'], tempo:68, perBeats:4, eyebrow:'Application', num:'03',
   title:'Ta grille, version vivante',
   body:'Joue la grille avec ton pattern habituel, puis remplace un coup sur deux par un ghost. Enregistre les deux versions : la seconde « bouge », la première « récite ».',
   tips:['Dosage pro : 2 à 4 ghosts par mesure, pas plus. Le fantôme hante, il n’envahit pas.']}
 ]},

{day:40, est:20, title:'Le chuck : la caisse claire dans ta paume',
 tags:['Rythme','Percussif','Groove'],
 intro:'Dernière pièce du kit rythmique : le chuck (ou slap), ce claquement sec sur les temps 2 et 4. C’est la caisse claire du guitariste seul — et le public tape des mains dessus.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Frapper les cordes, pas les gratter',
   body:[
    'Le geste : au lieu de gratter le temps 2, la **tranche de la paume** frappe les cordes contre le manche — « TCHAK » — puis rebondit aussitôt.',
    'Placé sur les temps **2 et 4** (là où serait la caisse claire d’une batterie), il donne instantanément un squelette rythmique à ton jeu.'
   ],
   tips:['Le mouvement vient de la rotation du poignet, comme pour tourner une clé. Frappe près de la rosace.']},
  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:0,f:3},{s:1,f:2}], beats:1},
    {notes:[{s:0,f:3,t:'X'}], beats:1},

    {notes:[{s:0,f:3,t:'X'}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'Boum – TCHAK – accord – TCHAK',
   body:'Le motif fondamental sur Sol : basse (1), chuck (2), accord aigu (3), chuck (4). Les « X » symbolisent la frappe — sur ta guitare, c’est un vrai claquement percussif, sans hauteur.',
   tips:['Boum = pouce/médiator vers la basse. TCHAK = paume. Deux gestes, un seul mouvement de bras qui alterne.']},
  {kind:'chords', chords:['G','Em7','Cadd9','Dsus4'], tempo:68, perBeats:4, eyebrow:'Application', num:'03',
   title:'La grille qui se joue debout',
   body:'Applique boum-TCHAK-accord-TCHAK sur toute la grille. C’est physique, presque de la batterie : quand ça tourne, tout ton corps marque le tempo — exactement l’effet recherché.',
   tips:['Cette semaine t’a donné 4 outils : doubles-croches, syncope, ghosts, chuck. L’atelier de dimanche les mélange — c’est là que le groove naît.']}

/* ===== S7 — ACCORDS COULEURS (jours 43-47) ===== */
{day:43, est:20, title:'m7 et maj7 : le voile de douceur',
 tags:['Couleurs','Accords','Singer-songwriter'],
 intro:'Ajoute une note à un accord et il change d’humeur. Les septièmes mineures et majeures sont les couleurs préférées des singer-songwriters : plus douces, plus aériennes, plus adultes.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La quatrième note',
   body:[
    'Une triade = 3 notes. Ajoute la **septième** et l’accord gagne une dimension : **m7** (mineur adouci, feutré) et **maj7** (majeur rêveur, suspendu).',
    'Bonne nouvelle : les versions ouvertes sont souvent **plus faciles** que les accords de base — on enlève un doigt plus souvent qu’on n’en ajoute.'
   ],
   tips:['Ton Fmaj7 de la Phase 1 était déjà un accord couleur : tu en joues depuis le jour 1 sans le savoir.']},
  {kind:'chords', chords:['Am7','Em7','Dm7'], tempo:60, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Les trois mineurs 7',
   body:[
    'Écoute : Am7 (un doigt de moins que Am !), Em7 (un doigt de moins que Em), Dm7. La tristesse du mineur, mais avec un sourire en coin.',
    'Pose chacun, puis alterne Am ↔ Am7 : le doigt qui se lève, c’est la couleur qui entre.'
   ],
   tips:['m7 = le mineur qui ne se plaint pas. Parfait pour les couplets introspectifs.']},
  {kind:'chords', chords:['Cmaj7','Fmaj7','Gmaj7'], tempo:58, perBeats:4, eyebrow:'Exercice', num:'03',
   title:'Les trois majeurs 7',
   body:'Cmaj7, Fmaj7, Gmaj7 : le majeur qui flotte au lieu d’affirmer. Enchaîne les trois lentement — on dirait déjà une intro de ballade.',
   tips:['Compare C puis Cmaj7 plusieurs fois, yeux fermés : mets un mot sur la différence. Ton oreille se muscle autant que tes doigts.']}
 ]},

{day:44, est:20, title:'La 7e de dominante : la tension qui appelle',
 tags:['Couleurs','Accords','Théorie'],
 intro:'Il existe un accord dont le seul métier est de créer l’attente : la septième de dominante. Elle tire l’oreille vers l’accord suivant comme un aimant. C’est le moteur de la musique occidentale.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'V7 → I : l’aimant harmonique',
   body:[
    'Un accord **7** (Sol7, Mi7…) contient une tension interne qui **appelle sa résolution** : Sol7 veut aller vers Do, Mi7 vers La mineur. On note ça V7 → I.',
    'Écoute-le une fois et tu l’entendras partout : fins de phrases, refrains, blues entier.'
   ],
   tips:['Règle d’oreille : quand un accord semble « poser une question », c’est probablement un 7 de dominante.']},
  {kind:'chords', chords:['G7','C','E7','Am'], tempo:60, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Question → réponse, deux fois',
   body:[
    'Écoute : Sol7 (question) → Do (réponse). Mi7 (question) → La mineur (réponse). La tension se crée, puis se dissout.',
    'Joue-les en t’arrêtant une seconde sur chaque 7 : savoure l’inconfort avant de résoudre.'
   ],
   tips:['Le doigt qui fait la magie dans Sol7 : l’index en case 1 du Mi aigu — c’est LA note de tension (le Fa).']},
  {kind:'chords', chords:['A7','D7','G7','C'], tempo:62, perBeats:4, eyebrow:'Application', num:'03',
   title:'La chaîne de dominantes',
   body:'Chaque 7 appelle le suivant : La7 → Ré7 → Sol7 → Do. Une réaction en chaîne qui traverse quatre accords et atterrit à la maison. Écoute la sensation de « descente inévitable ».',
   tips:['B7 et E7 t’attendent dans la bibliothèque (onglet Outils) : mêmes mécaniques, à explorer librement.']}
 ]},

{day:45, est:20, title:'sus2, sus4 : suspendre le temps',
 tags:['Couleurs','Accords','Singer-songwriter'],
 intro:'Enlève la tierce d’un accord et remplace-la par sa voisine : l’accord n’est plus ni majeur ni mineur. Il est « suspendu » — et ta main sait déjà presque tout faire.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Ni majeur, ni mineur',
   body:[
    'La tierce décide de l’humeur ; les accords **sus** la remplacent par la seconde (**sus2**) ou la quarte (**sus4**). Résultat : un accord ouvert, ambigu, qui demande à bouger.',
    'Le jeu classique : **sus4 → majeur → sus2 → majeur**. Une seule corde change, et l’accord respire comme une vague.'
   ],
   tips:['Tu connais déjà Dsus4 et Asus2 depuis la Phase 1 : aujourd’hui on comprend ENFIN ce qu’ils font.']},
  {kind:'chords', chords:['Dsus4','D','Dsus2','D'], tempo:58, perBeats:4, eyebrow:'La cible', num:'02',
   title:'La vague sur Ré',
   body:'Écoute : Ré sus4 (tendu vers le haut) → Ré (repos) → Ré sus2 (ouvert vers le bas) → Ré. Un seul doigt monte et descend sur la corde de Mi aigu. Reproduis la vague, lentement.',
   tips:['C’est un embellissement d’UNE corde : le reste de la main ne bouge pas d’un millimètre.']},
  {kind:'chords', chords:['Asus2','A','Asus4','A'], tempo:58, perBeats:4, eyebrow:'Exercice', num:'03',
   title:'La même vague sur La',
   body:'Asus2 → La → Asus4 → La : même principe, autre corde (le Si cette fois). Puis improvise : tiens un Ré ou un La et fais vivre la vague au rythme qui te plaît — c’est déjà de la composition.',
   tips:['Esus4 t’attend dans la bibliothèque : troisième variante du même jeu.']}
 ]},

{day:46, est:20, title:'Les slash chords : des basses qui marchent',
 tags:['Couleurs','Accords','Arrangement'],
 intro:'G/B, D/F#… Ces accords « à barre oblique » mettent une autre note qu’attendu à la basse. Leur super-pouvoir : créer des lignes de basse qui descendent en escalier sous tes accords.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Accord / basse',
   body:[
    '**G/B** se lit « Sol sur Si » : un accord de Sol, mais avec **Si** à la basse. L’accord ne change pas, sa fondation si.',
    'À quoi ça sert ? À relier deux accords par une basse qui **marche** : Do (basse Do) → G/B (basse Si) → Am (basse La). Do, Si, La : la basse descend l’escalier.'
   ],
   tips:['Écoute la basse comme un chanteur écoute sa mélodie : c’est elle qui raconte la descente.']},
  {kind:'chords', chords:['C','GB','Am','CG'], tempo:60, perBeats:4, eyebrow:'La cible', num:'02',
   title:'L’escalier descendant',
   body:[
    'Écoute la ligne de basse : Do → Si → La → Sol. Quatre marches parfaites sous des accords que tu connais.',
    'Pose chaque accord et joue d’abord SA BASSE seule, puis l’accord entier : basse… accord… basse… accord.'
   ],
   tips:['G/B : étouffe bien la corde de Mi grave (pointe du majeur) pour que le Si soit vraiment la note la plus grave.']},
  {kind:'chords', chords:['G','DFs','Em','C'], tempo:60, perBeats:4, eyebrow:'Application', num:'03',
   title:'L’autre escalier : Sol → Fa# → Mi',
   body:'Le grand classique des ballades : Sol → D/F# → Mi mineur → Do. La basse descend Sol, Fa#, Mi pendant que l’harmonie tourne. Tu l’as entendu mille fois — maintenant tu le joues.',
   tips:['D/F# : le pouce peut attraper le Fa# par-dessus le manche (technique parfaitement légale et très utilisée !) ou l’index en petit barré.']}
 ]},

/* ===== S8 — PENTATONIQUE : LES 5 POSITIONS (jours 50-54) ===== */

/* ===== S9 — BLUES & EXPRESSION (jours 57-61) ===== */
{day:57, est:20, title:'Le blues : douze mesures qui ont tout inventé',
 tags:['Blues','Théorie','Groove'],
 intro:'Rock, pop, jazz, soul : tout descend du blues. Sa grille de 12 mesures est la structure la plus jouée de l’histoire — et le meilleur terrain d’expression jamais inventé. Bienvenue.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'La grille de 12 mesures',
   body:[
    'Trois accords, tous en **7** : le I (La7), le IV (Ré7), le V (Mi7). La structure : **4 mesures de La7 → 2 de Ré7 → 2 de La7 → 1 de Mi7 → 1 de Ré7 → 1 de La7 → 1 de Mi7** (le « turnaround » qui relance).',
    'Mémorise-la en la disant : « la maison ×4 — le voisin ×2 — la maison ×2 — la tension ! le voisin, la maison, la tension ! »'
   ],
   tips:['Trois accords de 7e de dominante : la leçon du jour 44 t’y préparait sans le dire.']},
  {kind:'chords', chords:['A7','D7','E7'], tempo:66, perBeats:4, eyebrow:'La cible', num:'02',
   title:'Les trois piliers',
   body:'Écoute et pose les trois accords du blues en La. Chacun est un 7 de dominante : le blues vit dans une tension permanente qui ne se résout jamais vraiment — c’est sa beauté.',
   tips:['Assure les transitions deux à deux : A7↔D7, puis A7↔E7. La grille n’est que ces deux mouvements.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Ton premier chorus',
   body:[
    'Joue la grille complète (compte les mesures à voix haute !) avec un simple coup par temps. Un tour de grille = un « chorus ».',
    'Enchaîne trois chorus sans t’arrêter. Se perdre fait partie de l’apprentissage : recompte et raccroche-toi au prochain La7.'
   ],
   tips:['Bientôt tu sentiras la grille sans compter — elle deviendra une respiration de 12 mesures.']}
 ]},

{day:58, est:20, title:'Le shuffle et le riff boogie',
 tags:['Blues','Rythme','Groove'],
 intro:'Le blues ne se joue pas droit : il boite élégamment. Ce balancement ternaire — le shuffle — plus le riff boogie des cordes graves, et te voilà avec le son de Chicago dans les doigts.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Le triolet caché',
   body:[
    'En shuffle, chaque temps se divise en **trois** (pas deux), et on joue la 1re et la 3e partie : « **DOUM**-x-da **DOUM**-x-da ». Long-court, long-court : le boitement du blues.',
    'Dis « **ta**-ke-la **ta**-ke-la » en boucle : joue sur les « ta » et les « la ». Ton corps comprend avant ta tête.'
   ],
   tips:['Métronome lent : le clic tombe sur les « ta ». Le « la » se place à l’oreille, aux deux tiers du temps.']},
  {kind:'tab', tab:{tempo:76, bpb:4, events:[
    {notes:[{s:1,f:0},{s:2,f:2}], beats:0.66},{notes:[{s:1,f:0},{s:2,f:2}], beats:0.34},
    {notes:[{s:1,f:0},{s:2,f:4}], beats:0.66},{notes:[{s:1,f:0},{s:2,f:4}], beats:0.34},
    {notes:[{s:1,f:0},{s:2,f:2}], beats:0.66},{notes:[{s:1,f:0},{s:2,f:2}], beats:0.34},
    {notes:[{s:1,f:0},{s:2,f:4}], beats:0.66},{notes:[{s:1,f:0},{s:2,f:4}], beats:0.34}
  ]}, eyebrow:'La cible', num:'02',
   title:'Le riff boogie sur La',
   body:[
    'LE riff : corde de La à vide + corde de Ré qui alterne cases 2 et 4. Écoute le balancement long-court, puis pose : index case 2, annulaire case 4, la corde de La sonne tout du long.',
    'Palm mute léger sur les deux cordes : le son doit être rond et étouffé, pas brillant.'
   ],
   tips:['Ce riff se déplace : sur Ré (cordes Ré+Sol, mêmes cases) et sur Mi (cordes Mi+La). Trois accords, un seul dessin.']},
  {kind:'text', eyebrow:'Application', num:'03',
   title:'Le boogie sur toute la grille',
   body:'Joue la grille de 12 mesures d’hier entièrement en riff boogie : La7 devient le riff sur La, Ré7 le riff sur Ré, Mi7 le riff sur Mi. Tu es officiellement un guitariste de blues-band.',
   tips:['Deux chorus boogie + un chorus accords plaqués = déjà un arrangement. Note l’idée pour l’atelier.']}
 ]},

{day:59, est:20, title:'Le bend : chanter avec les doigts',
 tags:['Blues','Technique','Phrasé'],
 intro:'Le bend — pousser la corde pour faire monter la note — est le geste le plus vocal de la guitare. Mal fait, il sonne faux ; juste, il fait pleurer. On apprend la justesse dès le premier jour.',
 blocks:[
  {kind:'text', eyebrow:'Le concept', num:'01',
   title:'Viser une note, pas un effet',
   body:[
    'Un bend n’est pas « pousser fort » : c’est **atteindre une note précise**. Le bend d’un ton part de la case 7 et doit sonner EXACTEMENT comme la case 9.',
    'Technique : annulaire sur la note, index et majeur derrière **en renfort**, et c’est la **rotation du poignet** qui pousse — pas les doigts seuls.'
   ],
   tips:['Pousse vers le haut (vers toi) sur les cordes aiguës. Trois doigts solidaires : jamais un doigt seul.']},
  {kind:'tab', tab:{tempo:66, bpb:4, events:[
    {notes:[{s:3,f:9}], beats:1},
    {notes:[{s:3,f:7}], beats:0.5},{notes:[{s:3,f:9,t:'b'}], beats:1.5},
    {notes:[{s:3,f:9}], beats:1}
  ]}, eyebrow:'La cible', num:'02',
   title:'L’exercice de justesse',
   body:[
    'Écoute la séquence : d’abord la **note cible** (case 9, jouée normalement), puis le départ case 7 suivi de la hauteur que ton bend doit atteindre, puis la cible encore.',
    'Sur ta guitare : joue la case 9 (mémorise le son), puis pousse la case 7 jusqu’à retrouver EXACTEMENT cette hauteur. Compare, recommence.'
   ],
   tips:['La méthode des pros : cible d’abord, bend ensuite, comparaison toujours. La justesse se construit par feedback, pas par chance.']},
  {kind:'tab', tab:{tempo:70, bpb:4, events:[
    {notes:[{s:4,f:5}], beats:0.5},{notes:[{s:4,f:8}], beats:0.5},
    {notes:[{s:3,f:7}], beats:0.5},{notes:[{s:3,f:9,t:'b'}], beats:1},
    {notes:[{s:4,f:5,t:'~'}], beats:1.5}
  ]}, eyebrow:'Application', num:'03',
   title:'Ton premier lick avec bend',
   body:'Une phrase de la boîte de La mineur qui culmine sur le bend (case 7 poussée jusqu’au son de la 9) et retombe en vibrato. Écoute, puis joue-la — lentement, bend juste avant tout.',
   tips:['Un seul bend parfait vaut cent bends approximatifs. Ton oreille est le juge : écoute-la.']}
 ]},

{day:60, est:20, title:'La gamme blues : la note interdite',

  {kind:'scale', root:'A', scale:'blues', fret:[5,8], eyebrow:'La cible', num:'02', tempo:84,
   title:'La boîte, version blues',
   body:'Ta position 1 avec l’intruse en plus. Écoute : sur les notes de passage, ce frottement délicieux. Joue-la en remarquant OÙ ça frotte — c’est elle.',
   tips:['Active « Noms » et repère les Ré# : photographie leurs positions.']},
  {kind:'tab', tab:{tempo:72, bpb:4, events:[
    {notes:[{s:3,f:5}], beats:0.5},{notes:[{s:3,f:7}], beats:0.5},
    {notes:[{s:3,f:8}], beats:0.25},{notes:[{s:4,f:5}], beats:0.75},
    {notes:[{s:3,f:7}], beats:0.5},{notes:[{s:3,f:5,t:'~'}], beats:1.5}
  ]}, eyebrow:'Exercice', num:'03',
   title:'Le lick avec l’épice',
   body:'Un lick classique : la blue note (case 8, corde de Sol) traversée en un quart de temps entre deux notes stables. Écoute comme elle pique PUIS se résout — c’est tout l’art.',
   tips:['Improvise ensuite sur ton riff boogie : une blue note par phrase, maximum deux. La rareté fait la valeur.']}
 ]},

{day:61, est:20, title:'Double-stops : jouer à deux voix',
 tags:['Blues','Phrasé','Technique'],
